<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin-slow {
      animation: spin-slow 12s linear infinite;
    }

    @keyframes rain-drop {
      0% { transform: translateY(-10px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(20px); opacity: 0; }
    }
    .rain-anim {
      animation: rain-drop 1.2s ease-in infinite;
    }
    .rain-anim-delay-1 { animation-delay: 0.2s; }
    .rain-anim-delay-2 { animation-delay: 0.5s; }
    .rain-anim-delay-3 { animation-delay: 0.8s; }

    @keyframes snow-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(20px) rotate(180deg); opacity: 0; }
    }
    .snow-anim {
      animation: snow-fall 2s ease-in-out infinite;
    }
    .snow-anim-delay-1 { animation-delay: 0.3s; }
    .snow-anim-delay-2 { animation-delay: 0.7s; }

    @keyframes pulse-glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float-anim {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes lightning {
      0%, 90%, 100% { opacity: 0; }
      92%, 95% { opacity: 1; }
    }
    .lightning-flash {
      animation: lightning 4s ease-in-out infinite;
    }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .glass-dark {
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
    }

    @keyframes spinner {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spinner 0.8s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ========================================
    // Constants & Config
    // ========================================
    const API_KEY = 'be6860f2a0f842d227e3e102a458c1cf';
    const API_URL = 'https://api.openweathermap.org/data/2.5/weather';
    const ICON_URL = 'https://openweathermap.org/img/wn';

    const POPULAR_CITIES = [
      { name: '서울', query: 'Seoul' },
      { name: '부산', query: 'Busan' },
      { name: '제주', query: 'Jeju' },
      { name: '대구', query: 'Daegu' },
      { name: '인천', query: 'Incheon' },
      { name: '대전', query: 'Daejeon' },
      { name: '광주', query: 'Gwangju' },
      { name: '울산', query: 'Ulsan' },
    ];

    const GRADIENTS = {
      Clear: 'from-orange-400 via-amber-300 to-yellow-200',
      Clouds: 'from-slate-500 via-blue-300 to-gray-400',
      Rain: 'from-slate-700 via-blue-800 to-gray-600',
      Drizzle: 'from-slate-600 via-blue-700 to-gray-500',
      Snow: 'from-blue-100 via-white to-blue-200',
      Thunderstorm: 'from-purple-900 via-indigo-800 to-gray-900',
      Mist: 'from-gray-400 via-blue-200 to-gray-300',
      Haze: 'from-amber-200 via-gray-300 to-yellow-100',
      Fog: 'from-gray-400 via-gray-300 to-blue-200',
      Default: 'from-sky-400 via-blue-300 to-cyan-200',
    };

    const TEXT_COLORS = {
      Rain: 'text-white',
      Drizzle: 'text-white',
      Thunderstorm: 'text-white',
      Default: 'text-gray-800',
    };

    // ========================================
    // Utility Functions
    // ========================================
    function getGradient(condition) {
      return GRADIENTS[condition] || GRADIENTS.Default;
    }

    function getTextColor(condition) {
      return TEXT_COLORS[condition] || TEXT_COLORS.Default;
    }

    function getTempColor(temp) {
      if (temp <= 0) return 'text-blue-400';
      if (temp <= 10) return 'text-cyan-500';
      if (temp <= 20) return 'text-green-500';
      if (temp <= 30) return 'text-orange-500';
      return 'text-red-500';
    }

    function formatTime(unix, timezoneOffset) {
      const date = new Date((unix + timezoneOffset) * 1000);
      const hours = date.getUTCHours().toString().padStart(2, '0');
      const minutes = date.getUTCMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    function formatKoreanDate() {
      const now = new Date();
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      const day = days[now.getDay()];
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      return `${year}년 ${month}월 ${date}일 (${day}) ${hours}:${minutes}`;
    }

    function formatVisibility(meters) {
      if (meters >= 1000) return `${(meters / 1000).toFixed(1)} km`;
      return `${meters} m`;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function LoadingSpinner() {
      return (
        <div className="flex flex-col items-center gap-3 py-12">
          <div className="w-10 h-10 border-4 border-white/30 border-t-white rounded-full spinner"></div>
          <p className="text-white/70 text-sm">날씨 정보를 불러오는 중...</p>
        </div>
      );
    }

    function ErrorMessage({ message }) {
      return (
        <div className="fade-in-up glass rounded-2xl p-6 text-center max-w-md mx-auto mt-6">
          <div className="text-4xl mb-3">😥</div>
          <p className="text-white font-medium text-lg">{message}</p>
          <p className="text-white/60 text-sm mt-2">다른 도시를 검색해 보세요</p>
        </div>
      );
    }

    // ========================================
    // 🌤 Weather Animation Component
    // ========================================
    function WeatherAnimation({ condition }) {
      if (condition === 'Clear') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none">
            <div className="spin-slow text-yellow-300 text-5xl">☀️</div>
          </div>
        );
      }
      if (condition === 'Rain' || condition === 'Drizzle') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none flex gap-2">
            <span className="rain-anim text-2xl">💧</span>
            <span className="rain-anim rain-anim-delay-1 text-xl">💧</span>
            <span className="rain-anim rain-anim-delay-2 text-2xl">💧</span>
            <span className="rain-anim rain-anim-delay-3 text-xl">💧</span>
          </div>
        );
      }
      if (condition === 'Snow') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none flex gap-2">
            <span className="snow-anim text-2xl">❄️</span>
            <span className="snow-anim snow-anim-delay-1 text-xl">❄️</span>
            <span className="snow-anim snow-anim-delay-2 text-2xl">❄️</span>
          </div>
        );
      }
      if (condition === 'Thunderstorm') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none">
            <span className="lightning-flash text-4xl">⚡</span>
          </div>
        );
      }
      if (condition === 'Clouds') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none">
            <span className="float-anim text-4xl inline-block">☁️</span>
          </div>
        );
      }
      return null;
    }

    // ========================================
    // 🧩 Search Bar Component
    // ========================================
    function SearchBar({ onSearch, loading }) {
      const [query, setQuery] = useState('');
      const inputRef = useRef(null);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (query.trim()) {
          onSearch(query.trim());
        }
      };

      useEffect(() => {
        inputRef.current?.focus();
      }, []);

      return (
        <form onSubmit={handleSubmit} className="w-full max-w-xl mx-auto">
          <div className="flex gap-2">
            <div className="flex-1 relative">
              <input
                ref={inputRef}
                type="text"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="도시 이름을 입력하세요 (예: Seoul, Tokyo, London)"
                className="search-input w-full px-5 py-4 rounded-2xl glass text-white placeholder-white/50 outline-none text-lg font-light transition-all"
                disabled={loading}
                aria-label="도시 검색"
              />
              <svg className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
            <button
              type="submit"
              disabled={loading || !query.trim()}
              className="px-6 py-4 rounded-2xl bg-white/25 hover:bg-white/35 text-white font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95"
              aria-label="검색"
            >
              검색
            </button>
          </div>
        </form>
      );
    }

    // ========================================
    // 🏙 Popular Cities Component
    // ========================================
    function PopularCities({ onSelect, condition }) {
      return (
        <div className="flex flex-wrap justify-center gap-2 mt-4 max-w-xl mx-auto">
          {POPULAR_CITIES.map((city) => (
            <button
              key={city.query}
              onClick={() => onSelect(city.query)}
              className="px-4 py-2 rounded-full glass text-white/90 text-sm font-medium hover:bg-white/30 transition-all active:scale-95 cursor-pointer"
            >
              {city.name}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 📜 Search History Component
    // ========================================
    function SearchHistory({ history, onSelect, onClear }) {
      if (history.length === 0) return null;

      return (
        <div className="flex flex-wrap items-center justify-center gap-2 mt-3 max-w-xl mx-auto">
          <span className="text-white/50 text-xs">최근검색:</span>
          {history.map((city, i) => (
            <button
              key={`${city}-${i}`}
              onClick={() => onSelect(city)}
              className="px-3 py-1 rounded-full bg-white/10 text-white/80 text-xs hover:bg-white/20 transition-all cursor-pointer"
            >
              {city}
            </button>
          ))}
          <button
            onClick={onClear}
            className="px-2 py-1 text-white/40 text-xs hover:text-white/70 transition-all cursor-pointer"
            aria-label="검색 기록 삭제"
          >
            ✕
          </button>
        </div>
      );
    }

    // ========================================
    // 📊 Weather Detail Item Component
    // ========================================
    function DetailItem({ icon, label, value, condition }) {
      const isDark = condition === 'Rain' || condition === 'Drizzle' || condition === 'Thunderstorm';
      return (
        <div className="flex flex-col items-center gap-1 p-3">
          <span className="text-2xl">{icon}</span>
          <span className={`text-xs ${isDark ? 'text-white/50' : 'text-gray-500'}`}>{label}</span>
          <span className={`text-sm font-semibold ${isDark ? 'text-white' : 'text-gray-800'}`}>{value}</span>
        </div>
      );
    }

    // ========================================
    // 🌡 Weather Card Component
    // ========================================
    function WeatherCard({ data }) {
      const condition = data.weather[0].main;
      const isDark = condition === 'Rain' || condition === 'Drizzle' || condition === 'Thunderstorm';
      const cardClass = isDark ? 'glass-dark' : 'glass';

      return (
        <div className="fade-in-up max-w-lg mx-auto mt-8">
          <div className={`${cardClass} rounded-3xl p-6 md:p-8 relative overflow-hidden`}>
            <WeatherAnimation condition={condition} />

            {/* City & Date */}
            <div className="text-center mb-4">
              <h2 className={`text-2xl md:text-3xl font-bold ${isDark ? 'text-white' : 'text-gray-800'}`}>
                {data.name}
                {data.sys.country && (
                  <span className={`text-base font-normal ml-2 ${isDark ? 'text-white/60' : 'text-gray-500'}`}>
                    {data.sys.country}
                  </span>
                )}
              </h2>
              <p className={`text-sm mt-1 ${isDark ? 'text-white/50' : 'text-gray-500'}`}>
                {formatKoreanDate()}
              </p>
            </div>

            {/* Main Weather */}
            <div className="flex flex-col items-center mb-6">
              <div className="relative">
                <img
                  src={`${ICON_URL}/${data.weather[0].icon}@4x.png`}
                  alt={data.weather[0].description}
                  className="w-32 h-32 md:w-40 md:h-40 pulse-glow drop-shadow-lg"
                />
              </div>
              <p className={`text-6xl md:text-7xl font-black ${getTempColor(data.main.temp)}`}>
                {Math.round(data.main.temp)}
                <span className="text-3xl md:text-4xl font-light align-top">°C</span>
              </p>
              <p className={`text-lg font-medium mt-1 capitalize ${isDark ? 'text-white/90' : 'text-gray-700'}`}>
                {data.weather[0].description}
              </p>
              <p className={`text-sm mt-1 ${isDark ? 'text-white/50' : 'text-gray-500'}`}>
                체감온도 {Math.round(data.main.feels_like)}°C
              </p>
            </div>

            {/* Min/Max */}
            <div className="flex justify-center gap-6 mb-6">
              <div className="flex items-center gap-1">
                <span className="text-blue-400 text-sm">▼</span>
                <span className={`text-sm font-medium ${isDark ? 'text-white' : 'text-gray-700'}`}>
                  최저 {Math.round(data.main.temp_min)}°C
                </span>
              </div>
              <div className="flex items-center gap-1">
                <span className="text-red-400 text-sm">▲</span>
                <span className={`text-sm font-medium ${isDark ? 'text-white' : 'text-gray-700'}`}>
                  최고 {Math.round(data.main.temp_max)}°C
                </span>
              </div>
            </div>

            {/* Divider */}
            <div className={`border-t ${isDark ? 'border-white/10' : 'border-gray-200/50'} mb-4`}></div>

            {/* Details Grid */}
            <div className="grid grid-cols-3 md:grid-cols-3 gap-2">
              <DetailItem icon="💧" label="습도" value={`${data.main.humidity}%`} condition={condition} />
              <DetailItem icon="🌬️" label="풍속" value={`${data.wind.speed} m/s`} condition={condition} />
              <DetailItem icon="🌡️" label="기압" value={`${data.main.pressure} hPa`} condition={condition} />
              <DetailItem icon="👁️" label="가시거리" value={formatVisibility(data.visibility)} condition={condition} />
              <DetailItem icon="🌅" label="일출" value={formatTime(data.sys.sunrise, data.timezone)} condition={condition} />
              <DetailItem icon="🌇" label="일몰" value={formatTime(data.sys.sunset, data.timezone)} condition={condition} />
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [weather, setWeather] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [condition, setCondition] = useState('Default');
      const [history, setHistory] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('weather_history') || '[]');
        } catch {
          return [];
        }
      });

      const addToHistory = useCallback((city) => {
        setHistory(prev => {
          const filtered = prev.filter(c => c.toLowerCase() !== city.toLowerCase());
          const updated = [city, ...filtered].slice(0, 5);
          localStorage.setItem('weather_history', JSON.stringify(updated));
          return updated;
        });
      }, []);

      const clearHistory = useCallback(() => {
        setHistory([]);
        localStorage.removeItem('weather_history');
      }, []);

      const searchWeather = useCallback(async (city) => {
        setLoading(true);
        setError(null);
        setWeather(null);

        try {
          const url = `${API_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=kr`;
          const res = await fetch(url);

          if (!res.ok) {
            if (res.status === 404) {
              throw new Error('도시를 찾을 수 없습니다');
            }
            throw new Error('날씨 정보를 가져올 수 없습니다');
          }

          const data = await res.json();
          setWeather(data);
          setCondition(data.weather[0].main);
          addToHistory(city);
        } catch (err) {
          setError(err.message);
          setCondition('Default');
        } finally {
          setLoading(false);
        }
      }, [addToHistory]);

      // 좌표로 날씨 검색
      const searchByCoords = useCallback(async (lat, lon) => {
        setLoading(true);
        setError(null);
        setWeather(null);

        try {
          const url = `${API_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`;
          const res = await fetch(url);

          if (!res.ok) throw new Error('날씨 정보를 가져올 수 없습니다');

          const data = await res.json();
          setWeather(data);
          setCondition(data.weather[0].main);
        } catch (err) {
          setError(err.message);
          setCondition('Default');
        } finally {
          setLoading(false);
        }
      }, []);

      // 앱 시작 시 사용자 위치로 자동 검색
      useEffect(() => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => searchByCoords(pos.coords.latitude, pos.coords.longitude),
            () => { /* 위치 권한 거부 시 아무것도 안 함 */ }
          );
        }
      }, []);

      const gradient = useMemo(() => getGradient(condition), [condition]);
      const textColor = useMemo(() => getTextColor(condition), [condition]);

      return (
        <div className={`min-h-screen bg-gradient-to-br ${gradient} transition-all duration-1000 px-4 py-8 md:py-12`}>
          <div className="max-w-2xl mx-auto">
            {/* Header */}
            <div className="text-center mb-8">
              <h1 className={`text-4xl md:text-5xl font-black ${condition === 'Rain' || condition === 'Drizzle' || condition === 'Thunderstorm' ? 'text-white' : 'text-white'} drop-shadow-lg`}>
                날씨 검색
              </h1>
              <p className="text-white/60 mt-2 text-sm">전 세계 도시의 실시간 날씨를 확인하세요</p>
            </div>

            {/* Search */}
            <SearchBar onSearch={searchWeather} loading={loading} />

            {/* 현재 위치 버튼 */}
            <div className="text-center mt-3">
              <button
                onClick={() => {
                  if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                      (pos) => searchByCoords(pos.coords.latitude, pos.coords.longitude),
                      () => setError('위치 권한이 거부되었습니다. 브라우저 설정을 확인하세요.')
                    );
                  } else {
                    setError('이 브라우저에서는 위치 서비스를 지원하지 않습니다.');
                  }
                }}
                disabled={loading}
                className="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white text-sm px-4 py-2 rounded-full transition-colors backdrop-blur-sm disabled:opacity-50"
              >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                현재 위치 날씨
              </button>
            </div>

            {/* Search History */}
            <SearchHistory history={history} onSelect={searchWeather} onClear={clearHistory} />

            {/* Popular Cities */}
            <div className="mt-4">
              <p className="text-center text-white/50 text-xs mb-2">인기 도시</p>
              <PopularCities onSelect={searchWeather} condition={condition} />
            </div>

            {/* Content */}
            {loading && <LoadingSpinner />}
            {error && <ErrorMessage message={error} />}
            {weather && !loading && <WeatherCard data={weather} />}

            {/* Empty State */}
            {!weather && !loading && !error && (
              <div className="text-center mt-16 fade-in-up">
                <div className="text-7xl mb-4 float-anim inline-block">🌤️</div>
                <p className="text-white/50 text-lg">도시를 검색하여 날씨를 확인하세요</p>
              </div>
            )}
          </div>

          {/* Footer */}
          <p className="text-center text-white/30 text-xs mt-12">
            Powered by OpenWeatherMap API
          </p>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
