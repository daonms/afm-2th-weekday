<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음이 - AI 심리상담 챗봇</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] },
          colors: {
            mint: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' },
            lavender: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7' },
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-dot { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .msg-enter { animation: fadeInUp 0.35s ease-out; }
    .typing-dot { animation: pulse-dot 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .float-gentle { animation: float 4s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body class="bg-gradient-to-br from-mint-50 via-white to-lavender-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE_URL = '/api';

    // ========================================
    // 1. Design System Components
    // ========================================

    function Avatar({ isBot, size = 'md' }) {
      const s = size === 'sm' ? 'w-8 h-8 text-sm' : 'w-10 h-10 text-lg';
      if (isBot) {
        return (
          <div className={`${s} rounded-full bg-gradient-to-br from-mint-400 to-mint-600 flex items-center justify-center text-white shadow-md flex-shrink-0`}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 21a9 9 0 0 0 9-9H3a9 9 0 0 0 9 9Z"/>
              <path d="M12 3a9 9 0 0 1 9 9"/>
              <path d="M12 3a9 9 0 0 0-9 9"/>
              <circle cx="9" cy="10" r="1.5" fill="currentColor"/>
              <circle cx="15" cy="10" r="1.5" fill="currentColor"/>
            </svg>
          </div>
        );
      }
      return (
        <div className={`${s} rounded-full bg-gradient-to-br from-lavender-300 to-lavender-500 flex items-center justify-center text-white shadow-md flex-shrink-0`}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2 msg-enter">
          <Avatar isBot />
          <div className="bg-white rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm border border-gray-100">
            <div className="flex gap-1.5">
              <div className="w-2 h-2 bg-mint-400 rounded-full typing-dot" />
              <div className="w-2 h-2 bg-mint-400 rounded-full typing-dot" />
              <div className="w-2 h-2 bg-mint-400 rounded-full typing-dot" />
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 2. Chat Bubble Component
    // ========================================

    function ChatBubble({ message }) {
      const isUser = message.role === 'user';
      const time = message.time;

      return (
        <div className={`flex items-end gap-2 msg-enter ${isUser ? 'flex-row-reverse' : ''}`}>
          <Avatar isBot={!isUser} size="md" />
          <div className={`max-w-[75%] flex flex-col ${isUser ? 'items-end' : 'items-start'}`}>
            <div className={`px-4 py-2.5 shadow-sm whitespace-pre-wrap text-sm leading-relaxed ${
              isUser
                ? 'bg-gradient-to-r from-lavender-400 to-lavender-500 text-white rounded-2xl rounded-br-sm'
                : 'bg-white text-gray-700 rounded-2xl rounded-bl-sm border border-gray-100'
            }`}>
              {message.content}
            </div>
            <span className="text-[10px] text-gray-300 mt-1 px-1">{time}</span>
          </div>
        </div>
      );
    }

    // ========================================
    // 3. Quick Reply Buttons
    // ========================================

    const QUICK_REPLIES = [
      { emoji: '😔', text: '요즘 기분이 우울해요' },
      { emoji: '😰', text: '불안한 마음이 들어요' },
      { emoji: '😤', text: '화가 나는 일이 있어요' },
      { emoji: '😴', text: '잠을 잘 못 자요' },
      { emoji: '🤔', text: '고민이 있어요' },
      { emoji: '💪', text: '자존감을 높이고 싶어요' },
    ];

    function QuickReplies({ onSelect, visible }) {
      if (!visible) return null;
      return (
        <div className="px-4 py-3">
          <p className="text-xs text-gray-400 mb-2 text-center">이런 이야기를 나눠볼까요?</p>
          <div className="flex flex-wrap gap-2 justify-center">
            {QUICK_REPLIES.map((item, i) => (
              <button
                key={i}
                onClick={() => onSelect(item.text)}
                className="bg-white hover:bg-mint-50 border border-gray-200 hover:border-mint-300 rounded-full px-3 py-1.5 text-xs text-gray-600 hover:text-mint-700 transition-all shadow-sm hover:shadow"
              >
                {item.emoji} {item.text}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 4. Welcome Screen
    // ========================================

    function WelcomeScreen({ onStart }) {
      return (
        <div className="flex-1 flex flex-col items-center justify-center p-8 text-center">
          <div className="float-gentle mb-6">
            <div className="w-24 h-24 rounded-full bg-gradient-to-br from-mint-300 to-mint-500 flex items-center justify-center shadow-xl">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 21a9 9 0 0 0 9-9H3a9 9 0 0 0 9 9Z"/>
                <path d="M12 3a9 9 0 0 1 9 9"/>
                <path d="M12 3a9 9 0 0 0-9 9"/>
                <circle cx="9" cy="10" r="1.5" fill="white"/>
                <circle cx="15" cy="10" r="1.5" fill="white"/>
              </svg>
            </div>
          </div>
          <h2 className="text-2xl font-bold text-gray-700 mb-2">안녕하세요, 마음이입니다</h2>
          <p className="text-gray-400 text-sm mb-1">AI 심리상담 챗봇</p>
          <p className="text-gray-300 text-xs mb-8 max-w-xs leading-relaxed">
            편하게 마음속 이야기를 나눠보세요.<br/>
            모든 대화는 저장되지 않으며, 비밀이 보장됩니다.
          </p>
          <button
            onClick={onStart}
            className="bg-gradient-to-r from-mint-400 to-mint-600 hover:from-mint-500 hover:to-mint-700 text-white px-8 py-3 rounded-full font-medium shadow-lg hover:shadow-xl transition-all text-sm"
          >
            상담 시작하기
          </button>
          <p className="text-[10px] text-gray-300 mt-6 max-w-xs">
            * 본 서비스는 AI 기반 상담으로, 전문 의료 상담을 대체하지 않습니다.
            위기 상황 시 자살예방상담전화 1393으로 연락해주세요.
          </p>
        </div>
      );
    }

    // ========================================
    // 5. App Component
    // ========================================

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [started, setStarted] = useState(false);
      const [error, setError] = useState('');
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => { scrollToBottom(); }, [messages, loading]);

      const getNow = () => {
        const d = new Date();
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      };

      const handleStart = async () => {
        setStarted(true);
        setLoading(true);
        setError('');

        try {
          const res = await fetch(`${API_BASE_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: [] }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          setMessages([{ role: 'assistant', content: data.reply, time: getNow() }]);
        } catch (e) {
          setMessages([{
            role: 'assistant',
            content: '안녕하세요, 마음이입니다. 오늘 어떤 이야기를 나누고 싶으신가요?',
            time: getNow(),
          }]);
          if (e.message.includes('API 키')) setError(e.message);
        }
        setLoading(false);
        setTimeout(() => inputRef.current?.focus(), 100);
      };

      const sendMessage = useCallback(async (text) => {
        const trimmed = (text || input).trim();
        if (!trimmed || loading) return;

        const userMsg = { role: 'user', content: trimmed, time: getNow() };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput('');
        setLoading(true);
        setError('');

        try {
          const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
          const res = await fetch(`${API_BASE_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: apiMessages }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          setMessages(prev => [...prev, { role: 'assistant', content: data.reply, time: getNow() }]);
        } catch (e) {
          setError(e.message || '응답을 받지 못했습니다.');
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: '죄송합니다. 일시적인 오류가 발생했어요. 잠시 후 다시 말씀해주세요.',
            time: getNow(),
          }]);
        }
        setLoading(false);
        inputRef.current?.focus();
      }, [input, messages, loading]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const handleReset = () => {
        setMessages([]);
        setStarted(false);
        setInput('');
        setError('');
      };

      const showQuickReplies = started && messages.length <= 2 && !loading;

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
            <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-full bg-gradient-to-br from-mint-400 to-mint-600 flex items-center justify-center shadow-sm">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 21a9 9 0 0 0 9-9H3a9 9 0 0 0 9 9Z"/>
                    <path d="M12 3a9 9 0 0 1 9 9"/>
                    <path d="M12 3a9 9 0 0 0-9 9"/>
                    <circle cx="9" cy="10" r="1.5" fill="white"/>
                    <circle cx="15" cy="10" r="1.5" fill="white"/>
                  </svg>
                </div>
                <div>
                  <h1 className="text-sm font-bold text-gray-700">마음이</h1>
                  <p className="text-[10px] text-mint-500 font-medium">
                    {loading ? '입력 중...' : 'AI 심리상담'}
                  </p>
                </div>
              </div>
              {started && (
                <button
                  onClick={handleReset}
                  className="text-xs text-gray-400 hover:text-red-400 transition-colors px-3 py-1.5 rounded-full hover:bg-red-50"
                >
                  새 상담
                </button>
              )}
            </div>
          </header>

          {/* Chat Area */}
          <div className="flex-1 flex flex-col max-w-2xl mx-auto w-full">
            {!started ? (
              <WelcomeScreen onStart={handleStart} />
            ) : (
              <>
                <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
                  {messages.map((msg, i) => (
                    <ChatBubble key={i} message={msg} />
                  ))}
                  {loading && <TypingIndicator />}
                  <div ref={messagesEndRef} />
                </div>

                <QuickReplies visible={showQuickReplies} onSelect={(text) => sendMessage(text)} />

                {/* Error */}
                {error && (
                  <div className="px-4">
                    <div className="bg-red-50 text-red-500 text-xs px-3 py-2 rounded-lg text-center mb-2">
                      {error}
                    </div>
                  </div>
                )}

                {/* Input Area */}
                <div className="border-t border-gray-100 bg-white/80 backdrop-blur-md p-3 sticky bottom-0">
                  <div className="max-w-2xl mx-auto flex items-end gap-2">
                    <textarea
                      ref={inputRef}
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={handleKeyDown}
                      placeholder="마음속 이야기를 편하게 적어주세요..."
                      rows="1"
                      className="flex-1 resize-none rounded-2xl border border-gray-200 focus:border-mint-400 focus:ring-2 focus:ring-mint-100 px-4 py-2.5 text-sm outline-none transition-all bg-gray-50 focus:bg-white"
                      style={{ maxHeight: '120px' }}
                      onInput={(e) => {
                        e.target.style.height = 'auto';
                        e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
                      }}
                      disabled={loading}
                    />
                    <button
                      onClick={() => sendMessage()}
                      disabled={loading || !input.trim()}
                      className="bg-gradient-to-r from-mint-400 to-mint-600 hover:from-mint-500 hover:to-mint-700 disabled:from-gray-200 disabled:to-gray-300 text-white rounded-full w-10 h-10 flex items-center justify-center flex-shrink-0 shadow-sm hover:shadow-md transition-all disabled:shadow-none"
                    >
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                      </svg>
                    </button>
                  </div>
                  <p className="text-center text-[10px] text-gray-300 mt-2">
                    AI 상담은 전문 의료 상담을 대체하지 않습니다 | 위기상담 1393
                  </p>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 6. Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
