<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Message Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon: '#39ff14',
            'neon-dim': '#1a8a0a',
            cyber: {
              900: '#0a0a0f',
              800: '#12121a',
              700: '#1a1a2e',
              600: '#252540',
            }
          },
          fontFamily: {
            mono: ['"Courier New"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
      20%, 40%, 60%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.6s ease-in-out; }

    @keyframes unlockBounce {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.3); }
      50% { transform: scale(0.9); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .unlock-bounce { animation: unlockBounce 0.8s ease-out; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-slide-up { animation: fadeSlideUp 0.6s ease-out forwards; }

    @keyframes pulse-neon {
      0%, 100% { box-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14; }
      50% { box-shadow: 0 0 15px #39ff14, 0 0 30px #39ff14, 0 0 45px #39ff14; }
    }
    .pulse-neon { animation: pulse-neon 2s ease-in-out infinite; }

    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: confetti-fall linear forwards;
      z-index: 100;
    }

    @keyframes blink-cursor {
      0%, 100% { border-color: #39ff14; }
      50% { border-color: transparent; }
    }
    .blink-cursor { border-right: 2px solid #39ff14; animation: blink-cursor 0.8s step-end infinite; }

    @keyframes scanline {
      0% { top: -10%; }
      100% { top: 110%; }
    }
    .scanline::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to bottom, transparent, rgba(57,255,20,0.1), transparent);
      animation: scanline 4s linear infinite;
      pointer-events: none;
    }

    body {
      background: #0a0a0f;
      overflow: hidden;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

    // ========================================
    // Constants
    // ========================================
    const MAX_ATTEMPTS = 3;
    const LOCKOUT_SECONDS = 10;
    const PIN_LENGTH = 4;
    const API_BASE = window.location.origin;

    // ========================================
    // Server API Functions
    // ========================================
    async function apiCheckPassword(password) {
      const res = await fetch(`${API_BASE}/api/check`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      return res.json();
    }

    async function apiChangePassword(currentPassword, newPassword) {
      const res = await fetch(`${API_BASE}/api/change`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword, newPassword }),
      });
      return res.json();
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', disabled, onClick, className = '', ...props }) {
      const base = 'font-bold rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-neon/50 disabled:opacity-40 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-neon text-cyber-900 hover:bg-green-300 hover:shadow-[0_0_20px_rgba(57,255,20,0.5)] active:scale-95',
        secondary: 'bg-cyber-600 text-neon border border-neon/30 hover:border-neon/60 hover:bg-cyber-700 active:scale-95',
        ghost: 'bg-transparent text-neon/70 hover:text-neon hover:bg-neon/10 active:scale-95',
        danger: 'bg-red-600/20 text-red-400 border border-red-500/30 hover:bg-red-600/30 active:scale-95',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-8 py-3.5 text-lg',
      };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          disabled={disabled}
          onClick={onClick}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-cyber-800 border border-neon/10 rounded-2xl shadow-lg shadow-neon/5 ${className}`}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" />
          <div
            className={`relative w-full ${sizes[size]} bg-cyber-800 border border-neon/20 rounded-2xl shadow-2xl shadow-neon/10 fade-slide-up`}
            onClick={e => e.stopPropagation()}
          >
            <div className="flex items-center justify-between p-5 border-b border-neon/10">
              <h2 className="text-neon font-bold text-lg">{title}</h2>
              <button onClick={onClose} className="text-neon/50 hover:text-neon text-2xl leading-none">&times;</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔒 Lock Icon Components
    // ========================================

    function LockIcon({ unlocked = false, className = '' }) {
      return (
        <svg className={className} viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          {/* Shackle */}
          <path
            d={unlocked
              ? "M18 32 V22 C18 13.2 22 8 32 8 C42 8 46 13.2 46 22 V24"
              : "M18 32 V22 C18 13.2 22 8 32 8 C42 8 46 13.2 46 22 V32"
            }
            stroke="currentColor"
            strokeWidth="5"
            strokeLinecap="round"
            fill="none"
            style={{
              transition: 'all 0.5s ease',
              transform: unlocked ? 'translateX(6px) translateY(-4px)' : 'none',
            }}
          />
          {/* Body */}
          <rect x="10" y="32" width="44" height="34" rx="6" fill="currentColor" opacity="0.9" />
          {/* Keyhole */}
          <circle cx="32" cy="46" r="5" fill="#0a0a0f" />
          <rect x="30" y="48" width="4" height="10" rx="2" fill="#0a0a0f" />
        </svg>
      );
    }

    // ========================================
    // 🎊 Confetti Component
    // ========================================

    function Confetti({ active }) {
      const [pieces, setPieces] = useState([]);

      useEffect(() => {
        if (!active) { setPieces([]); return; }
        const colors = ['#39ff14', '#ff3961', '#3961ff', '#ffcc00', '#ff61f9', '#00ffcc'];
        const newPieces = Array.from({ length: 60 }, (_, i) => ({
          id: i,
          left: Math.random() * 100,
          color: colors[Math.floor(Math.random() * colors.length)],
          delay: Math.random() * 2,
          duration: 2 + Math.random() * 2,
          size: 6 + Math.random() * 8,
          shape: Math.random() > 0.5 ? 'circle' : 'rect',
        }));
        setPieces(newPieces);
        const timer = setTimeout(() => setPieces([]), 4500);
        return () => clearTimeout(timer);
      }, [active]);

      return (
        <>
          {pieces.map(p => (
            <div
              key={p.id}
              className="confetti-piece"
              style={{
                left: `${p.left}%`,
                backgroundColor: p.color,
                width: p.size,
                height: p.size,
                borderRadius: p.shape === 'circle' ? '50%' : '2px',
                animationDelay: `${p.delay}s`,
                animationDuration: `${p.duration}s`,
              }}
            />
          ))}
        </>
      );
    }

    // ========================================
    // ⌨️ Keypad Component
    // ========================================

    function Keypad({ onDigit, onDelete, onSubmit, disabled }) {
      const keys = [
        ['1', '2', '3'],
        ['4', '5', '6'],
        ['7', '8', '9'],
        ['DEL', '0', 'OK'],
      ];
      return (
        <div className="grid grid-cols-3 gap-2 max-w-[260px] mx-auto mt-5">
          {keys.flat().map(key => {
            const isAction = key === 'DEL' || key === 'OK';
            return (
              <button
                key={key}
                disabled={disabled}
                onClick={() => {
                  if (key === 'DEL') onDelete();
                  else if (key === 'OK') onSubmit();
                  else onDigit(key);
                }}
                className={`
                  h-14 rounded-xl font-bold text-lg transition-all duration-150
                  focus:outline-none focus:ring-2 focus:ring-neon/40
                  disabled:opacity-30 disabled:cursor-not-allowed
                  active:scale-90
                  ${key === 'OK'
                    ? 'bg-neon text-cyber-900 hover:bg-green-300 hover:shadow-[0_0_15px_rgba(57,255,20,0.4)]'
                    : key === 'DEL'
                    ? 'bg-red-900/40 text-red-400 border border-red-500/30 hover:bg-red-900/60'
                    : 'bg-cyber-700 text-neon/90 border border-neon/15 hover:border-neon/40 hover:bg-cyber-600'
                  }
                `}
              >
                {key === 'DEL' ? '⌫' : key}
              </button>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 🔘 PIN Display Component
    // ========================================

    function PinDisplay({ length, filled, shake }) {
      return (
        <div className={`flex gap-3 justify-center my-5 ${shake ? 'shake' : ''}`}>
          {Array.from({ length }, (_, i) => (
            <div
              key={i}
              className={`
                w-12 h-14 rounded-lg border-2 flex items-center justify-center text-2xl font-bold
                transition-all duration-200
                ${i < filled
                  ? 'border-neon bg-neon/10 text-neon shadow-[0_0_10px_rgba(57,255,20,0.3)]'
                  : 'border-neon/20 bg-cyber-700 text-transparent'
                }
              `}
            >
              {i < filled ? '●' : '○'}
            </div>
          ))}
        </div>
      );
    }

    // ========================================
    // ✍️ Typing Effect Component
    // ========================================

    function TypingText({ text, speed = 40 }) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);

      useEffect(() => {
        setDisplayed('');
        setDone(false);
        let i = 0;
        const interval = setInterval(() => {
          i++;
          setDisplayed(text.slice(0, i));
          if (i >= text.length) {
            clearInterval(interval);
            setDone(true);
          }
        }, speed);
        return () => clearInterval(interval);
      }, [text, speed]);

      return (
        <p className={`font-mono text-neon/90 whitespace-pre-wrap leading-relaxed text-sm sm:text-base ${!done ? 'blink-cursor' : ''}`}>
          {displayed}
        </p>
      );
    }

    // ========================================
    // ⚙️ Settings Modal Component
    // ========================================

    function SettingsModal({ isOpen, onClose }) {
      const [currentPw, setCurrentPw] = useState('');
      const [newPw, setNewPw] = useState('');
      const [newMsg, setNewMsg] = useState('');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [verified, setVerified] = useState(false);

      useEffect(() => {
        if (isOpen) {
          setCurrentPw('');
          setNewPw('');
          setNewMsg('');
          setError('');
          setSuccess('');
          setVerified(false);
        }
      }, [isOpen]);

      const [verifying, setVerifying] = useState(false);

      const handleVerify = async () => {
        setVerifying(true);
        try {
          const result = await apiCheckPassword(currentPw);
          if (result.success) {
            setVerified(true);
            setError('');
          } else {
            setError('현재 비밀번호가 일치하지 않습니다.');
          }
        } catch {
          setError('서버 연결 실패');
        } finally {
          setVerifying(false);
        }
      };

      const handleSave = async () => {
        if (newPw && newPw.length !== PIN_LENGTH) {
          setError(`비밀번호는 ${PIN_LENGTH}자리 숫자여야 합니다.`);
          return;
        }
        if (newPw && !/^\d+$/.test(newPw)) {
          setError('비밀번호는 숫자만 가능합니다.');
          return;
        }
        if (newPw) {
          try {
            const result = await apiChangePassword(currentPw, newPw);
            if (!result.success) {
              setError(result.message);
              return;
            }
          } catch {
            setError('서버 연결 실패');
            return;
          }
        }
        setSuccess('설정이 저장되었습니다!');
        setError('');
        setTimeout(() => { onClose(); }, 1200);
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="⚙️ 설정">
          {!verified ? (
            <div className="space-y-4">
              <p className="text-neon/60 text-sm">설정을 변경하려면 현재 비밀번호를 입력하세요.</p>
              <input
                type="password"
                maxLength={PIN_LENGTH}
                value={currentPw}
                onChange={e => setCurrentPw(e.target.value.replace(/\D/g, '').slice(0, PIN_LENGTH))}
                onKeyDown={e => e.key === 'Enter' && handleVerify()}
                placeholder="현재 비밀번호"
                className="w-full bg-cyber-700 border border-neon/20 rounded-lg px-4 py-3 text-neon font-mono text-center tracking-[0.5em] focus:outline-none focus:border-neon/60 placeholder:tracking-normal placeholder:text-neon/30"
              />
              {error && <p className="text-red-400 text-sm text-center">{error}</p>}
              <Button onClick={handleVerify} className="w-full">확인</Button>
            </div>
          ) : (
            <div className="space-y-4">
              <div>
                <label className="block text-neon/60 text-sm mb-1">새 비밀번호 ({PIN_LENGTH}자리 숫자, 변경 시에만 입력)</label>
                <input
                  type="password"
                  maxLength={PIN_LENGTH}
                  value={newPw}
                  onChange={e => setNewPw(e.target.value.replace(/\D/g, '').slice(0, PIN_LENGTH))}
                  placeholder="새 비밀번호 (선택)"
                  className="w-full bg-cyber-700 border border-neon/20 rounded-lg px-4 py-3 text-neon font-mono text-center tracking-[0.5em] focus:outline-none focus:border-neon/60 placeholder:tracking-normal placeholder:text-neon/30"
                />
              </div>
              <div>
                <label className="block text-neon/60 text-sm mb-1">숨겨진 메시지</label>
                <textarea
                  value={newMsg}
                  onChange={e => setNewMsg(e.target.value)}
                  rows={5}
                  className="w-full bg-cyber-700 border border-neon/20 rounded-lg px-4 py-3 text-neon/90 font-mono text-sm focus:outline-none focus:border-neon/60 resize-none"
                />
              </div>
              {error && <p className="text-red-400 text-sm text-center">{error}</p>}
              {success && <p className="text-neon text-sm text-center">{success}</p>}
              <div className="flex gap-3">
                <Button variant="secondary" onClick={onClose} className="flex-1">취소</Button>
                <Button onClick={handleSave} className="flex-1">저장</Button>
              </div>
            </div>
          )}
        </Modal>
      );
    }

    // ========================================
    // 📄 Lock Screen Page
    // ========================================

    function LockScreen({ onUnlock }) {
      const [pin, setPin] = useState('');
      const [shaking, setShaking] = useState(false);
      const [error, setError] = useState('');
      const [attempts, setAttempts] = useState(0);
      const [locked, setLocked] = useState(false);
      const [lockTimer, setLockTimer] = useState(0);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const timerRef = useRef(null);

      useEffect(() => {
        if (!locked) return;
        setLockTimer(LOCKOUT_SECONDS);
        timerRef.current = setInterval(() => {
          setLockTimer(prev => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              setLocked(false);
              setAttempts(0);
              setError('');
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [locked]);

      // Keyboard support
      useEffect(() => {
        const handleKey = (e) => {
          if (settingsOpen || locked) return;
          if (/^\d$/.test(e.key) && pin.length < PIN_LENGTH) {
            setPin(prev => prev + e.key);
            setError('');
          } else if (e.key === 'Backspace') {
            setPin(prev => prev.slice(0, -1));
          } else if (e.key === 'Enter' && pin.length === PIN_LENGTH) {
            handleSubmit();
          }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [pin, locked, settingsOpen]);

      const handleDigit = (d) => {
        if (pin.length >= PIN_LENGTH || locked) return;
        setPin(prev => prev + d);
        setError('');
      };

      const handleDelete = () => {
        setPin(prev => prev.slice(0, -1));
      };

      const [checking, setChecking] = useState(false);
      const [serverMessage, setServerMessage] = useState('');

      const handleSubmit = async () => {
        if (pin.length !== PIN_LENGTH || locked || checking) return;
        setChecking(true);
        try {
          const result = await apiCheckPassword(pin);
          if (result.success) {
            setServerMessage(result.message);
            onUnlock(result.message);
          } else {
            const newAttempts = attempts + 1;
            setAttempts(newAttempts);
            setShaking(true);
            setTimeout(() => setShaking(false), 700);
            setPin('');
            if (newAttempts >= MAX_ATTEMPTS) {
              setLocked(true);
              setError(`${MAX_ATTEMPTS}회 실패! ${LOCKOUT_SECONDS}초 후 다시 시도하세요.`);
            } else {
              setError(`${result.message} (${newAttempts}/${MAX_ATTEMPTS})`);
            }
          }
        } catch (err) {
          setError('서버 연결 실패. node server.js 실행 확인!');
        } finally {
          setChecking(false);
        }
      };

      // Auto-submit disabled: user must press OK or Enter

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 relative scanline">
          {/* Background grid */}
          <div className="fixed inset-0 opacity-5"
            style={{
              backgroundImage: 'linear-gradient(#39ff14 1px, transparent 1px), linear-gradient(90deg, #39ff14 1px, transparent 1px)',
              backgroundSize: '40px 40px',
            }}
          />

          {/* Settings button */}
          <button
            onClick={() => setSettingsOpen(true)}
            className="absolute top-4 right-4 text-neon/30 hover:text-neon transition-colors p-2 z-10"
            aria-label="설정"
          >
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>

          {/* Main content */}
          <div className="relative z-10 w-full max-w-xs">
            {/* Lock icon */}
            <div className="flex justify-center mb-2">
              <LockIcon className="w-20 h-20 text-neon pulse-neon rounded-full" />
            </div>

            <h1 className="text-center text-neon font-bold text-xl mb-1 tracking-wider">SECRET VAULT</h1>
            <p className="text-center text-neon/40 text-xs mb-5 font-mono">비밀번호를 입력하세요</p>

            {/* PIN display */}
            <PinDisplay length={PIN_LENGTH} filled={pin.length} shake={shaking} />

            {/* Error / Lock message */}
            {error && (
              <p className={`text-center text-sm mb-2 ${locked ? 'text-red-400' : 'text-red-400'}`}>
                {locked ? `🔒 ${error.replace(/\d+초/, lockTimer + '초')}` : error}
              </p>
            )}

            {/* Attempt counter */}
            {attempts > 0 && !locked && (
              <p className="text-center text-neon/30 text-xs mb-1">
                시도 횟수: {attempts}/{MAX_ATTEMPTS}
              </p>
            )}

            {/* Keypad */}
            <Keypad
              onDigit={handleDigit}
              onDelete={handleDelete}
              onSubmit={handleSubmit}
              disabled={locked}
            />

            <p className="text-center text-neon/20 text-[10px] mt-6 font-mono">
              키보드 숫자키 + Enter로도 입력 가능
            </p>
          </div>

          <SettingsModal isOpen={settingsOpen} onClose={() => setSettingsOpen(false)} />
        </div>
      );
    }

    // ========================================
    // 📄 Secret Message Page
    // ========================================

    function SecretPage({ onLock, message }) {
      const [showConfetti, setShowConfetti] = useState(true);
      const [showContent, setShowContent] = useState(false);

      useEffect(() => {
        // Small delay before showing text
        const t = setTimeout(() => setShowContent(true), 800);
        return () => clearTimeout(t);
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 relative scanline">
          <Confetti active={showConfetti} />

          {/* Background grid */}
          <div className="fixed inset-0 opacity-5"
            style={{
              backgroundImage: 'linear-gradient(#39ff14 1px, transparent 1px), linear-gradient(90deg, #39ff14 1px, transparent 1px)',
              backgroundSize: '40px 40px',
            }}
          />

          <div className="relative z-10 w-full max-w-md">
            {/* Unlocked icon */}
            <div className="flex justify-center mb-4 unlock-bounce">
              <LockIcon unlocked className="w-16 h-16 text-neon" />
            </div>

            <h2 className="text-center text-neon font-bold text-lg mb-1 tracking-wider fade-slide-up">
              ACCESS GRANTED
            </h2>
            <p className="text-center text-neon/40 text-xs mb-6 font-mono fade-slide-up" style={{ animationDelay: '0.2s' }}>
              잠금이 해제되었습니다
            </p>

            {/* Message card */}
            {showContent && (
              <Card className="p-5 mb-6 fade-slide-up">
                <div className="flex items-center gap-2 mb-3 border-b border-neon/10 pb-3">
                  <span className="text-neon">📨</span>
                  <span className="text-neon/60 text-sm font-mono">SECRET_MESSAGE.txt</span>
                </div>
                <TypingText text={message} speed={30} />
              </Card>
            )}

            {/* Back button */}
            <div className="flex justify-center fade-slide-up" style={{ animationDelay: '0.4s' }}>
              <Button variant="secondary" onClick={onLock}>
                🔒 잠금 화면으로 돌아가기
              </Button>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [unlocked, setUnlocked] = useState(false);
      const [secretMsg, setSecretMsg] = useState('');

      return unlocked
        ? <SecretPage message={secretMsg} onLock={() => { setUnlocked(false); setSecretMsg(''); }} />
        : <LockScreen onUnlock={(msg) => { setSecretMsg(msg); setUnlocked(true); }} />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
