// DALL-E 2: 이미지를 정사각형 PNG(RGBA)로 변환
function toSquarePng(dataUrl, maxSize = 1024) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const size = Math.min(Math.max(img.width, img.height), maxSize);
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      // 투명 배경 (RGBA 필수)
      ctx.clearRect(0, 0, size, size);
      // 중앙 정렬
      const sx = (size - img.width) / 2;
      const sy = (size - img.height) / 2;
      ctx.drawImage(img, sx, sy, img.width, img.height);
      resolve(canvas.toDataURL('image/png'));
    };
    img.src = dataUrl;
  });
}

// ==============================
// 이미지 업로드 영역
// ==============================
function UploadZone({ image, imageInfo, onImage, onClear }) {
  const inputRef = useRef(null);
  const [processing, setProcessing] = React.useState(false);

  const handleFile = async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    if (file.size > 20 * 1024 * 1024) { alert('20MB 이하 이미지만 업로드 가능합니다.'); return; }
    setProcessing(true);
    const reader = new FileReader();
    reader.onload = async (e) => {
      const squared = await toSquarePng(e.target.result, 1024);
      onImage(squared, { name: file.name, originalSize: file.size });
      setProcessing(false);
    };
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
  };

  if (processing) {
    return (
      <div className="border-2 border-dashed border-purple-500/40 rounded-xl p-8 text-center">
        <div className="text-2xl mb-2 spin inline-block">⚙️</div>
        <p className="text-white/50 text-sm">정사각형 PNG로 변환 중...</p>
      </div>
    );
  }

  if (image) {
    return (
      <div className="relative rounded-xl overflow-hidden border border-purple-500/40">
        <img src={image} alt="업로드된 이미지" className="w-full max-h-64 object-contain bg-black" />
        <button
          onClick={onClear}
          className="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/70 hover:bg-red-600 text-white text-sm flex items-center justify-center transition-colors"
        >
          ✕
        </button>
        <div className="absolute bottom-2 left-2 px-2 py-1 rounded bg-black/60 text-xs text-white/60">
          ✅ 정사각형 PNG 변환 완료
        </div>
      </div>
    );
  }

  return (
    <div
      onDrop={handleDrop}
      onDragOver={e => e.preventDefault()}
      onClick={() => inputRef.current?.click()}
      className="border-2 border-dashed border-white/20 hover:border-purple-500/50 rounded-xl p-8 text-center cursor-pointer transition-colors"
    >
      <div className="text-3xl mb-2">🖼️</div>
      <p className="text-white/60 text-sm">클릭하거나 이미지를 드래그</p>
      <p className="text-white/30 text-xs mt-1">PNG, JPG · 최대 4MB</p>
      <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={e => handleFile(e.target.files[0])} />
    </div>
  );
}

  const [mode, setMode]                   = useState('text'); // 'text' | 'image' | 'logo'

  const [pptSubtitle, setPptSubtitle]     = useState('');
  const [pptSlideType, setPptSlideType]   = useState('cover');
  const [pptTheme, setPptTheme]           = useState('business');
  const [pptLayout, setPptLayout]         = useState('centered');
  const [pptColor, setPptColor]           = useState('blue');
  const [pptRatio, setPptRatio]           = useState('1792x1024'); // 16:9

  const [selectedStyle, setSelectedStyle] = useState('ghibli');
  const [selectedSize, setSelectedSize]   = useState('1024x1024');
  const [quality, setQuality]             = useState('standard');
  const [prompt, setPrompt]               = useState('');
  const [loading, setLoading]             = useState(false);
  const [error, setError]                 = useState('');
  const [gallery, setGallery]             = useState([]);
  const [modalItem, setModalItem]         = useState(null);
  const [currentImg, setCurrentImg]       = useState(null);

  const textareaRef = useRef(null);

  // 텍스트 → DALL-E 3 생성
  const generateText = useCallback(async () => {
    if (!prompt.trim()) { setError('프롬프트를 입력해주세요.'); textareaRef.current?.focus(); return; }
    setLoading(true); setError(''); setCurrentImg(null);
    try {
      const res  = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: prompt.trim(), style: selectedStyle, size: selectedSize, quality }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || '생성 실패');
      const item = { id: Date.now(), url: data.url, prompt: prompt.trim(), style: selectedStyle, size: selectedSize, revised: data.revised_prompt, createdAt: new Date().toLocaleTimeString() };
      setCurrentImg(item);
      setGallery(prev => [item, ...prev].slice(0, 20));
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, [prompt, selectedStyle, selectedSize, quality]);

  // 이미지 업로드 → DALL-E 2 변형/편집
  const generateFromImage = useCallback(async () => {
    if (!uploadedImage) { setError('이미지를 업로드해주세요.'); return; }
    if (uploadMode === 'edit' && !prompt.trim()) { setError('편집 프롬프트를 입력해주세요.'); return; }
    setLoading(true); setError(''); setCurrentImg(null);

    // 이미지 업로드 모드에서는 DALL-E 2만 지원 → 크기 제한
    const safeSize = ['256x256','512x512','1024x1024'].includes(selectedSize) ? selectedSize : '1024x1024';

    try {
      const endpoint = uploadMode === 'edit' ? '/api/edit' : '/api/variation';
      const body     = uploadMode === 'edit'
        ? { image: uploadedImage, prompt: prompt.trim(), style: selectedStyle, size: safeSize }
        : { image: uploadedImage, size: safeSize };

      const res  = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || '생성 실패');

      const item = { id: Date.now(), url: data.url, prompt: uploadMode === 'edit' ? prompt.trim() : '이미지 변형', style: selectedStyle, size: safeSize, uploadMode, createdAt: new Date().toLocaleTimeString() };
      setCurrentImg(item);
      setGallery(prev => [item, ...prev].slice(0, 20));
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }

      wordmark:   'wordmark logo, stylized typography, custom lettering',
      lettermark: 'lettermark logo, bold initial letters, monogram style',
      mascot:     'mascot logo, friendly character illustration, cartoon style',
      abstract:   'abstract logo mark, geometric symbol, unique shape',
      vintage:    'vintage retro logo, distressed texture, classic badge design',

    };

      blue: 'blue and navy color scheme',
      green: 'green and emerald color scheme',
      red: 'red and crimson color scheme',
      purple: 'purple and violet color scheme',
      orange: 'orange and amber color scheme',

                      loading || !uploadedImage
                        ? 'bg-gray-700 cursor-not-allowed opacity-60'
                        : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-95'
                    }`}
                  >
                    {loading ? (<><svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>생성 중...</>) : (uploadMode === 'variation' ? '🔀 변형 생성' : '✏️ 편집 생성')}
                  </button>
                </div>
              </section>
            )}

            {/* ── 로고 모드 ── */}
            {mode === 'logo' && (
              <section className="bg-gray-900 rounded-2xl p-5 border border-white/10 space-y-4">
                {/* 브랜드 이름 */}
                <div>
                  <label className="text-xs text-white/50 uppercase tracking-wider mb-2 block">브랜드 이름 *</label>
                  <input
                    value={brandName}
                    onChange={e => setBrandName(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder="예) Daon, Nova, Spark..."
                    className="w-full bg-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 border border-white/10 placeholder-white/30"
                  />
                </div>

                {/* 슬로건 */}
                <div>
                  <label className="text-xs text-white/50 uppercase tracking-wider mb-2 block">슬로건 / 태그라인 (선택)</label>
                  <input
                    value={tagline}
                    onChange={e => setTagline(e.target.value)}
                    placeholder="예) 연결이 미래다, Just Do It..."
                    className="w-full bg-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 border border-white/10 placeholder-white/30"
                  />
                </div>

                {/* 선택 요약 */}
                <div className="flex flex-wrap gap-2 py-3 px-4 bg-gray-800/60 rounded-xl">
                  <span className="text-xs px-2 py-1 rounded-full bg-purple-900/60 text-purple-300">{logoStyleInfo?.emoji} {logoStyleInfo?.label}</span>
                  <span className="text-xs px-2 py-1 rounded-full bg-blue-900/60 text-blue-300">{industryInfo?.emoji} {industryInfo?.label}</span>
                  <div className="flex items-center gap-1 text-xs px-2 py-1 rounded-full bg-gray-700">
                    {logoColorInfo?.colors.map((c, i) => <div key={i} className="w-3 h-3 rounded-full" style={{ background: c }} />)}
                    <span className="text-white/60 ml-1">{logoColorInfo?.label}</span>
                  </div>
                </div>

                <div className="flex items-center justify-between">
                  <span className="text-xs text-white/30">Ctrl+Enter 로 생성</span>
                  <button
                    onClick={generateLogo}
                    disabled={loading || !brandName.trim()}
                    className={`px-6 py-2.5 rounded-xl font-semibold text-sm transition-all flex items-center gap-2 ${
                      loading || !brandName.trim()
                        ? 'bg-gray-700 cursor-not-allowed opacity-60'
                        : 'bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 active:scale-95'
                    }`}
                  >
                    {loading
                      ? (<><svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>생성 중...</>)
                      : '🏷️ 로고 생성'}
                  </button>
                </div>
              </section>
            )}

            {/* ── PPT 모드 ── */}
            {mode === 'ppt' && (
              <section className="bg-gray-900 rounded-2xl p-5 border border-white/10 space-y-4">
                {/* 발표 주제 */}
                <div>
                  <label className="text-xs text-white/50 uppercase tracking-wider mb-2 block">발표 주제 *</label>
                  <input
                    value={pptTopic}
                    onChange={e => setPptTopic(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder="예) AI 트렌드 2025, 분기별 매출 보고서, 신제품 론칭..."
                    className="w-full bg-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border border-white/10 placeholder-white/30"
                  />
                </div>

                {/* 부제목 */}
                <div>
                  <label className="text-xs text-white/50 uppercase tracking-wider mb-2 block">부제목 / 발표자 (선택)</label>
                  <input
                    value={pptSubtitle}
                    onChange={e => setPptSubtitle(e.target.value)}
                    placeholder="예) 2025년 1분기 | 홍길동 팀장"
                    className="w-full bg-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border border-white/10 placeholder-white/30"
                  />
                </div>

                {/* 선택 요약 뱃지 */}
                <div className="flex flex-wrap gap-2 py-3 px-4 bg-gray-800/60 rounded-xl">
                  <span className="text-xs px-2 py-1 rounded-full bg-blue-900/60 text-blue-300">{pptSlideInfo?.emoji} {pptSlideInfo?.label}</span>
                  <span className="text-xs px-2 py-1 rounded-full bg-indigo-900/60 text-indigo-300">{pptThemeInfo?.emoji} {pptThemeInfo?.label}</span>
                  <div className="flex items-center gap-1 text-xs px-2 py-1 rounded-full bg-gray-700">
                    {pptColorInfo?.colors.map((c, i) => <div key={i} className="w-3 h-3 rounded-full" style={{ background: c }} />)}
                    <span className="text-white/60 ml-1">{pptColorInfo?.label}</span>
                  </div>
                  <span className="text-xs px-2 py-1 rounded-full bg-gray-700 text-white/50">
                    {pptRatio === '1792x1024' ? '16:9' : '1:1'}
                  </span>
                </div>

                <div className="flex items-center justify-between">
                  <span className="text-xs text-white/30">Ctrl+Enter 로 생성</span>
                  <button
                    onClick={generatePPT}
                    disabled={loading || !pptTopic.trim()}
                    className={`px-6 py-2.5 rounded-xl font-semibold text-sm transition-all flex items-center gap-2 ${
                      loading || !pptTopic.trim()
                        ? 'bg-gray-700 cursor-not-allowed opacity-60'
                        : 'bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 active:scale-95'
                    }`}
                  >
                    {loading
                      ? (<><svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>생성 중...</>)
                      : '📊 슬라이드 생성'}
                  </button>
                </div>
              </section>
            )}

            {/* 에러 */}
            {error && (
              <div className="px-4 py-3 bg-red-900/30 border border-red-500/30 rounded-xl text-red-300 text-sm">
                {error}
              </div>
            )}

            {/* 로딩 */}
            {loading && (
              <div className="rounded-2xl overflow-hidden border border-white/10">
                <div className="shimmer aspect-square w-full" />
                <div className="p-4 bg-gray-900 text-center text-white/50 text-sm">
                  {mode === 'text' ? 'DALL-E 3가 이미지를 생성 중...' : 'DALL-E 2가 이미지를 변환 중...'} (약 10~20초)
                </div>
              </div>
            )}

            {/* 생성 결과 */}
            {currentImg && !loading && (
              <div className="fade-in bg-gray-900 rounded-2xl overflow-hidden border border-purple-500/30">
                <div className="relative">
                  <img src={currentImg.url} alt={currentImg.prompt} className="w-full" />
                  <div className="absolute top-3 right-3">
                    <a
                      href={currentImg.url}
                      download="midjourney.png"
                      target="_blank"
                      rel="noreferrer"
                      className="px-3 py-1.5 rounded-lg bg-black/60 backdrop-blur text-xs hover:bg-black/80 transition-colors"
                    >
                      ⬇ 다운로드
                    </a>
                  </div>
                </div>
                <div className="p-4 space-y-2">
                  <div className="flex items-center gap-2">
                    <span>{styleInfo?.emoji}</span>
                    <span className="text-purple-300 text-sm font-medium">{styleInfo?.label}</span>
                    {currentImg.uploadMode && (
                      <span className="text-xs px-2 py-0.5 rounded-full bg-indigo-900/50 text-indigo-300">
                        {currentImg.uploadMode === 'variation' ? '변형' : '편집'}
                      </span>
                    )}
                    <span className="text-white/30 text-xs ml-auto">{currentImg.size} · {currentImg.createdAt}</span>
                  </div>
                  <p className="text-white/60 text-sm">{currentImg.prompt}</p>
                  {currentImg.revised && currentImg.revised !== currentImg.prompt && (
                    <details className="text-xs text-white/30">
                      <summary className="cursor-pointer hover:text-white/50">AI 수정 프롬프트 보기</summary>
                      <p className="mt-1 leading-relaxed">{currentImg.revised}</p>
                    </details>
                  )}
                </div>
              </div>
            )}

            {/* 갤러리 */}
            {gallery.length > 1 && (
              <section>
                <h2 className="text-sm font-semibold text-white/60 uppercase tracking-wider mb-3">
                  생성 기록 ({gallery.length})
                </h2>
                <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                  {gallery.map(item => (
                    <GalleryItem key={item.id} item={item} onClick={setModalItem} />
                  ))}
                </div>
              </section>
            )}
          </div>
        </div>
      </div>

      <Modal item={modalItem} onClose={() => setModalItem(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
