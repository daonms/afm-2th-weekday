<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 검색 Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
    .fade-in-up-delay-1 { animation: fadeInUp 0.6s ease-out 0.1s forwards; opacity: 0; }
    .fade-in-up-delay-2 { animation: fadeInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .fade-in-up-delay-3 { animation: fadeInUp 0.6s ease-out 0.3s forwards; opacity: 0; }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin-slow { animation: spin-slow 12s linear infinite; }

    @keyframes rain-drop {
      0% { transform: translateY(-10px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(20px); opacity: 0; }
    }
    .rain-anim { animation: rain-drop 1.2s ease-in infinite; }
    .rain-anim-delay-1 { animation-delay: 0.2s; }
    .rain-anim-delay-2 { animation-delay: 0.5s; }
    .rain-anim-delay-3 { animation-delay: 0.8s; }

    @keyframes snow-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(20px) rotate(180deg); opacity: 0; }
    }
    .snow-anim { animation: snow-fall 2s ease-in-out infinite; }
    .snow-anim-delay-1 { animation-delay: 0.3s; }
    .snow-anim-delay-2 { animation-delay: 0.7s; }

    @keyframes pulse-glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }

    @keyframes lightning {
      0%, 90%, 100% { opacity: 0; }
      92%, 95% { opacity: 1; }
    }
    .lightning-flash { animation: lightning 4s ease-in-out infinite; }

    @keyframes spinner {
      to { transform: rotate(360deg); }
    }
    .spinner { animation: spinner 0.8s linear infinite; }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .glass-dark {
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    .tab-active {
      background: rgba(255, 255, 255, 0.3);
      border-bottom: 2px solid white;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.1) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .wind-arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

    // ========================================
    // Constants & Config
    // ========================================
    const API_KEY = 'be6860f2a0f842d227e3e102a458c1cf';
    const BASE_URL = 'https://api.openweathermap.org/data/2.5';
    const ICON_URL = 'https://openweathermap.org/img/wn';

    const GOOGLE_CLIENT_ID = '635832103521-3gf2v4dnv67c1uli5uisl1bf1v7g8c7d.apps.googleusercontent.com';
    const CALENDAR_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
    const CALENDAR_DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';

    const POPULAR_CITIES = [
      { name: '서울', query: 'Seoul' },
      { name: '부산', query: 'Busan' },
      { name: '제주', query: 'Jeju' },
      { name: '대구', query: 'Daegu' },
      { name: '인천', query: 'Incheon' },
      { name: '대전', query: 'Daejeon' },
      { name: '광주', query: 'Gwangju' },
      { name: '울산', query: 'Ulsan' },
    ];

    const GRADIENTS = {
      Clear: 'from-orange-400 via-amber-300 to-yellow-200',
      Clouds: 'from-slate-500 via-blue-300 to-gray-400',
      Rain: 'from-slate-700 via-blue-800 to-gray-600',
      Drizzle: 'from-slate-600 via-blue-700 to-gray-500',
      Snow: 'from-blue-100 via-white to-blue-200',
      Thunderstorm: 'from-purple-900 via-indigo-800 to-gray-900',
      Mist: 'from-gray-400 via-blue-200 to-gray-300',
      Haze: 'from-amber-200 via-gray-300 to-yellow-100',
      Fog: 'from-gray-400 via-gray-300 to-blue-200',
      Default: 'from-sky-400 via-blue-300 to-cyan-200',
    };

    const DARK_CONDITIONS = ['Rain', 'Drizzle', 'Thunderstorm'];

    const AQI_INFO = [
      { level: 1, label: '좋음', emoji: '', color: 'bg-green-500', textColor: 'text-green-400', barColor: '#22c55e' },
      { level: 2, label: '보통', emoji: '', color: 'bg-yellow-500', textColor: 'text-yellow-400', barColor: '#eab308' },
      { level: 3, label: '나쁨', emoji: '', color: 'bg-orange-500', textColor: 'text-orange-400', barColor: '#f97316' },
      { level: 4, label: '매우나쁨', emoji: '', color: 'bg-red-500', textColor: 'text-red-400', barColor: '#ef4444' },
      { level: 5, label: '위험', emoji: '', color: 'bg-purple-500', textColor: 'text-purple-400', barColor: '#a855f7' },
    ];

    const TABS = [
      { id: 'current', label: '현재 날씨', icon: '🌡️' },
      { id: 'hourly', label: '시간별', icon: '🕐' },
      { id: 'daily', label: '5일 예보', icon: '📅' },
      { id: 'air', label: '대기질', icon: '🌫️' },
    ];

    // ========================================
    // Korean City Name Mapping
    // ========================================
    const KOREAN_CITY_MAP = {
      '서울특별시': 'Seoul', '서울시': 'Seoul', '서울': 'Seoul',
      '부산광역시': 'Busan', '부산시': 'Busan', '부산': 'Busan',
      '대구광역시': 'Daegu', '대구시': 'Daegu', '대구': 'Daegu',
      '인천광역시': 'Incheon', '인천시': 'Incheon', '인천': 'Incheon',
      '광주광역시': 'Gwangju', '광주시': 'Gwangju', '광주': 'Gwangju',
      '대전광역시': 'Daejeon', '대전시': 'Daejeon', '대전': 'Daejeon',
      '울산광역시': 'Ulsan', '울산시': 'Ulsan', '울산': 'Ulsan',
      '제주특별자치도': 'Jeju', '제주시': 'Jeju', '제주': 'Jeju',
      '수원시': 'Suwon', '수원': 'Suwon',
      '성남시': 'Seongnam', '성남': 'Seongnam',
      '고양시': 'Goyang', '고양': 'Goyang',
      '용인시': 'Yongin', '용인': 'Yongin',
      '창원시': 'Changwon', '창원': 'Changwon',
      '청주시': 'Cheongju', '청주': 'Cheongju',
      '전주시': 'Jeonju', '전주': 'Jeonju',
      '포항시': 'Pohang', '포항': 'Pohang',
      '세종특별자치시': 'Sejong', '세종시': 'Sejong', '세종': 'Sejong',
    };

    function extractCityFromLocation(location) {
      if (!location || !location.trim()) return null;

      // 한국 주소에서 도시명 추출
      for (const [korean, english] of Object.entries(KOREAN_CITY_MAP)) {
        if (location.includes(korean)) return english;
      }

      // 영문 도시명 추출 시도: 쉼표 구분 주소에서 첫 번째 또는 두 번째 부분
      const parts = location.split(',').map(p => p.trim());
      if (parts.length >= 2) {
        // "Gangnam, Seoul, South Korea" -> Seoul
        // "Seoul, South Korea" -> Seoul
        // 마지막이 나라명이면 그 앞의 것 사용
        const countryNames = ['South Korea', 'Korea', 'Japan', 'China', 'USA', 'UK', 'United States', 'United Kingdom'];
        if (parts.length >= 3 && countryNames.some(c => parts[parts.length - 1].includes(c))) {
          return parts[parts.length - 2].trim();
        }
        if (parts.length >= 2 && countryNames.some(c => parts[parts.length - 1].includes(c))) {
          return parts[0].trim();
        }
        return parts[0].trim();
      }

      // 공백 구분 주소에서 첫 번째 의미있는 단어
      const words = location.split(/\s+/);
      if (words.length > 0) {
        // 숫자로 시작하는 건 건너뛰기 (우편번호 등)
        const city = words.find(w => !(/^\d/.test(w)));
        return city || words[0];
      }

      return location.trim();
    }

    // ========================================
    // Utility Functions
    // ========================================
    function isDark(condition) {
      return DARK_CONDITIONS.includes(condition);
    }

    function getGradient(condition) {
      return GRADIENTS[condition] || GRADIENTS.Default;
    }

    function getTempColor(temp) {
      if (temp <= 0) return 'text-blue-400';
      if (temp <= 10) return 'text-cyan-500';
      if (temp <= 20) return 'text-green-500';
      if (temp <= 30) return 'text-orange-500';
      return 'text-red-500';
    }

    function getTempBgColor(temp) {
      if (temp <= 0) return 'bg-blue-400';
      if (temp <= 10) return 'bg-cyan-500';
      if (temp <= 20) return 'bg-green-500';
      if (temp <= 30) return 'bg-orange-500';
      return 'bg-red-500';
    }

    function formatTime(unix, timezoneOffset) {
      const date = new Date((unix + timezoneOffset) * 1000);
      const hours = date.getUTCHours().toString().padStart(2, '0');
      const minutes = date.getUTCMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    function formatHour(unix, timezoneOffset) {
      const date = new Date((unix + timezoneOffset) * 1000);
      const hours = date.getUTCHours();
      return `${hours}시`;
    }

    function formatKoreanDate() {
      const now = new Date();
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]}) ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    function formatDayOfWeek(unix) {
      const date = new Date(unix * 1000);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${date.getMonth() + 1}/${date.getDate()} (${days[date.getDay()]})`;
    }

    function formatVisibility(meters) {
      if (meters >= 1000) return `${(meters / 1000).toFixed(1)} km`;
      return `${meters} m`;
    }

    function windDegToDir(deg) {
      const dirs = ['북', '북북동', '북동', '동북동', '동', '동남동', '남동', '남남동', '남', '남남서', '남서', '서남서', '서', '서북서', '북서', '북북서'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function calcDewPoint(temp, humidity) {
      const a = 17.27;
      const b = 237.7;
      const alpha = ((a * temp) / (b + temp)) + Math.log(humidity / 100);
      return ((b * alpha) / (a - alpha)).toFixed(1);
    }

    function celsiusToFahrenheit(c) {
      return (c * 9 / 5 + 32).toFixed(1);
    }

    function displayTemp(temp, unit) {
      const rounded = Math.round(temp);
      if (unit === 'F') return `${Math.round(celsiusToFahrenheit(temp))}`;
      return `${rounded}`;
    }

    function tempUnit(unit) {
      return unit === 'F' ? '°F' : '°C';
    }

    function getSunProgress(sunrise, sunset, timezone) {
      const now = Math.floor(Date.now() / 1000) + timezone - new Date().getTimezoneOffset() * 60;
      const total = sunset - sunrise;
      const elapsed = now - sunrise;
      if (elapsed < 0) return 0;
      if (elapsed > total) return 100;
      return Math.round((elapsed / total) * 100);
    }

    function formatEventDateTime(event) {
      const start = event.start.dateTime || event.start.date;
      const d = new Date(start);
      const month = d.getMonth() + 1;
      const date = d.getDate();
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const day = days[d.getDay()];
      if (event.start.dateTime) {
        const hours = d.getHours().toString().padStart(2, '0');
        const mins = d.getMinutes().toString().padStart(2, '0');
        return `${month}/${date}(${day}) ${hours}:${mins}`;
      }
      return `${month}/${date}(${day}) 종일`;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function LoadingSpinner() {
      return (
        <div className="flex flex-col items-center gap-3 py-12">
          <div className="w-10 h-10 border-4 border-white/30 border-t-white rounded-full spinner"></div>
          <p className="text-white/70 text-sm">날씨 정보를 불러오는 중...</p>
        </div>
      );
    }

    function ErrorMessage({ message }) {
      return (
        <div className="fade-in-up glass rounded-2xl p-6 text-center max-w-md mx-auto mt-6">
          <div className="text-4xl mb-3">😥</div>
          <p className="text-white font-medium text-lg">{message}</p>
          <p className="text-white/60 text-sm mt-2">다른 도시를 검색해 보세요</p>
        </div>
      );
    }

    function GlassCard({ children, className = '', dark = false, onClick }) {
      return (
        <div
          className={`${dark ? 'glass-dark' : 'glass'} rounded-2xl ${className} ${onClick ? 'cursor-pointer hover:scale-[1.02] transition-transform' : ''}`}
          onClick={onClick}
        >
          {children}
        </div>
      );
    }

    // ========================================
    // 🌤 Weather Animation Component
    // ========================================
    function WeatherAnimation({ condition }) {
      if (condition === 'Clear') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none">
            <div className="spin-slow text-yellow-300 text-5xl">☀️</div>
          </div>
        );
      }
      if (condition === 'Rain' || condition === 'Drizzle') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none flex gap-2">
            <span className="rain-anim text-2xl">💧</span>
            <span className="rain-anim rain-anim-delay-1 text-xl">💧</span>
            <span className="rain-anim rain-anim-delay-2 text-2xl">💧</span>
            <span className="rain-anim rain-anim-delay-3 text-xl">💧</span>
          </div>
        );
      }
      if (condition === 'Snow') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none flex gap-2">
            <span className="snow-anim text-2xl">❄️</span>
            <span className="snow-anim snow-anim-delay-1 text-xl">❄️</span>
            <span className="snow-anim snow-anim-delay-2 text-2xl">❄️</span>
          </div>
        );
      }
      if (condition === 'Thunderstorm') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none">
            <span className="lightning-flash text-4xl">⚡</span>
          </div>
        );
      }
      if (condition === 'Clouds') {
        return (
          <div className="absolute top-4 right-4 pointer-events-none">
            <span className="float-anim text-4xl inline-block">☁️</span>
          </div>
        );
      }
      return null;
    }

    // ========================================
    // 🧩 Search Bar Component
    // ========================================
    function SearchBar({ onSearch, loading }) {
      const [query, setQuery] = useState('');
      const inputRef = useRef(null);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (query.trim()) {
          onSearch(query.trim());
        }
      };

      useEffect(() => {
        inputRef.current?.focus();
      }, []);

      return (
        <form onSubmit={handleSubmit} className="w-full max-w-xl mx-auto">
          <div className="flex gap-2">
            <div className="flex-1 relative">
              <input
                ref={inputRef}
                type="text"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="도시 이름 입력 (예: Seoul, Tokyo, London)"
                className="search-input w-full px-5 py-3.5 rounded-2xl glass text-white placeholder-white/50 outline-none text-base font-light transition-all"
                disabled={loading}
                aria-label="도시 검색"
              />
              <svg className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
            <button
              type="submit"
              disabled={loading || !query.trim()}
              className="px-5 py-3.5 rounded-2xl bg-white/25 hover:bg-white/35 text-white font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95"
              aria-label="검색"
            >
              검색
            </button>
          </div>
        </form>
      );
    }

    // ========================================
    // 🏙 Popular Cities & History
    // ========================================
    function PopularCities({ onSelect }) {
      return (
        <div className="flex flex-wrap justify-center gap-2 max-w-xl mx-auto">
          {POPULAR_CITIES.map((city) => (
            <button
              key={city.query}
              onClick={() => onSelect(city.query)}
              className="px-3 py-1.5 rounded-full glass text-white/90 text-sm font-medium hover:bg-white/30 transition-all active:scale-95 cursor-pointer"
            >
              {city.name}
            </button>
          ))}
        </div>
      );
    }

    function SearchHistory({ history, onSelect, onClear }) {
      if (history.length === 0) return null;
      return (
        <div className="flex flex-wrap items-center justify-center gap-2 mt-3 max-w-xl mx-auto">
          <span className="text-white/50 text-xs">최근:</span>
          {history.map((city, i) => (
            <button
              key={`${city}-${i}`}
              onClick={() => onSelect(city)}
              className="px-3 py-1 rounded-full bg-white/10 text-white/80 text-xs hover:bg-white/20 transition-all cursor-pointer"
            >
              {city}
            </button>
          ))}
          <button onClick={onClear} className="px-2 py-1 text-white/40 text-xs hover:text-white/70 transition-all cursor-pointer" aria-label="검색 기록 삭제">
            ✕
          </button>
        </div>
      );
    }

    // ========================================
    // 🔘 Tab Navigation
    // ========================================
    function TabNav({ activeTab, setActiveTab, condition }) {
      const dk = isDark(condition);
      return (
        <div className="flex gap-1 overflow-x-auto scrollbar-hide max-w-2xl mx-auto mb-4">
          {TABS.map((tab) => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`flex items-center gap-1.5 px-4 py-2.5 rounded-xl text-sm font-medium whitespace-nowrap transition-all ${
                activeTab === tab.id
                  ? 'glass-strong text-white shadow-lg'
                  : 'text-white/60 hover:text-white/80 hover:bg-white/10'
              }`}
            >
              <span>{tab.icon}</span>
              <span>{tab.label}</span>
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 🌡️ Temperature Unit Toggle
    // ========================================
    function TempToggle({ unit, setUnit }) {
      return (
        <div className="inline-flex glass rounded-full p-0.5">
          <button
            onClick={() => setUnit('C')}
            className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${unit === 'C' ? 'bg-white/30 text-white' : 'text-white/50 hover:text-white/80'}`}
          >
            °C
          </button>
          <button
            onClick={() => setUnit('F')}
            className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${unit === 'F' ? 'bg-white/30 text-white' : 'text-white/50 hover:text-white/80'}`}
          >
            °F
          </button>
        </div>
      );
    }

    // ========================================
    // 📅 5-Day Forecast Tab
    // ========================================
    function DailyForecastTab({ forecast, timezone, unit, condition }) {
      const dk = isDark(condition);

      // 일별로 그룹화 (날짜별)
      const dailyMap = {};
      forecast.list.forEach((item) => {
        const date = new Date((item.dt + timezone) * 1000);
        const key = `${date.getUTCFullYear()}-${date.getUTCMonth()}-${date.getUTCDate()}`;
        if (!dailyMap[key]) {
          dailyMap[key] = { items: [], dt: item.dt };
        }
        dailyMap[key].items.push(item);
      });

      const dailyData = Object.values(dailyMap).map((day) => {
        const temps = day.items.map(i => i.main.temp);
        const mainWeather = day.items[Math.floor(day.items.length / 2)].weather[0];
        const maxPop = Math.max(...day.items.map(i => i.pop || 0));
        return {
          dt: day.dt,
          temp_min: Math.min(...temps),
          temp_max: Math.max(...temps),
          weather: mainWeather,
          pop: maxPop,
        };
      });

      // 전체 범위 계산 (온도 바 시각화용)
      const allMin = Math.min(...dailyData.map(d => d.temp_min));
      const allMax = Math.max(...dailyData.map(d => d.temp_max));
      const range = allMax - allMin || 1;

      return (
        <div className="fade-in-up max-w-2xl mx-auto">
          <GlassCard dark={dk} className="p-5">
            <h3 className={`text-lg font-bold mb-4 ${dk ? 'text-white' : 'text-gray-800'}`}>
              📅 5일 예보
            </h3>
            <div className="space-y-3">
              {dailyData.map((day, idx) => {
                const minPct = ((day.temp_min - allMin) / range) * 100;
                const maxPct = ((day.temp_max - allMin) / range) * 100;

                return (
                  <div
                    key={idx}
                    className={`flex items-center gap-3 p-3 rounded-xl ${dk ? 'bg-white/5' : 'bg-white/20'}`}
                  >
                    {/* 날짜 */}
                    <span className={`text-sm font-medium w-24 shrink-0 ${dk ? 'text-white/80' : 'text-gray-700'}`}>
                      {idx === 0 ? '오늘' : formatDayOfWeek(day.dt)}
                    </span>

                    {/* 아이콘 */}
                    <img
                      src={`${ICON_URL}/${day.weather.icon}@2x.png`}
                      alt={day.weather.description}
                      className="w-8 h-8 shrink-0"
                    />

                    {/* 강수확률 */}
                    <span className={`text-xs w-10 shrink-0 ${day.pop > 0.3 ? 'text-blue-300' : dk ? 'text-white/30' : 'text-gray-400'}`}>
                      {day.pop > 0 ? `${Math.round(day.pop * 100)}%` : ''}
                    </span>

                    {/* 최저 온도 */}
                    <span className={`text-sm font-medium w-10 text-right shrink-0 ${dk ? 'text-blue-300' : 'text-blue-500'}`}>
                      {displayTemp(day.temp_min, unit)}°
                    </span>

                    {/* 온도 바 */}
                    <div className={`flex-1 h-2 rounded-full relative ${dk ? 'bg-white/10' : 'bg-gray-200/50'}`}>
                      <div
                        className="absolute h-full rounded-full"
                        style={{
                          left: `${minPct}%`,
                          width: `${maxPct - minPct}%`,
                          background: `linear-gradient(90deg, #60a5fa, #f97316)`,
                          minWidth: '8px',
                        }}
                      ></div>
                    </div>

                    {/* 최고 온도 */}
                    <span className={`text-sm font-medium w-10 shrink-0 ${dk ? 'text-orange-300' : 'text-orange-500'}`}>
                      {displayTemp(day.temp_max, unit)}°
                    </span>
                  </div>
                );
              })}
            </div>
          </GlassCard>
        </div>
      );
    }

    // ========================================
    // 📅 Google Calendar Integration
    // ========================================
    function useGoogleCalendar() {
      const [isSignedIn, setIsSignedIn] = useState(false);
      const [userName, setUserName] = useState('');
      const [events, setEvents] = useState([]);
      const [calLoading, setCalLoading] = useState(false);
      const [calError, setCalError] = useState(null);
      const [gapiReady, setGapiReady] = useState(false);
      const [gisReady, setGisReady] = useState(false);
      const tokenClientRef = useRef(null);
      const accessTokenRef = useRef(null);

      // gapi client 초기화
      useEffect(() => {
        let attempts = 0;
        function initGapi() {
          attempts++;
          if (typeof gapi === 'undefined') {
            if (attempts < 50) setTimeout(initGapi, 300);
            else console.error('[Calendar] gapi 로드 실패 - 네트워크 확인');
            return;
          }
          gapi.load('client', async () => {
            try {
              await gapi.client.init({
                discoveryDocs: [CALENDAR_DISCOVERY_DOC],
              });
              console.log('[Calendar] gapi client 준비 완료');
              setGapiReady(true);
            } catch (err) {
              console.error('[Calendar] gapi init 에러:', err);
              setCalError('Google API 초기화 실패. 페이지를 새로고침해주세요.');
            }
          });
        }
        initGapi();
      }, []);

      // GIS 토큰 클라이언트 초기화
      useEffect(() => {
        let attempts = 0;
        function initGis() {
          attempts++;
          if (typeof google === 'undefined' || !google.accounts) {
            if (attempts < 50) setTimeout(initGis, 300);
            else console.error('[Calendar] GIS 로드 실패');
            return;
          }
          try {
            tokenClientRef.current = google.accounts.oauth2.initTokenClient({
              client_id: GOOGLE_CLIENT_ID,
              scope: CALENDAR_SCOPE,
              callback: (tokenResponse) => {
                console.log('[Calendar] 토큰 응답:', tokenResponse.error || '성공');
                if (tokenResponse.error) {
                  if (tokenResponse.error === 'access_denied') {
                    setCalError('캘린더 접근 권한이 거부되었습니다.');
                  } else if (tokenResponse.error === 'popup_closed_by_user') {
                    setCalError('로그인 팝업이 닫혔습니다. 다시 시도해주세요.');
                  } else {
                    setCalError(`로그인 오류: ${tokenResponse.error}`);
                  }
                  return;
                }
                accessTokenRef.current = tokenResponse.access_token;
                setIsSignedIn(true);
                setCalError(null);
                fetchUserInfo(tokenResponse.access_token);
                fetchEvents();
              },
              error_callback: (err) => {
                console.error('[Calendar] OAuth 에러:', err);
                if (err.type === 'popup_failed_to_open') {
                  setCalError('팝업이 차단되었습니다. 브라우저 팝업 차단을 해제해주세요.');
                } else if (err.type === 'popup_closed') {
                  setCalError('로그인 팝업이 닫혔습니다.');
                } else {
                  setCalError(`Google 로그인 실패: ${err.type || '알 수 없는 오류'}`);
                }
              },
            });
            console.log('[Calendar] GIS 토큰 클라이언트 준비 완료');
            setGisReady(true);
          } catch (err) {
            console.error('[Calendar] GIS init 에러:', err);
            setCalError('Google 로그인 초기화 실패');
          }
        }
        initGis();
      }, []);

      const fetchUserInfo = useCallback(async (token) => {
        try {
          const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.ok) {
            const info = await res.json();
            setUserName(info.name || info.email || '사용자');
          }
        } catch {
          setUserName('사용자');
        }
      }, []);

      const fetchEvents = useCallback(async () => {
        setCalLoading(true);
        setCalError(null);
        try {
          const now = new Date();
          const timeMin = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).toISOString();
          const future = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 7, 23, 59, 59);
          const timeMax = future.toISOString();

          const response = await gapi.client.calendar.events.list({
            calendarId: 'primary',
            timeMin: timeMin,
            timeMax: timeMax,
            singleEvents: true,
            orderBy: 'startTime',
            maxResults: 50,
          });

          setEvents(response.result.items || []);
        } catch (err) {
          console.error('Calendar API error:', err);
          if (err.status === 401 || err.status === 403) {
            setCalError('캘린더 접근 권한이 필요합니다. 다시 로그인해주세요.');
            setIsSignedIn(false);
            accessTokenRef.current = null;
          } else {
            setCalError('캘린더 일정을 불러올 수 없습니다');
          }
        } finally {
          setCalLoading(false);
        }
      }, []);

      const signIn = useCallback(() => {
        console.log('[Calendar] 로그인 시도 - gapi:', gapiReady, 'gis:', gisReady);
        if (!gapiReady || !gisReady) {
          setCalError('Google 서비스를 로딩중입니다. 잠시 후 다시 시도해주세요.');
          return;
        }
        if (tokenClientRef.current) {
          setCalError(null);
          try {
            tokenClientRef.current.requestAccessToken({ prompt: '' });
          } catch (err) {
            console.error('[Calendar] requestAccessToken 에러:', err);
            setCalError('로그인 팝업 실행 실패. 팝업 차단을 해제해주세요.');
          }
        } else {
          setCalError('Google 로그인이 초기화되지 않았습니다. 페이지를 새로고침해주세요.');
        }
      }, [gapiReady, gisReady]);

      const signOut = useCallback(() => {
        if (accessTokenRef.current) {
          google.accounts.oauth2.revoke(accessTokenRef.current, () => {
            console.log('Token revoked');
          });
        }
        accessTokenRef.current = null;
        setIsSignedIn(false);
        setUserName('');
        setEvents([]);
        setCalError(null);
      }, []);

      const refresh = useCallback(() => {
        if (isSignedIn) {
          fetchEvents();
        }
      }, [isSignedIn, fetchEvents]);

      return {
        isSignedIn, userName, events, calLoading, calError,
        signIn, signOut, refresh, gapiReady, gisReady,
      };
    }

    // 캘린더 일정에서 도시별로 그룹화
    function groupEventsByCity(events) {
      const cityMap = {};

      events.forEach(event => {
        const location = event.location;
        const city = extractCityFromLocation(location);
        if (!city) return;

        const cityKey = city.toLowerCase();
        if (!cityMap[cityKey]) {
          cityMap[cityKey] = { city, events: [] };
        }
        cityMap[cityKey].events.push(event);
      });

      return Object.values(cityMap);
    }

    // ========================================
    // 📅 Calendar Weather Section Component
    // ========================================
    function CalendarWeatherSection({ calendarData, condition, unit, onCityClick }) {
      const { isSignedIn, userName, events, calLoading, calError, signIn, signOut, refresh } = calendarData;
      const dk = isDark(condition);

      const cityGroups = useMemo(() => groupEventsByCity(events), [events]);
      const [cityWeathers, setCityWeathers] = useState({});
      const [weatherLoading, setWeatherLoading] = useState(false);

      // 도시별 날씨 로딩
      useEffect(() => {
        if (cityGroups.length === 0) {
          setCityWeathers({});
          return;
        }

        const fetchCityWeathers = async () => {
          setWeatherLoading(true);
          const results = {};

          await Promise.all(
            cityGroups.map(async ({ city }) => {
              const key = city.toLowerCase();
              try {
                const res = await fetch(
                  `${BASE_URL}/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=kr`
                );
                if (res.ok) {
                  results[key] = await res.json();
                }
              } catch {
                // 날씨 로드 실패 시 무시
              }
            })
          );

          setCityWeathers(results);
          setWeatherLoading(false);
        };

        fetchCityWeathers();
      }, [cityGroups]);

      if (!isSignedIn) return null;

      return (
        <div className="fade-in-up max-w-2xl mx-auto mt-6">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-lg font-bold text-white flex items-center gap-2">
              📅 캘린더 일정 날씨
            </h3>
            <button
              onClick={refresh}
              disabled={calLoading}
              className="px-3 py-1.5 rounded-full glass text-white/80 text-xs hover:bg-white/25 transition-all disabled:opacity-50 flex items-center gap-1"
            >
              <svg className={`w-3.5 h-3.5 ${calLoading ? 'spinner' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
              새로고침
            </button>
          </div>

          {calError && (
            <GlassCard dark={dk} className="p-4 mb-3">
              <p className="text-red-300 text-sm text-center">{calError}</p>
            </GlassCard>
          )}

          {calLoading || weatherLoading ? (
            <div className="space-y-3">
              {[1, 2, 3].map(i => (
                <div key={i} className="glass rounded-2xl p-5">
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-xl shimmer"></div>
                    <div className="flex-1 space-y-2">
                      <div className="h-4 w-24 rounded shimmer"></div>
                      <div className="h-3 w-40 rounded shimmer"></div>
                    </div>
                    <div className="h-8 w-16 rounded shimmer"></div>
                  </div>
                </div>
              ))}
            </div>
          ) : cityGroups.length === 0 ? (
            <GlassCard dark={dk} className="p-6 text-center">
              <div className="text-3xl mb-2">📍</div>
              <p className={`text-sm ${dk ? 'text-white/60' : 'text-gray-500'}`}>
                장소가 포함된 일정이 없습니다
              </p>
              <p className={`text-xs mt-1 ${dk ? 'text-white/40' : 'text-gray-400'}`}>
                Google 캘린더 일정에 장소를 추가하면 해당 지역의 날씨를 확인할 수 있어요
              </p>
            </GlassCard>
          ) : (
            <div className="space-y-3">
              {cityGroups.map(({ city, events: cityEvents }) => {
                const key = city.toLowerCase();
                const weather = cityWeathers[key];

                return (
                  <GlassCard
                    key={key}
                    dark={dk}
                    className="p-4 hover:bg-white/10 transition-all"
                    onClick={() => onCityClick(city)}
                  >
                    <div className="flex items-center gap-4">
                      {/* 날씨 아이콘 */}
                      <div className="flex-shrink-0">
                        {weather ? (
                          <img
                            src={`${ICON_URL}/${weather.weather[0].icon}@2x.png`}
                            alt={weather.weather[0].description}
                            className="w-14 h-14"
                          />
                        ) : (
                          <div className="w-14 h-14 rounded-xl bg-white/10 flex items-center justify-center text-2xl">
                            🏙️
                          </div>
                        )}
                      </div>

                      {/* 도시 정보 */}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <h4 className={`font-bold ${dk ? 'text-white' : 'text-gray-800'}`}>
                            {weather ? weather.name : city}
                          </h4>
                          {weather && (
                            <span className={`text-xs ${dk ? 'text-white/50' : 'text-gray-500'}`}>
                              {weather.weather[0].description}
                            </span>
                          )}
                        </div>

                        {/* 일정 목록 */}
                        <div className="mt-1.5 space-y-0.5">
                          {cityEvents.slice(0, 3).map((evt, idx) => (
                            <div key={idx} className={`flex items-center gap-1.5 text-xs ${dk ? 'text-white/60' : 'text-gray-500'}`}>
                              <span className="shrink-0">•</span>
                              <span className="shrink-0 font-medium">{formatEventDateTime(evt)}</span>
                              <span className="truncate">{evt.summary || '(제목 없음)'}</span>
                            </div>
                          ))}
                          {cityEvents.length > 3 && (
                            <p className={`text-xs ${dk ? 'text-white/40' : 'text-gray-400'}`}>
                              외 {cityEvents.length - 3}건
                            </p>
                          )}
                        </div>
                      </div>

                      {/* 온도 */}
                      {weather && (
                        <div className="flex-shrink-0 text-right">
                          <p className={`text-2xl font-black ${getTempColor(weather.main.temp)}`}>
                            {displayTemp(weather.main.temp, unit)}°
                          </p>
                          <p className={`text-xs ${dk ? 'text-white/40' : 'text-gray-400'}`}>
                            {displayTemp(weather.main.temp_min, unit)}° / {displayTemp(weather.main.temp_max, unit)}°
                          </p>
                        </div>
                      )}
                    </div>
                  </GlassCard>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 📅 Google Calendar Button Component
    // ========================================
    function CalendarButton({ calendarData }) {
      const { isSignedIn, userName, signIn, signOut, gapiReady, gisReady } = calendarData;
      const ready = gapiReady && gisReady;

      if (isSignedIn) {
        return (
          <div className="flex items-center gap-2">
            <span className="glass rounded-full px-3 py-1.5 text-xs text-white/90 flex items-center gap-1.5">
              📅 캘린더 연결됨
              {userName && <span className="font-medium">· {userName}</span>}
            </span>
            <button
              onClick={signOut}
              className="px-2.5 py-1.5 rounded-full bg-white/10 hover:bg-white/20 text-white/60 hover:text-white/90 text-xs transition-all"
              title="캘린더 연결 해제"
            >
              ✕
            </button>
          </div>
        );
      }

      return (
        <button
          onClick={signIn}
          disabled={!ready}
          className="glass rounded-full px-4 py-2 text-sm text-white/90 hover:bg-white/25 transition-all flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
          title={ready ? '구글 캘린더 연결' : 'Google 서비스 로딩중...'}
        >
          📅 캘린더 연결
        </button>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [weather, setWeather] = useState(null);
      const [forecast, setForecast] = useState(null);
      const [airQuality, setAirQuality] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [condition, setCondition] = useState('Default');
      const [activeTab, setActiveTab] = useState('current');
      const [unit, setUnit] = useState('C');
      const [history, setHistory] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('weather_history') || '[]');
        } catch {
          return [];
        }
      });

      // Google Calendar Hook
      const calendarData = useGoogleCalendar();

      const addToHistory = useCallback((city) => {
        setHistory(prev => {
          const filtered = prev.filter(c => c.toLowerCase() !== city.toLowerCase());
          const updated = [city, ...filtered].slice(0, 5);
          localStorage.setItem('weather_history', JSON.stringify(updated));
          return updated;
        });
      }, []);

      const clearHistory = useCallback(() => {
        setHistory([]);
        localStorage.removeItem('weather_history');
      }, []);

      // 도시명으로 검색 (3개 API 병렬 호출)
      const searchWeather = useCallback(async (city) => {
        setLoading(true);
        setError(null);
        setWeather(null);
        setForecast(null);
        setAirQuality(null);
        setActiveTab('current');

        try {
          // 1단계: 현재 날씨로 좌표 얻기
          const weatherUrl = `${BASE_URL}/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=kr`;
          const weatherRes = await fetch(weatherUrl);

          if (!weatherRes.ok) {
            if (weatherRes.status === 404) throw new Error('도시를 찾을 수 없습니다');
            throw new Error('날씨 정보를 가져올 수 없습니다');
          }

          const weatherData = await weatherRes.json();
          const { lat, lon } = weatherData.coord;

          // 2단계: 좌표로 예보 + 대기질 병렬 호출
          const [forecastRes, airRes] = await Promise.all([
            fetch(`${BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`),
            fetch(`${BASE_URL}/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`),
          ]);

          const forecastData = forecastRes.ok ? await forecastRes.json() : null;
          const airData = airRes.ok ? await airRes.json() : null;

          setWeather(weatherData);
          setForecast(forecastData);
          setAirQuality(airData);
          setCondition(weatherData.weather[0].main);
          addToHistory(city);
        } catch (err) {
          setError(err.message);
          setCondition('Default');
        } finally {
          setLoading(false);
        }
      }, [addToHistory]);

      // 좌표로 검색 (3개 API 병렬 호출)
      const searchByCoords = useCallback(async (lat, lon) => {
        setLoading(true);
        setError(null);
        setWeather(null);
        setForecast(null);
        setAirQuality(null);
        setActiveTab('current');

        try {
          const [weatherRes, forecastRes, airRes] = await Promise.all([
            fetch(`${BASE_URL}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`),
            fetch(`${BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`),
            fetch(`${BASE_URL}/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`),
          ]);

          if (!weatherRes.ok) throw new Error('날씨 정보를 가져올 수 없습니다');

          const weatherData = await weatherRes.json();
          const forecastData = forecastRes.ok ? await forecastRes.json() : null;
          const airData = airRes.ok ? await airRes.json() : null;

          setWeather(weatherData);
          setForecast(forecastData);
          setAirQuality(airData);
          setCondition(weatherData.weather[0].main);
        } catch (err) {
          setError(err.message);
          setCondition('Default');
        } finally {
          setLoading(false);
        }
      }, []);

      // 앱 시작 시 위치 자동 감지
      useEffect(() => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => searchByCoords(pos.coords.latitude, pos.coords.longitude),
            () => { /* 위치 권한 거부 시 무시 */ }
          );
        }
      }, []);

      const gradient = useMemo(() => getGradient(condition), [condition]);

      // 캘린더 도시 클릭 핸들러
      const handleCalendarCityClick = useCallback((city) => {
        searchWeather(city);
      }, [searchWeather]);

      // 탭별 콘텐츠 렌더링
      const renderTabContent = () => {
        if (!weather) return null;

        switch (activeTab) {
          case 'current':
            return <CurrentWeatherTab data={weather} unit={unit} />;
          case 'hourly':
            return forecast ? (
              <HourlyForecastTab forecast={forecast} timezone={weather.timezone} unit={unit} condition={condition} />
            ) : (
              <div className="text-center py-8 text-white/50">시간별 예보 데이터가 없습니다</div>
            );
          case 'daily':
            return forecast ? (
              <DailyForecastTab forecast={forecast} timezone={weather.timezone} unit={unit} condition={condition} />
            ) : (
              <div className="text-center py-8 text-white/50">5일 예보 데이터가 없습니다</div>
            );
          case 'air':
            return <AirQualityTab airData={airQuality} condition={condition} />;
          default:
            return null;
        }
      };

      return (
        <div className={`min-h-screen bg-gradient-to-br ${gradient} transition-all duration-1000 px-4 py-6 md:py-10`}>
          <div className="max-w-2xl mx-auto">
            {/* Header */}
            <div className="text-center mb-6">
              <div className="flex items-center justify-center gap-3 mb-1">
                <h1 className="text-3xl md:text-4xl font-black text-white drop-shadow-lg">
                  날씨 검색
                </h1>
                <TempToggle unit={unit} setUnit={setUnit} />
              </div>
              <p className="text-white/60 text-sm">전 세계 도시의 실시간 날씨, 예보, 대기질을 확인하세요</p>

              {/* Google Calendar Button */}
              <div className="flex justify-center mt-3">
                <CalendarButton calendarData={calendarData} />
              </div>
            </div>

            {/* Search */}
            <SearchBar onSearch={searchWeather} loading={loading} />

            {/* Location Button */}
            <div className="text-center mt-3">
              <button
                onClick={() => {
                  if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                      (pos) => searchByCoords(pos.coords.latitude, pos.coords.longitude),
                      () => setError('위치 권한이 거부되었습니다. 브라우저 설정을 확인하세요.')
                    );
                  } else {
                    setError('이 브라우저에서는 위치 서비스를 지원하지 않습니다.');
                  }
                }}
                disabled={loading}
                className="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white text-sm px-4 py-2 rounded-full transition-colors backdrop-blur-sm disabled:opacity-50"
              >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                현재 위치 날씨
              </button>
            </div>

            {/* Search History */}
            <SearchHistory history={history} onSelect={searchWeather} onClear={clearHistory} />

            {/* Popular Cities */}
            <div className="mt-3">
              <p className="text-center text-white/50 text-xs mb-2">인기 도시</p>
              <PopularCities onSelect={searchWeather} />
            </div>

            {/* Loading */}
            {loading && <LoadingSpinner />}

            {/* Error */}
            {error && <ErrorMessage message={error} />}

            {/* Tab Navigation */}
            {weather && !loading && (
              <div className="mt-6">
                <TabNav activeTab={activeTab} setActiveTab={setActiveTab} condition={condition} />
                {renderTabContent()}
              </div>
            )}

            {/* Calendar Weather Section */}
            <CalendarWeatherSection
              calendarData={calendarData}
              condition={condition}
              unit={unit}
              onCityClick={handleCalendarCityClick}
            />

            {/* Empty State */}
            {!weather && !loading && !error && (
              <div className="text-center mt-16 fade-in-up">
                <div className="text-7xl mb-4 float-anim inline-block">🌤️</div>
                <p className="text-white/50 text-lg">도시를 검색하여 날씨를 확인하세요</p>
              </div>
            )}
          </div>

          {/* Footer */}
          <p className="text-center text-white/30 text-xs mt-10">
            Powered by OpenWeatherMap API & Google Calendar API
          </p>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
