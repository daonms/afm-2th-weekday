<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>익명 고민·칭찬 게시판</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e0c3fc 0%, #f5c6d0 50%, #ffecd2 100%);
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .like-pop {
      animation: pop 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================================
    // Constants & Helpers
    // ========================================
    const API_BASE_URL = window.location.hostname === 'localhost'
      ? `http://${window.location.hostname}:3005`
      : '';

    const CATEGORIES = [
      { key: '고민', emoji: '😔', color: 'purple', bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-300', ring: 'ring-purple-400' },
      { key: '칭찬', emoji: '🌟', color: 'yellow', bg: 'bg-yellow-100', text: 'text-yellow-700', border: 'border-yellow-300', ring: 'ring-yellow-400' },
      { key: '응원', emoji: '💪', color: 'green', bg: 'bg-green-100', text: 'text-green-700', border: 'border-green-300', ring: 'ring-green-400' },
    ];

    function getCategoryStyle(category) {
      return CATEGORIES.find(c => c.key === category) || CATEGORIES[0];
    }

    function relativeTime(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diff = Math.max(0, now - then);
      const seconds = Math.floor(diff / 1000);
      if (seconds < 10) return '방금 전';
      if (seconds < 60) return `${seconds}초 전`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}분 전`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}시간 전`;
      const days = Math.floor(hours / 24);
      return `${days}일 전`;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled, onClick, className = '', ...props }) {
      const base = 'font-semibold rounded-xl transition-all duration-200 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:from-purple-600 hover:to-pink-600 shadow-md hover:shadow-lg',
        secondary: 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50',
        ghost: 'bg-transparent text-gray-500 hover:bg-gray-100',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-7 py-3 text-lg',
      };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          disabled={disabled}
          onClick={onClick}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-5 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ category }) {
      const style = getCategoryStyle(category);
      return (
        <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium ${style.bg} ${style.text} ${style.border} border`}>
          {style.emoji} {category}
        </span>
      );
    }

    // ========================================
    // 🧩 Common/Layout Components
    // ========================================
    function Header() {
      return (
        <header className="text-center py-8">
          <h1 className="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">
            익명 고민·칭찬 게시판
          </h1>
          <p className="text-gray-500 text-base sm:text-lg">
            누군가의 한마디가 큰 위로가 될 수 있어요
          </p>
        </header>
      );
    }

    // ========================================
    // 📝 PostForm Component
    // ========================================
    function PostForm({ onSubmit }) {
      const [category, setCategory] = useState('');
      const [content, setContent] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const handleSubmit = async () => {
        if (!category || !content.trim()) return;
        setSubmitting(true);
        try {
          await onSubmit({ category, content: content.trim() });
          setCategory('');
          setContent('');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <Card className="mb-6">
          <h2 className="text-lg font-bold text-gray-700 mb-4">글 작성하기</h2>

          {/* Category Selection */}
          <div className="flex gap-2 mb-4 flex-wrap">
            {CATEGORIES.map(cat => {
              const selected = category === cat.key;
              return (
                <button
                  key={cat.key}
                  onClick={() => setCategory(cat.key)}
                  className={`px-4 py-2 rounded-xl text-sm font-medium border-2 transition-all duration-200 cursor-pointer
                    ${selected
                      ? `${cat.bg} ${cat.text} ${cat.border} ring-2 ${cat.ring} scale-105`
                      : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'
                    }`}
                >
                  {cat.emoji} {cat.key}
                </button>
              );
            })}
          </div>

          {/* Content Textarea */}
          <textarea
            value={content}
            onChange={e => setContent(e.target.value)}
            placeholder="익명으로 자유롭게 작성하세요..."
            rows={4}
            maxLength={500}
            className="w-full border border-gray-200 rounded-xl p-4 text-gray-700 placeholder-gray-400 resize-none focus:outline-none focus:ring-2 focus:ring-purple-300 focus:border-transparent transition-all"
          />
          <div className="flex justify-between items-center mt-3">
            <span className="text-xs text-gray-400">{content.length}/500</span>
            <Button
              onClick={handleSubmit}
              disabled={!category || !content.trim() || submitting}
            >
              {submitting ? '작성 중...' : '작성하기'}
            </Button>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🔀 SortTabs Component
    // ========================================
    function SortTabs({ sort, onSortChange }) {
      const tabs = [
        { key: 'latest', label: '최신순', icon: '🕐' },
        { key: 'likes', label: '공감순', icon: '❤️' },
      ];
      return (
        <div className="flex gap-1 bg-white/60 backdrop-blur-sm rounded-xl p-1 mb-5">
          {tabs.map(tab => (
            <button
              key={tab.key}
              onClick={() => onSortChange(tab.key)}
              className={`flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer
                ${sort === tab.key
                  ? 'bg-white text-gray-800 shadow-md'
                  : 'text-gray-500 hover:text-gray-700'
                }`}
            >
              {tab.icon} {tab.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 💬 ReplySection Component
    // ========================================
    function ReplySection({ postId }) {
      const [replies, setReplies] = useState([]);
      const [replyText, setReplyText] = useState('');
      const [loading, setLoading] = useState(true);
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        fetch(`${API_BASE_URL}/api/posts/${postId}/replies`)
          .then(r => r.json())
          .then(d => setReplies(d.data ?? []))
          .catch(() => {})
          .finally(() => setLoading(false));
      }, [postId]);

      const handleSubmit = async () => {
        if (!replyText.trim()) return;
        setSubmitting(true);
        try {
          const res = await fetch(`${API_BASE_URL}/api/posts/${postId}/replies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: replyText.trim() }),
          });
          const data = await res.json();
          if (data.success) {
            setReplies(prev => [...prev, data.data]);
            setReplyText('');
          }
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="mt-4 pt-4 border-t border-gray-100">
          {/* 댓글 목록 */}
          {loading ? (
            <p className="text-xs text-gray-400 mb-2">댓글 불러오는 중...</p>
          ) : replies.length > 0 ? (
            <div className="space-y-2 mb-3">
              {replies.map(reply => (
                <div key={reply.id} className="flex gap-2 bg-gray-50 rounded-xl px-3 py-2">
                  <span className="text-gray-400 text-sm mt-0.5">💬</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-gray-700 leading-relaxed break-words">{reply.content}</p>
                    <p className="text-xs text-gray-400 mt-0.5">{relativeTime(reply.created_at)}</p>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <p className="text-xs text-gray-400 mb-2">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</p>
          )}

          {/* 댓글 입력 */}
          <div className="flex gap-2">
            <input
              type="text"
              value={replyText}
              onChange={e => setReplyText(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && !e.shiftKey && handleSubmit()}
              placeholder="따뜻한 한마디를 남겨보세요..."
              maxLength={200}
              className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-200 focus:border-transparent"
            />
            <button
              onClick={handleSubmit}
              disabled={!replyText.trim() || submitting}
              className="px-4 py-2 bg-gradient-to-r from-purple-400 to-pink-400 text-white text-sm font-medium rounded-xl hover:from-purple-500 hover:to-pink-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all cursor-pointer"
            >
              {submitting ? '...' : '등록'}
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // 💌 PostCard Component
    // ========================================
    function PostCard({ post, onLike }) {
      const [animating, setAnimating] = useState(false);
      const [showReplies, setShowReplies] = useState(false);

      const handleLike = () => {
        setAnimating(true);
        onLike(post.id);
        setTimeout(() => setAnimating(false), 300);
      };

      return (
        <Card className="mb-4 hover:shadow-xl transition-shadow duration-300">
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <Badge category={post.category} />
              <p className="mt-3 text-gray-700 leading-relaxed whitespace-pre-wrap break-words">
                {post.content}
              </p>
              <div className="flex items-center gap-3 mt-3">
                <p className="text-xs text-gray-400">{relativeTime(post.created_at)}</p>
                <button
                  onClick={() => setShowReplies(v => !v)}
                  className="text-xs text-purple-400 hover:text-purple-600 font-medium cursor-pointer transition-colors"
                >
                  💬 {showReplies ? '댓글 닫기' : '댓글 달기'}
                </button>
              </div>
            </div>
            <button
              onClick={handleLike}
              className={`flex flex-col items-center gap-1 px-3 py-2 rounded-xl hover:bg-pink-50 transition-colors cursor-pointer ${animating ? 'like-pop' : ''}`}
              aria-label="공감"
            >
              <span className="text-xl">❤️</span>
              <span className="text-sm font-bold text-pink-500">{post.likes}</span>
            </button>
          </div>
          {showReplies && <ReplySection postId={post.id} />}
        </Card>
      );
    }

    // ========================================
    // 📄 PostList Component
    // ========================================
    function PostList({ posts, loading, error, onLike }) {
      if (loading && posts.length === 0) {
        return (
          <div className="text-center py-16">
            <div className="inline-block w-10 h-10 border-4 border-purple-300 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="text-gray-500">게시글을 불러오는 중...</p>
          </div>
        );
      }

      if (error) {
        return (
          <Card className="text-center py-10">
            <p className="text-red-400 text-lg mb-2">서버 연결에 실패했습니다</p>
            <p className="text-gray-400 text-sm">잠시 후 다시 시도해 주세요</p>
          </Card>
        );
      }

      if (posts.length === 0) {
        return (
          <Card className="text-center py-12">
            <p className="text-4xl mb-3">📝</p>
            <p className="text-gray-500">아직 작성된 글이 없어요</p>
            <p className="text-gray-400 text-sm mt-1">첫 번째 글을 작성해 보세요!</p>
          </Card>
        );
      }

      return (
        <div>
          {posts.map(post => (
            <PostCard key={post.id} post={post} onLike={onLike} />
          ))}
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [posts, setPosts] = useState([]);
      const [sort, setSort] = useState('latest');
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const intervalRef = useRef(null);

      const fetchPosts = useCallback(async (showLoading = false) => {
        if (showLoading) setLoading(true);
        try {
          const res = await fetch(`${API_BASE_URL}/api/posts?sort=${sort}`);
          if (!res.ok) throw new Error('서버 오류');
          const data = await res.json();
          setPosts(data.data ?? data);
          setError(null);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [sort]);

      // Initial load & sort change
      useEffect(() => {
        fetchPosts(true);
      }, [fetchPosts]);

      // 5-second polling
      useEffect(() => {
        intervalRef.current = setInterval(() => fetchPosts(false), 5000);
        return () => clearInterval(intervalRef.current);
      }, [fetchPosts]);

      const handleSubmit = async ({ category, content }) => {
        const res = await fetch(`${API_BASE_URL}/api/posts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, content }),
        });
        if (!res.ok) throw new Error('작성 실패');
        await fetchPosts(false);
      };

      const handleLike = async (id) => {
        // Optimistic update
        setPosts(prev =>
          prev.map(p => p.id === id ? { ...p, likes: p.likes + 1 } : p)
        );
        try {
          await fetch(`${API_BASE_URL}/api/posts/${id}/like`, { method: 'POST' });
        } catch {
          // Revert on failure
          setPosts(prev =>
            prev.map(p => p.id === id ? { ...p, likes: p.likes - 1 } : p)
          );
        }
      };

      return (
        <div className="min-h-screen">
          <div className="max-w-xl mx-auto px-4 pb-12">
            <Header />
            <PostForm onSubmit={handleSubmit} />
            <SortTabs sort={sort} onSortChange={setSort} />
            <PostList
              posts={posts}
              loading={loading}
              error={error}
              onLike={handleLike}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
