<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Todos</title>
<script>tailwind.config = { darkMode: 'class' }</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: -apple-system, 'Segoe UI', sans-serif; margin: 0; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(139,92,246,0.2); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .progress-bar { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .theme-tr * { transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  .dark ::-webkit-scrollbar-thumb { background: #334155; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .kanban-col { min-width: 200px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const API_SERVERS = [
  { key: 'sqlite', label: 'SQLite API', port: 3001, color: 'from-indigo-500 to-blue-500' },
  { key: 'json',   label: 'JSON API',   port: 3002, color: 'from-emerald-500 to-teal-500' },
];

const CATEGORIES = [
  { key: 'all',      label: '전체',     emoji: '✨' },
  { key: 'work',     label: 'Work',     emoji: '💼' },
  { key: 'study',    label: 'Study',    emoji: '📚' },
  { key: 'personal', label: 'Personal', emoji: '🌿' },
  { key: 'shopping', label: 'Shopping', emoji: '🛍️' },
  { key: 'health',   label: 'Health',   emoji: '💗' },
];

const CAT_DATA = {
  work:     { badgeDark:'bg-blue-500/20 text-blue-300 border-blue-500/30',     badgeLight:'bg-blue-100 text-blue-700 border-blue-200',     dot:'bg-blue-400',    glow:'shadow-blue-500/20',    bar:'bg-blue-400',    col:'border-blue-500/30',    headDark:'from-blue-900/40',    headLight:'from-blue-50',    emoji:'💼' },
  study:    { badgeDark:'bg-purple-500/20 text-purple-300 border-purple-500/30', badgeLight:'bg-purple-100 text-purple-700 border-purple-200', dot:'bg-purple-400', glow:'shadow-purple-500/20',  bar:'bg-purple-400',  col:'border-purple-500/30',  headDark:'from-purple-900/40',  headLight:'from-purple-50',  emoji:'📚' },
  personal: { badgeDark:'bg-emerald-500/20 text-emerald-300 border-emerald-500/30', badgeLight:'bg-emerald-100 text-emerald-700 border-emerald-200', dot:'bg-emerald-400', glow:'shadow-emerald-500/20', bar:'bg-emerald-400', col:'border-emerald-500/30', headDark:'from-emerald-900/40', headLight:'from-emerald-50', emoji:'🌿' },
  shopping: { badgeDark:'bg-orange-500/20 text-orange-300 border-orange-500/30', badgeLight:'bg-orange-100 text-orange-700 border-orange-200', dot:'bg-orange-400', glow:'shadow-orange-500/20',  bar:'bg-orange-400',  col:'border-orange-500/30',  headDark:'from-orange-900/40',  headLight:'from-orange-50',  emoji:'🛍️' },
  health:   { badgeDark:'bg-pink-500/20 text-pink-300 border-pink-500/30',     badgeLight:'bg-pink-100 text-pink-700 border-pink-200',     dot:'bg-pink-400',    glow:'shadow-pink-500/20',    bar:'bg-pink-400',    col:'border-pink-500/30',    headDark:'from-pink-900/40',    headLight:'from-pink-50',    emoji:'💗' },
};

const VIEWS = [
  { key:'list',     label:'목록',     icon:'☰' },
  { key:'kanban',   label:'칸반',     icon:'⊞' },
  { key:'table',    label:'표',       icon:'⊟' },
  { key:'timeline', label:'타임라인', icon:'◎' },
];

// ========================================
// 디자인 시스템
// ========================================
function Spinner({ size = 'lg' }) {
  return (
    <div className="flex flex-col items-center gap-3 py-16">
      <div className="spinner" style={size === 'sm' ? {width:24,height:24,borderWidth:2} : {}}></div>
      {size === 'lg' && <p className="text-slate-400 text-sm">불러오는 중...</p>}
    </div>
  );
}

function Badge({ category, isDark }) {
  const s = CAT_DATA[category] || CAT_DATA.work;
  return (
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium border ${isDark ? s.badgeDark : s.badgeLight}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}></span>
      {category}
    </span>
  );
}

function ProgressBar({ value, total }) {
  const pct = total === 0 ? 0 : Math.round((value / total) * 100);
  return (
    <div>
      <div className="flex justify-between text-xs text-slate-500 dark:text-slate-400 mb-1.5">
        <span>전체 진행률</span>
        <span className="font-mono">{value} / {total} ({pct}%)</span>
      </div>
      <div className="h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
        <div className="progress-bar h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500" style={{width:`${pct}%`}}></div>
      </div>
    </div>
  );
}

function CheckBox({ done, onToggle }) {
  return (
    <button onClick={onToggle} className={`flex-shrink-0 w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${done ? 'bg-gradient-to-br from-indigo-500 to-purple-600 border-transparent' : 'border-slate-300 dark:border-slate-600 hover:border-purple-400'}`} aria-label="toggle">
      {done && <span className="text-white text-xs font-bold">✓</span>}
    </button>
  );
}

// ========================================
// 로그인 페이지
// ========================================
function LoginPage({ onLogin, apiKey, setApiKey, isDark, setIsDark }) {
  const [id, setId] = useState('');
  const [pw, setPw] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const apiServer = API_SERVERS.find(s => s.key === apiKey);

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const res = await fetch(`http://localhost:${apiServer.port}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, password: pw }),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      onLogin(json.token, json.user);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-[#0f172a] flex items-center justify-center px-4 theme-tr">
      <div className="w-full max-w-sm">
        {/* 로고 */}
        <div className="text-center mb-8">
          <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-3xl shadow-xl shadow-purple-500/30 mx-auto mb-4">✓</div>
          <h1 className="text-2xl font-bold bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">My Todos</h1>
          <p className="text-xs text-slate-400 mt-1">로그인하여 시작하세요</p>
        </div>

        {/* 카드 */}
        <div className="bg-white dark:bg-slate-800/60 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-xl p-6">
          {/* API 선택 */}
          <div className="flex gap-1 bg-slate-100 dark:bg-slate-900/50 rounded-xl p-1 mb-5">
            {API_SERVERS.map(s => (
              <button key={s.key} onClick={() => setApiKey(s.key)}
                className={`flex-1 py-1.5 rounded-lg text-xs font-medium transition-all ${apiKey === s.key ? `bg-gradient-to-r ${s.color} text-white shadow` : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}>
                {s.label}
              </button>
            ))}
          </div>

          <form onSubmit={handleLogin} className="space-y-4">
            <div>
              <label className="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5">아이디</label>
              <input value={id} onChange={e => setId(e.target.value)} placeholder="admin"
                className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:border-purple-400 transition" />
            </div>
            <div>
              <label className="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5">비밀번호</label>
              <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••"
                className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:border-purple-400 transition" />
            </div>

            {error && <p className="text-xs text-red-500 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 rounded-lg px-3 py-2">{error}</p>}

            <button type="submit" disabled={loading}
              className="w-full py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold text-sm shadow-lg shadow-purple-500/30 hover:shadow-purple-500/50 transition-all disabled:opacity-60 flex items-center justify-center gap-2">
              {loading ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> 로그인 중...</> : '로그인'}
            </button>
          </form>
        </div>

        {/* 다크 토글 */}
        <div className="flex justify-center mt-4">
          <button onClick={() => setIsDark(d => !d)} className="flex items-center gap-2 text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition">
            <span>{isDark ? '☀️' : '🌙'}</span> {isDark ? '라이트 모드' : '다크 모드'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ========================================
// 뷰 컴포넌트들
// ========================================
function ListView({ todos, toggle, isDark }) {
  return (
    <div className="space-y-2 fade-in">
      {todos.length === 0 && <div className="text-center py-16 text-slate-400"><div className="text-4xl mb-2">🌙</div><p className="text-sm">할 일이 없어요</p></div>}
      {todos.map(todo => (
        <div key={todo.id} className="group bg-white dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700/50 hover:border-slate-300 dark:hover:border-slate-600 rounded-2xl p-4 flex items-center gap-4 transition-all shadow-sm">
          <CheckBox done={todo.done} onToggle={() => toggle(todo.id)} />
          <div className="flex-1 min-w-0">
            <p className={`text-sm sm:text-base transition-all ${todo.done ? 'line-through text-slate-400 dark:text-slate-500' : 'text-slate-700 dark:text-slate-100'}`}>{todo.title}</p>
            {todo.date && <p className="text-xs text-slate-400 mt-0.5">{todo.date}</p>}
          </div>
          <Badge category={todo.category} isDark={isDark} />
        </div>
      ))}
    </div>
  );
}

function KanbanView({ todos, toggle, isDark }) {
  const cats = CATEGORIES.filter(c => c.key !== 'all');
  return (
    <div className="fade-in overflow-x-auto pb-2">
      <div className="flex gap-4" style={{minWidth:`${cats.length * 220}px`}}>
        {cats.map(cat => {
          const s = CAT_DATA[cat.key];
          const items = todos.filter(t => t.category === cat.key);
          const done = items.filter(t => t.done).length;
          const pct = items.length ? Math.round((done/items.length)*100) : 0;
          return (
            <div key={cat.key} className={`kanban-col flex-1 bg-slate-50 dark:bg-slate-800/40 border ${s.col} rounded-2xl overflow-hidden shadow-sm`}>
              <div className={`bg-gradient-to-r ${isDark ? s.headDark : s.headLight} to-transparent px-4 py-3 border-b ${s.col}`}>
                <div className="flex items-center justify-between mb-2">
                  <span className="font-semibold text-sm text-slate-700 dark:text-slate-200">{cat.emoji} {cat.label}</span>
                  <span className="text-xs text-slate-500 dark:text-slate-400 font-mono">{done}/{items.length}</span>
                </div>
                <div className="h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                  <div className={`h-full ${s.bar} progress-bar`} style={{width:`${pct}%`}}></div>
                </div>
              </div>
              <div className="p-3 space-y-2">
                {items.length === 0 && <div className="text-center py-6 text-slate-400 text-xs">비어있음</div>}
                {items.map(todo => (
                  <div key={todo.id} onClick={() => toggle(todo.id)}
                    className={`bg-white dark:bg-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600/50 rounded-xl p-3 cursor-pointer transition-all group shadow-sm ${todo.done ? 'opacity-50' : ''}`}>
                    <div className="flex items-start gap-2.5">
                      <div className={`mt-0.5 flex-shrink-0 w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${todo.done ? `${s.bar} border-transparent` : 'border-slate-300 dark:border-slate-500'}`}>
                        {todo.done && <span className="text-white text-[10px] font-bold">✓</span>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className={`text-xs leading-relaxed ${todo.done ? 'line-through text-slate-400 dark:text-slate-500' : 'text-slate-700 dark:text-slate-200'}`}>{todo.title}</p>
                        {todo.date && <p className="text-[10px] text-slate-400 mt-0.5">{todo.date}</p>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TableView({ todos, toggle, isDark }) {
  const [sortKey, setSortKey] = useState('id');
  const [sortDir, setSortDir] = useState('asc');

  const sorted = useMemo(() => [...todos].sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortDir === 'asc' ? va - vb : vb - va;
  }), [todos, sortKey, sortDir]);

  const handleSort = key => { if (sortKey === key) setSortDir(d => d==='asc'?'desc':'asc'); else { setSortKey(key); setSortDir('asc'); } };
  const SortIcon = ({ col }) => sortKey !== col ? <span className="text-slate-400 ml-1">⇅</span> : <span className="text-purple-500 ml-1">{sortDir==='asc'?'↑':'↓'}</span>;

  const cols = [
    { key:'id',       label:'ID',      w:'w-12' },
    { key:'category', label:'카테고리', w:'w-28' },
    { key:'title',    label:'할 일',   w:'' },
    { key:'date',     label:'날짜',    w:'w-28' },
    { key:'done',     label:'상태',    w:'w-20' },
  ];

  return (
    <div className="fade-in overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm">
      <table className="w-full text-sm">
        <thead>
          <tr className="bg-slate-100 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700/50">
            {cols.map(col => (
              <th key={col.key} onClick={() => handleSort(col.key)}
                className={`${col.w} px-4 py-3 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide cursor-pointer hover:text-slate-700 dark:hover:text-slate-200 transition select-none`}>
                {col.label}<SortIcon col={col.key} />
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.length === 0 && <tr><td colSpan={5} className="text-center py-12 text-slate-400 text-xs">할 일이 없어요</td></tr>}
          {sorted.map((todo, i) => (
            <tr key={todo.id} className={`border-b border-slate-100 dark:border-slate-700/30 transition-colors ${i%2===0?'bg-white dark:bg-slate-800/20':'bg-slate-50/80 dark:bg-slate-800/40'} hover:bg-indigo-50/50 dark:hover:bg-slate-700/40`}>
              <td className="px-4 py-3 text-slate-400 dark:text-slate-500 font-mono text-xs">{todo.id}</td>
              <td className="px-4 py-3"><Badge category={todo.category} isDark={isDark} /></td>
              <td className="px-4 py-3 text-slate-700 dark:text-slate-200"><span className={todo.done?'line-through text-slate-400 dark:text-slate-500':''}>{todo.title}</span></td>
              <td className="px-4 py-3 text-xs text-slate-400 font-mono">{todo.date || '-'}</td>
              <td className="px-4 py-3">
                <button onClick={() => toggle(todo.id)}
                  className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium transition-all border ${todo.done ? 'bg-emerald-100 dark:bg-emerald-500/20 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-500/30' : 'bg-slate-100 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-600/50 hover:border-slate-400'}`}>
                  {todo.done ? '✓ 완료' : '미완료'}
                </button>
              </td>
            </tr>
          ))}
        </tbody>
        <tfoot>
          <tr className="bg-slate-50 dark:bg-slate-800/60 border-t border-slate-200 dark:border-slate-700/50">
            <td colSpan={5} className="px-4 py-2.5 text-xs text-slate-400 dark:text-slate-500">
              총 {todos.length}개 · 완료 {todos.filter(t=>t.done).length}개 · 미완료 {todos.filter(t=>!t.done).length}개
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  );
}

function TimelineView({ todos, toggle, isDark }) {
  const cats = CATEGORIES.filter(c => c.key !== 'all');
  return (
    <div className="fade-in space-y-8">
      {cats.map(cat => {
        const s = CAT_DATA[cat.key];
        const items = todos.filter(t => t.category === cat.key);
        const doneCount = items.filter(t => t.done).length;
        return (
          <div key={cat.key}>
            <div className="flex items-center gap-3 mb-3">
              <div className={`w-8 h-8 rounded-xl ${s.bar} flex items-center justify-center text-sm shadow-lg ${s.glow}`}>{cat.emoji}</div>
              <div>
                <span className="font-semibold text-sm text-slate-700 dark:text-slate-200">{cat.label}</span>
                <span className="ml-2 text-xs text-slate-400">{doneCount}/{items.length} 완료</span>
              </div>
              <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700/50"></div>
            </div>
            <div className="ml-4 relative pl-8">
              <div className={`absolute left-[11px] top-2 bottom-0 w-0.5 ${s.bar} opacity-20`}></div>
              <div className="space-y-3">
                {items.map((todo, idx) => (
                  <div key={todo.id} className="relative flex items-start gap-3 group">
                    <div onClick={() => toggle(todo.id)}
                      className={`absolute -left-8 mt-1 w-5 h-5 rounded-full border-2 flex items-center justify-center cursor-pointer transition-all z-10 ${todo.done ? `${s.bar} border-transparent shadow-md ${s.glow}` : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 group-hover:border-slate-400'}`}>
                      {todo.done && <span className="text-white text-[9px] font-bold">✓</span>}
                    </div>
                    <div onClick={() => toggle(todo.id)}
                      className={`flex-1 bg-white dark:bg-slate-800/40 hover:bg-slate-50 dark:hover:bg-slate-800/70 border border-slate-200 dark:border-slate-700/40 hover:border-slate-300 dark:hover:border-slate-600/60 rounded-xl px-4 py-3 cursor-pointer transition-all shadow-sm ${todo.done?'opacity-50':''}`}>
                      <div className="flex items-center justify-between gap-3">
                        <div>
                          <p className={`text-sm ${todo.done?'line-through text-slate-400 dark:text-slate-500':'text-slate-700 dark:text-slate-200'}`}>{todo.title}</p>
                          {todo.date && <p className="text-xs text-slate-400 mt-0.5">{todo.date}</p>}
                        </div>
                        <span className="flex-shrink-0 text-xs text-slate-400 font-mono">#{idx+1}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ========================================
// App
// ========================================
function App() {
  const [token, setToken] = useState(() => localStorage.getItem('todo_token') || '');
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [todos, setTodos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [activeCat, setActiveCat] = useState('all');
  const [query, setQuery] = useState('');
  const [view, setView] = useState('list');
  const [isDark, setIsDark] = useState(true);
  const [apiKey, setApiKey] = useState('json') // JSON API 기본;

  const apiServer = API_SERVERS.find(s => s.key === apiKey);
  const BASE = `http://localhost:${apiServer.port}`;
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);

  // 토큰 검증
  useEffect(() => {
    if (!token) { setAuthLoading(false); return; }
    fetch(`${BASE}/api/me`, { headers })
      .then(r => r.json())
      .then(j => { if (j.success) setUser(j.user); else { setToken(''); localStorage.removeItem('todo_token'); } })
      .catch(() => { setToken(''); localStorage.removeItem('todo_token'); })
      .finally(() => setAuthLoading(false));
  }, [BASE, token]);

  const handleLogin = (tok, usr) => {
    localStorage.setItem('todo_token', tok);
    setToken(tok);
    setUser(usr);
  };

  const handleLogout = async () => {
    await fetch(`${BASE}/api/logout`, { method: 'POST', headers }).catch(() => {});
    localStorage.removeItem('todo_token');
    setToken(''); setUser(null); setTodos([]);
  };

  const loadTodos = useCallback(async () => {
    if (!token) return;
    setLoading(true); setError(null);
    try {
      const res = await fetch(`${BASE}/api/todos`, { headers });
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const json = await res.json();
      setTodos(json.data);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, [BASE, token]);

  useEffect(() => { if (user) loadTodos(); }, [user, loadTodos]);

  const toggle = async (id) => {
    try {
      const res = await fetch(`${BASE}/api/todos/${id}/toggle`, { method: 'PATCH', headers });
      const json = await res.json();
      if (json.success) setTodos(prev => prev.map(t => t.id === id ? json.data : t));
    } catch (e) { alert(e.message); }
  };

  const filtered = useMemo(() => todos.filter(t => {
    if (activeCat !== 'all' && t.category !== activeCat) return false;
    if (query && !t.title.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  }), [todos, activeCat, query]);

  const catCount = key => {
    const list = key === 'all' ? todos : todos.filter(t => t.category === key);
    return { done: list.filter(t => t.done).length, total: list.length };
  };

  const isMultiCat = view === 'kanban' || view === 'timeline';

  // 로딩 중
  if (authLoading) return (
    <div className="min-h-screen bg-slate-50 dark:bg-[#0f172a] flex items-center justify-center theme-tr">
      <Spinner />
    </div>
  );

  // 로그인 안 됨
  if (!user) return <LoginPage onLogin={handleLogin} apiKey={apiKey} setApiKey={setApiKey} isDark={isDark} setIsDark={setIsDark} />;

  const totalDone = todos.filter(t => t.done).length;

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-[#0f172a] text-slate-800 dark:text-slate-100 theme-tr">
      <div className="px-4 py-8 sm:py-10">
        <div className="max-w-5xl mx-auto">

          {/* Header */}
          <header className="mb-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xl shadow-lg shadow-purple-500/20">✓</div>
                <div>
                  <h1 className="text-2xl sm:text-3xl font-bold bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">My Todos</h1>
                  <p className="text-xs text-slate-400">:{apiServer.port}</p>
                </div>
              </div>

              <div className="flex items-center gap-2">
                {/* API 선택 */}
                <div className="flex gap-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-1 shadow-sm">
                  {API_SERVERS.map(s => (
                    <button key={s.key} onClick={() => setApiKey(s.key)}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${apiKey===s.key ? `bg-gradient-to-r ${s.color} text-white shadow` : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`}>
                      {s.label}
                    </button>
                  ))}
                </div>

                {/* 유저 + 로그아웃 */}
                <div className="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm">
                  <div className="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-xs font-bold">
                    {user.name[0]}
                  </div>
                  <span className="text-xs font-medium text-slate-600 dark:text-slate-300 hidden sm:inline">{user.name}</span>
                  <button onClick={handleLogout} className="text-xs text-slate-400 hover:text-red-500 transition ml-1" title="로그아웃">✕</button>
                </div>

                {/* 다크/라이트 */}
                <button onClick={() => setIsDark(d => !d)}
                  className="flex items-center gap-1.5 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all shadow-sm text-sm text-slate-600 dark:text-slate-300">
                  <span>{isDark ? '☀️' : '🌙'}</span>
                  <span className="hidden sm:inline text-xs font-medium">{isDark ? '라이트' : '다크'}</span>
                </button>
              </div>
            </div>

            <div className="bg-white dark:bg-slate-800/50 rounded-2xl p-5 border border-slate-200 dark:border-slate-700/50 shadow-sm">
              <ProgressBar value={totalDone} total={todos.length} />
            </div>
          </header>

          {/* Toolbar */}
          <div className="flex flex-col sm:flex-row gap-3 mb-4">
            <div className="relative flex-1">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
              <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="할 일 검색..."
                className="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-xl text-sm placeholder-slate-400 focus:outline-none focus:border-purple-400 transition shadow-sm text-slate-700 dark:text-slate-200" />
            </div>
            <div className="flex gap-1 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-xl p-1 shadow-sm">
              {VIEWS.map(v => (
                <button key={v.key} onClick={() => setView(v.key)} title={v.label}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${view===v.key ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`}>
                  {v.icon} <span className="hidden sm:inline">{v.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* 카테고리 탭 */}
          {!isMultiCat && (
            <div className="flex gap-2 overflow-x-auto pb-2 mb-4 -mx-1 px-1">
              {CATEGORIES.map(c => {
                const { done, total } = catCount(c.key);
                const active = activeCat === c.key;
                return (
                  <button key={c.key} onClick={() => setActiveCat(c.key)}
                    className={`flex-shrink-0 px-3.5 py-2 rounded-xl text-sm font-medium transition-all border ${active ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white border-transparent shadow-lg shadow-purple-500/30' : 'bg-white dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800 shadow-sm'}`}>
                    {c.emoji} {c.label}
                    <span className={`ml-1.5 text-xs ${active?'text-white/80':'text-slate-400'}`}>{done}/{total}</span>
                  </button>
                );
              })}
            </div>
          )}

          {/* 컨텐츠 */}
          <main>
            {loading && <Spinner />}
            {error && <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-600 dark:text-red-300 rounded-2xl p-5 text-sm text-center">{error}</div>}
            {!loading && !error && (
              <>
                {view==='list'     && <ListView     todos={filtered} toggle={toggle} isDark={isDark} />}
                {view==='kanban'   && <KanbanView   todos={filtered} toggle={toggle} isDark={isDark} />}
                {view==='table'    && <TableView    todos={filtered} toggle={toggle} isDark={isDark} />}
                {view==='timeline' && <TimelineView todos={filtered} toggle={toggle} isDark={isDark} />}
              </>
            )}
          </main>

          <footer className="mt-12 text-center text-xs text-slate-400">
            {user.name}님의 할 일 · {apiServer.label} (:{apiServer.port})
          </footer>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
