<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>썸네일 A — AI에 애플이 물빵했네요</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }

    .canvas {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: linear-gradient(135deg, #00C9A7 0%, #00A88F 45%, #007A6B 100%);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      overflow: hidden;
    }

    /* 오른쪽 어두운 오버레이 (텍스트 가독성) */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 75% 50%, rgba(0,0,0,0.55) 0%, transparent 60%),
        radial-gradient(ellipse at 5% 50%, rgba(0,0,0,0.25) 0%, transparent 40%);
      z-index: 2;
    }

    /* ── 스티브 잡스 사진 (왼쪽) ── */
    .person-wrap {
      position: absolute;
      left: 0;
      bottom: 0;
      z-index: 3;
      width: 820px;
      height: 1080px;
      overflow: hidden;
    }

    .person-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: contrast(1.05) saturate(1.0);
    }

    /* 사진 오른쪽 페이드 (텍스트와 자연스럽게 합성) */
    .person-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 50%,
        rgba(0, 168, 143, 0.5) 75%,
        rgba(0, 122, 107, 0.9) 100%
      );
    }

    /* 사진 하단 페이드 */
    .person-fade-bottom {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 820px;
      height: 200px;
      background: linear-gradient(to top, rgba(0, 122, 107, 0.8), transparent);
      z-index: 4;
    }

    /* ── 오른쪽 텍스트 영역 ── */
    .text-area {
      position: absolute;
      right: 72px;
      top: 50%;
      transform: translateY(-52%);
      z-index: 5;
      text-align: right;
      width: 1000px;
    }

    .tag {
      display: inline-block;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 34px;
      font-weight: 700;
      padding: 10px 30px;
      border-radius: 50px;
      letter-spacing: 2px;
      margin-bottom: 28px;
    }

    .headline-1 {
      font-size: 190px;
      font-weight: 900;
      color: #fff;
      line-height: 0.95;
      letter-spacing: -6px;
      text-shadow: 0 6px 40px rgba(0,0,0,0.5);
      display: block;
    }

    .headline-2 {
      font-size: 190px;
      font-weight: 900;
      color: #FFED00;
      line-height: 0.95;
      letter-spacing: -6px;
      text-shadow: 0 6px 40px rgba(0,0,0,0.5);
      display: block;
    }

    .headline-3 {
      font-size: 190px;
      font-weight: 900;
      color: #fff;
      line-height: 0.95;
      letter-spacing: -6px;
      text-shadow: 0 6px 40px rgba(0,0,0,0.5);
      display: block;
    }

    .sub {
      margin-top: 40px;
      font-size: 50px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0px;
    }

    .accent-word {
      color: #FF6B35;
      font-weight: 900;
    }

    /* ── 에피소드 뱃지 ── */
    .episode-badge {
      position: absolute;
      top: 52px;
      right: 68px;
      z-index: 10;
      width: 108px;
      height: 108px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .episode-num {
      font-size: 50px;
      font-weight: 900;
      color: #000;
      line-height: 1;
    }

    /* ── 상단 강의 뱃지 ── */
    .lecture-badge {
      position: absolute;
      top: 52px;
      left: 52px;
      z-index: 10;
      background: #FF6B35;
      color: #fff;
      font-size: 32px;
      font-weight: 900;
      padding: 14px 30px;
      border-radius: 8px;
      letter-spacing: 1px;
    }

    /* ── 채널명 ── */
    .channel-tag {
      position: absolute;
      bottom: 52px;
      right: 80px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      padding: 10px 26px;
      border-radius: 8px;
      letter-spacing: 1px;
    }

    /* ── 인물 이름 뱃지 ── */
    .person-label {
      position: absolute;
      bottom: 52px;
      left: 52px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      letter-spacing: 1px;
      border-left: 5px solid #FFED00;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- 스티브 잡스 사진 -->
    <div class="person-wrap">
      <img src="./photos-gpt-2/gpt-steve-apple.png" alt="Steve Jobs holding apple">
    </div>
    <div class="person-fade-bottom"></div>

    <!-- 텍스트 영역 -->
    <div class="text-area">
      <div class="tag">맥북 M5 실사용 리뷰</div><br>
      <span class="headline-1">애플이</span>
      <span class="headline-2">물빵</span>
      <span class="headline-3">했네요</span>
      <div class="sub">AI 속도 <span class="accent-word">6배 빠른</span> 맥북의 진실</div>
    </div>

    <!-- 에피소드 뱃지 -->
    <div class="episode-badge">
      <span class="episode-num">31</span>
    </div>

    <!-- 강의 뱃지 -->
    <div class="lecture-badge">강의도 합니다</div>

    <!-- 채널명 -->
    <div class="channel-tag">디자인 엔지니어</div>

    <!-- 인물 라벨 -->
    <div class="person-label">Steve Jobs, 2010</div>

  </div>
</body>
</html>
