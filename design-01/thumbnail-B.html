<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>썸네일 B — AI에 애플이 물빵했네요 (다크 버전)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
    }

    .canvas {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: #0A0A0A;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      overflow: hidden;
    }

    /* 배경 글로우 */
    .bg-glow {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(0,201,167,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 20%, rgba(255,107,53,0.1) 0%, transparent 40%);
    }

    /* ── 스티브 잡스 사진 (중앙-왼쪽, 크게) ── */
    .person-wrap {
      position: absolute;
      left: 0;
      top: 0;
      width: 900px;
      height: 1080px;
      z-index: 3;
      overflow: hidden;
    }

    .person-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: grayscale(30%) contrast(1.1);
    }

    /* 사진 오른쪽 페이드 */
    .person-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 40%,
        rgba(10,10,10,0.7) 72%,
        #0A0A0A 100%
      );
    }

    /* 사진에 틸 컬러 오버레이 */
    .person-tint {
      position: absolute;
      left: 0;
      top: 0;
      width: 900px;
      height: 1080px;
      z-index: 4;
      background: rgba(0, 201, 167, 0.12);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    /* ── 오른쪽 메인 텍스트 ── */
    .text-area {
      position: absolute;
      right: 72px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      text-align: right;
      width: 1020px;
    }

    .right-tag {
      display: inline-block;
      border: 3px solid rgba(0, 201, 167, 0.7);
      color: #00C9A7;
      font-size: 32px;
      font-weight: 700;
      padding: 8px 28px;
      border-radius: 50px;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .h1 {
      font-size: 210px;
      font-weight: 900;
      color: #fff;
      line-height: 0.88;
      letter-spacing: -8px;
      display: block;
      text-shadow: 0 0 80px rgba(0,201,167,0.2);
    }

    .h2 {
      font-size: 210px;
      font-weight: 900;
      color: #FFED00;
      line-height: 0.88;
      letter-spacing: -8px;
      display: block;
      text-shadow: 0 0 60px rgba(255,237,0,0.45);
    }

    .h3 {
      font-size: 210px;
      font-weight: 900;
      color: #fff;
      line-height: 0.88;
      letter-spacing: -8px;
      display: block;
      text-shadow: 0 0 80px rgba(0,201,167,0.2);
    }

    .sub {
      margin-top: 44px;
      font-size: 48px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
    }

    .sub strong { color: #FF6B35; font-weight: 900; }

    /* ── 에피소드 뱃지 ── */
    .episode-badge {
      position: absolute;
      top: 52px;
      right: 68px;
      z-index: 10;
      width: 112px;
      height: 112px;
      background: #00C9A7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 30px rgba(0,201,167,0.5);
    }

    .episode-num {
      font-size: 52px;
      font-weight: 900;
      color: #000;
      line-height: 1;
    }

    /* ── 하단 컬러 라인 ── */
    .bottom-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: linear-gradient(to right, #00C9A7 0%, #FFED00 50%, #FF6B35 100%);
      z-index: 10;
    }

    /* ── 채널명 ── */
    .channel-tag {
      position: absolute;
      bottom: 52px;
      right: 80px;
      z-index: 10;
      color: rgba(255,255,255,0.45);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* ── 인물 이름 뱃지 ── */
    .person-label {
      position: absolute;
      bottom: 52px;
      left: 52px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      letter-spacing: 1px;
      border-left: 5px solid #00C9A7;
    }

    /* 그리드 패턴 */
    .grid-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <div class="bg-glow"></div>
    <div class="grid-overlay"></div>

    <!-- 스티브 잡스 사진 -->
    <div class="person-wrap">
      <img src="./photos-gpt-2/gpt-steve-apple.png" alt="Steve Jobs holding apple">
    </div>
    <div class="person-tint"></div>

    <!-- 오른쪽 메인 텍스트 -->
    <div class="text-area">
      <div class="right-tag">AI 벤치마크</div><br>
      <span class="h1">애플이</span>
      <span class="h2">물빵</span>
      <span class="h3">했네요</span>
      <div class="sub">AI 속도 <strong>x6배</strong> — 진짜일까?</div>
    </div>

    <!-- 에피소드 뱃지 -->
    <div class="episode-badge">
      <span class="episode-num">31</span>
    </div>

    <!-- 하단 컬러 라인 -->
    <div class="bottom-line"></div>

    <!-- 채널명 -->
    <div class="channel-tag">디자인 엔지니어</div>

    <!-- 인물 라벨 -->
    <div class="person-label">Steve Jobs, 2010</div>

  </div>
</body>
</html>
