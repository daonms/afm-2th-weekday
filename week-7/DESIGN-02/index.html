<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Inc. Dashboard — shadcn/ui style</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif']
          },
          colors: {
            border: {
              DEFAULT: '#e4e4e7',
              dark: '#27272a'
            }
          },
          boxShadow: {
            'soft': '0 1px 2px 0 rgb(0 0 0 / 0.05)',
            'card': '0 1px 3px 0 rgb(0 0 0 / 0.04), 0 1px 2px -1px rgb(0 0 0 / 0.04)'
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    html, body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: #ffffff;
      color: #09090b;
    }

    .dark body,
    html.dark body {
      background-color: #09090b;
      color: #fafafa;
    }

    /* Custom scrollbar — shadcn-ish */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #e4e4e7;
      border-radius: 8px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: #d4d4d8; background-clip: content-box; }
    .dark ::-webkit-scrollbar-thumb { background: #27272a; background-clip: content-box; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #3f3f46; background-clip: content-box; }

    /* Lucide icon size default */
    [data-lucide] { width: 16px; height: 16px; stroke-width: 2; }

    /* Subtle background gradient for cards (shadcn dashboard-01 vibe) */
    .card-grad {
      background-image: linear-gradient(180deg, rgba(0,0,0,0.02), transparent);
    }
    .dark .card-grad {
      background-image: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }

    /* Tab indicator transition */
    .tab-indicator { transition: all 0.2s ease; }
  </style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

    // ========================================
    // Helper — Lucide Icon Renderer
    // ========================================
    function Icon({ name, className = "", size = 16, strokeWidth = 2 }) {
      const ref = useRef(null);
      useEffect(() => {
        if (window.lucide && ref.current) {
          ref.current.innerHTML = '';
          const svg = window.lucide.createElement(window.lucide.icons[toPascal(name)]);
          if (svg) {
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            svg.setAttribute('stroke-width', strokeWidth);
            svg.classList.add(...className.split(' ').filter(Boolean));
            ref.current.appendChild(svg);
          }
        }
      }, [name, className, size, strokeWidth]);
      return <span ref={ref} className="inline-flex items-center justify-center" />;
    }

    function toPascal(str) {
      return str.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
    }

    // ========================================
    // Theme Context — Dark/Light Mode
    // ========================================
    const ThemeContext = createContext({ theme: 'light', toggle: () => {} });

    function ThemeProvider({ children }) {
      const [theme, setTheme] = useState(() => {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      });

      useEffect(() => {
        const root = document.documentElement;
        if (theme === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggle = useCallback(() => {
        setTheme(t => t === 'dark' ? 'light' : 'dark');
      }, []);

      return (
        <ThemeContext.Provider value={{ theme, toggle }}>
          {children}
        </ThemeContext.Provider>
      );
    }

    const useTheme = () => useContext(ThemeContext);

    // ========================================
    // 🎨 Design System — Button
    // ========================================
    function Button({
      variant = 'default',
      size = 'md',
      className = '',
      children,
      ...props
    }) {
      const base = 'inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-950 dark:focus-visible:ring-zinc-300 disabled:pointer-events-none disabled:opacity-50';
      const variants = {
        default: 'bg-zinc-900 text-zinc-50 hover:bg-zinc-800 dark:bg-zinc-50 dark:text-zinc-900 dark:hover:bg-zinc-200',
        outline: 'border border-zinc-200 bg-white hover:bg-zinc-100 hover:text-zinc-900 dark:border-zinc-800 dark:bg-zinc-950 dark:hover:bg-zinc-800 dark:hover:text-zinc-50',
        ghost: 'hover:bg-zinc-100 hover:text-zinc-900 dark:hover:bg-zinc-800 dark:hover:text-zinc-50',
        secondary: 'bg-zinc-100 text-zinc-900 hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-50 dark:hover:bg-zinc-700'
      };
      const sizes = {
        sm: 'h-8 px-3 text-xs',
        md: 'h-9 px-4',
        lg: 'h-10 px-6',
        icon: 'h-9 w-9'
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    // ========================================
    // 🎨 Design System — Card
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 shadow-card ${className}`}>
          {children}
        </div>
      );
    }

    function CardHeader({ children, className = '' }) {
      return <div className={`flex flex-col space-y-1.5 p-6 ${className}`}>{children}</div>;
    }
    function CardContent({ children, className = '' }) {
      return <div className={`p-6 pt-0 ${className}`}>{children}</div>;
    }
    function CardFooter({ children, className = '' }) {
      return <div className={`flex items-center p-6 pt-0 ${className}`}>{children}</div>;
    }

    // ========================================
    // 🎨 Design System — Badge
    // ========================================
    function Badge({ variant = 'default', children, className = '' }) {
      const variants = {
        default: 'bg-zinc-900 text-zinc-50 dark:bg-zinc-50 dark:text-zinc-900',
        secondary: 'bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-zinc-50',
        outline: 'text-zinc-950 dark:text-zinc-50 border border-zinc-200 dark:border-zinc-800',
        success: 'bg-emerald-50 text-emerald-700 border border-emerald-200 dark:bg-emerald-950/40 dark:text-emerald-400 dark:border-emerald-900',
        warning: 'bg-amber-50 text-amber-700 border border-amber-200 dark:bg-amber-950/40 dark:text-amber-400 dark:border-amber-900',
        danger: 'bg-rose-50 text-rose-700 border border-rose-200 dark:bg-rose-950/40 dark:text-rose-400 dark:border-rose-900'
      };
      return (
        <span className={`inline-flex items-center gap-1 rounded-md px-2 py-0.5 text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 🧩 Sidebar — Navigation
    // ========================================
    function Sidebar() {
      const [active, setActive] = useState('Dashboard');

      const mainNav = [
        { name: 'Dashboard', icon: 'layout-dashboard' },
        { name: 'Lifecycle', icon: 'list-todo' },
        { name: 'Analytics', icon: 'bar-chart-3' },
        { name: 'Projects', icon: 'folder-kanban' },
        { name: 'Team', icon: 'users' }
      ];

      const docNav = [
        { name: 'Data Library', icon: 'database' },
        { name: 'Reports', icon: 'file-text' },
        { name: 'Word Assistant', icon: 'file-pen-line' },
        { name: 'More', icon: 'more-horizontal' }
      ];

      const footerNav = [
        { name: 'Settings', icon: 'settings-2' },
        { name: 'Get Help', icon: 'circle-help' },
        { name: 'Search', icon: 'search' }
      ];

      return (
        <aside className="w-[240px] shrink-0 border-r border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 flex flex-col h-screen sticky top-0">
          {/* Logo */}
          <div className="h-14 px-4 flex items-center border-b border-zinc-200 dark:border-zinc-800">
            <div className="flex items-center gap-2">
              <div className="h-7 w-7 rounded-md bg-zinc-900 dark:bg-zinc-50 flex items-center justify-center">
                <Icon name="command" className="text-zinc-50 dark:text-zinc-900" size={16} />
              </div>
              <span className="font-semibold text-sm tracking-tight">Acme Inc.</span>
            </div>
          </div>

          {/* Quick Create */}
          <div className="px-3 pt-3 pb-2">
            <Button variant="default" className="w-full justify-start gap-2" size="md">
              <Icon name="circle-plus" className="text-zinc-50 dark:text-zinc-900" size={16} />
              Quick Create
            </Button>
          </div>

          {/* Main nav */}
          <nav className="px-3 pt-2 flex-1 overflow-y-auto">
            <div className="space-y-0.5">
              {mainNav.map(item => (
                <button
                  key={item.name}
                  onClick={() => setActive(item.name)}
                  className={`w-full flex items-center gap-3 px-2.5 py-2 rounded-md text-sm transition-colors ${
                    active === item.name
                      ? 'bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-zinc-50 font-medium'
                      : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 hover:text-zinc-900 dark:hover:bg-zinc-800 dark:hover:text-zinc-50'
                  }`}
                >
                  <Icon name={item.icon} size={16} />
                  <span>{item.name}</span>
                </button>
              ))}
            </div>

            {/* Documents section */}
            <div className="mt-6">
              <p className="px-2.5 mb-1.5 text-xs font-medium text-zinc-500 dark:text-zinc-500 uppercase tracking-wider">
                Documents
              </p>
              <div className="space-y-0.5">
                {docNav.map(item => (
                  <button
                    key={item.name}
                    onClick={() => setActive(item.name)}
                    className={`w-full flex items-center gap-3 px-2.5 py-2 rounded-md text-sm transition-colors ${
                      active === item.name
                        ? 'bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-zinc-50 font-medium'
                        : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 hover:text-zinc-900 dark:hover:bg-zinc-800 dark:hover:text-zinc-50'
                    }`}
                  >
                    <Icon name={item.icon} size={16} />
                    <span>{item.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* Footer nav */}
          <div className="px-3 py-3 border-t border-zinc-200 dark:border-zinc-800">
            <div className="space-y-0.5">
              {footerNav.map(item => (
                <button
                  key={item.name}
                  className="w-full flex items-center gap-3 px-2.5 py-2 rounded-md text-sm text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 hover:text-zinc-900 dark:hover:bg-zinc-800 dark:hover:text-zinc-50 transition-colors"
                >
                  <Icon name={item.icon} size={16} />
                  <span>{item.name}</span>
                </button>
              ))}
            </div>

            {/* User card */}
            <div className="mt-3 pt-3 border-t border-zinc-200 dark:border-zinc-800">
              <div className="flex items-center gap-3 px-1.5">
                <div className="h-8 w-8 rounded-full bg-gradient-to-br from-zinc-700 to-zinc-900 dark:from-zinc-300 dark:to-zinc-500 flex items-center justify-center text-xs font-semibold text-white dark:text-zinc-900">
                  DM
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium truncate">daon</p>
                  <p className="text-xs text-zinc-500 dark:text-zinc-500 truncate">m@daonms.com</p>
                </div>
                <Icon name="chevrons-up-down" className="text-zinc-400" size={16} />
              </div>
            </div>
          </div>
        </aside>
      );
    }

    // ========================================
    // 🧩 Header
    // ========================================
    function Header() {
      const { theme, toggle } = useTheme();
      return (
        <header className="h-14 px-6 flex items-center justify-between border-b border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-950/80 backdrop-blur sticky top-0 z-10">
          <div className="flex items-center gap-3">
            <Button variant="ghost" size="icon" className="lg:hidden">
              <Icon name="panel-left" size={16} />
            </Button>
            <div className="h-4 w-px bg-zinc-200 dark:bg-zinc-800 lg:hidden" />
            <h1 className="text-base font-semibold tracking-tight">Documents</h1>
          </div>

          <div className="flex items-center gap-2">
            <Button variant="outline" size="sm" className="gap-2">
              <Icon name="github" size={14} />
              <span className="hidden sm:inline">GitHub</span>
            </Button>
            <Button variant="ghost" size="icon" onClick={toggle} aria-label="Toggle theme">
              <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={16} />
            </Button>
          </div>
        </header>
      );
    }

    // ========================================
    // 📄 KPI Card Component
    // ========================================
    function KpiCard({ title, value, change, changeType, description, sub, icon }) {
      const positive = changeType === 'up';
      return (
        <Card className="card-grad">
          <CardHeader className="pb-2">
            <div className="flex items-start justify-between">
              <p className="text-sm font-medium text-zinc-500 dark:text-zinc-400">{title}</p>
              <Badge variant="outline" className="gap-1">
                <Icon name={positive ? 'trending-up' : 'trending-down'} size={12} />
                {change}
              </Badge>
            </div>
            <div className="text-3xl font-semibold tracking-tight pt-1">{value}</div>
          </CardHeader>
          <CardFooter className="flex-col items-start gap-1 text-sm">
            <div className="flex items-center gap-1.5 font-medium">
              {description}
              <Icon name={positive ? 'trending-up' : 'trending-down'} size={14} className={positive ? 'text-emerald-600' : 'text-rose-600'} />
            </div>
            <p className="text-xs text-zinc-500 dark:text-zinc-400">{sub}</p>
          </CardFooter>
        </Card>
      );
    }

    function KpiGrid() {
      const kpis = [
        {
          title: 'Total Revenue',
          value: '$1,250.00',
          change: '+12.5%',
          changeType: 'up',
          description: 'Trending up this month',
          sub: 'Visitors for the last 6 months'
        },
        {
          title: 'New Customers',
          value: '1,234',
          change: '-20%',
          changeType: 'down',
          description: 'Down 20% this period',
          sub: 'Acquisition needs attention'
        },
        {
          title: 'Active Accounts',
          value: '45,678',
          change: '+12.5%',
          changeType: 'up',
          description: 'Strong user retention',
          sub: 'Engagement exceeds targets'
        },
        {
          title: 'Growth Rate',
          value: '4.5%',
          change: '+4.5%',
          changeType: 'up',
          description: 'Steady performance',
          sub: 'Meets growth projections'
        }
      ];

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          {kpis.map(k => <KpiCard key={k.title} {...k} />)}
        </div>
      );
    }

    // ========================================
    // 📄 Chart Card — Total Visitors
    // ========================================
    function ChartCard() {
      const { theme } = useTheme();
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      const [range, setRange] = useState('90d');

      const datasets = useMemo(() => ({
        '7d': {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          a: [320, 410, 380, 520, 470, 600, 580],
          b: [220, 310, 290, 410, 380, 450, 470]
        },
        '30d': {
          labels: Array.from({ length: 30 }, (_, i) => `${i + 1}`),
          a: [220, 310, 290, 410, 380, 450, 470, 510, 480, 540, 600, 580, 640, 700, 660, 720, 690, 750, 800, 770, 820, 870, 850, 910, 940, 900, 970, 1020, 1000, 1080],
          b: [180, 240, 220, 310, 290, 340, 360, 400, 380, 430, 470, 460, 510, 550, 530, 580, 560, 610, 650, 630, 670, 710, 700, 750, 770, 740, 810, 850, 830, 900]
        },
        '90d': {
          labels: Array.from({ length: 12 }, (_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - (11 - i) * 7);
            return d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
          }),
          a: [240, 320, 290, 410, 360, 480, 520, 580, 540, 610, 680, 720],
          b: [180, 240, 220, 320, 290, 380, 410, 450, 430, 490, 540, 580]
        }
      }), []);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();

        const isDark = theme === 'dark';
        const ctx = canvasRef.current.getContext('2d');
        const data = datasets[range];

        // Gradients
        const grad1 = ctx.createLinearGradient(0, 0, 0, 280);
        grad1.addColorStop(0, isDark ? 'rgba(228,228,231,0.30)' : 'rgba(24,24,27,0.20)');
        grad1.addColorStop(1, isDark ? 'rgba(228,228,231,0.00)' : 'rgba(24,24,27,0.00)');

        const grad2 = ctx.createLinearGradient(0, 0, 0, 280);
        grad2.addColorStop(0, isDark ? 'rgba(161,161,170,0.20)' : 'rgba(113,113,122,0.15)');
        grad2.addColorStop(1, isDark ? 'rgba(161,161,170,0.00)' : 'rgba(113,113,122,0.00)');

        chartRef.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.labels,
            datasets: [
              {
                label: 'Desktop',
                data: data.a,
                borderColor: isDark ? '#fafafa' : '#18181b',
                backgroundColor: grad1,
                tension: 0.4,
                fill: true,
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 4,
                pointHoverBackgroundColor: isDark ? '#fafafa' : '#18181b',
                pointHoverBorderColor: isDark ? '#18181b' : '#ffffff',
                pointHoverBorderWidth: 2
              },
              {
                label: 'Mobile',
                data: data.b,
                borderColor: isDark ? '#a1a1aa' : '#71717a',
                backgroundColor: grad2,
                tension: 0.4,
                fill: true,
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 4,
                pointHoverBackgroundColor: isDark ? '#a1a1aa' : '#71717a',
                pointHoverBorderColor: isDark ? '#18181b' : '#ffffff',
                pointHoverBorderWidth: 2
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                backgroundColor: isDark ? '#fafafa' : '#18181b',
                titleColor: isDark ? '#18181b' : '#fafafa',
                bodyColor: isDark ? '#3f3f46' : '#d4d4d8',
                borderColor: isDark ? '#27272a' : '#e4e4e7',
                borderWidth: 1,
                padding: 10,
                cornerRadius: 6,
                titleFont: { weight: '600', size: 12 },
                bodyFont: { size: 12 },
                displayColors: true,
                boxPadding: 4
              }
            },
            scales: {
              x: {
                grid: { display: false },
                border: { display: false },
                ticks: {
                  color: isDark ? '#71717a' : '#a1a1aa',
                  font: { size: 11 },
                  maxRotation: 0,
                  autoSkipPadding: 12
                }
              },
              y: {
                grid: {
                  color: isDark ? '#27272a' : '#f4f4f5',
                  drawBorder: false
                },
                border: { display: false },
                ticks: {
                  color: isDark ? '#71717a' : '#a1a1aa',
                  font: { size: 11 },
                  padding: 8
                }
              }
            }
          }
        });

        return () => {
          if (chartRef.current) chartRef.current.destroy();
        };
      }, [range, theme, datasets]);

      const ranges = [
        { key: '7d', label: 'Last 7 days' },
        { key: '30d', label: 'Last 30 days' },
        { key: '90d', label: 'Last 3 months' }
      ];

      return (
        <Card className="card-grad">
          <CardHeader className="flex flex-row items-start justify-between space-y-0 pb-4">
            <div className="space-y-1">
              <h3 className="text-base font-semibold tracking-tight">Total Visitors</h3>
              <p className="text-sm text-zinc-500 dark:text-zinc-400">
                Total for the last 3 months
              </p>
            </div>
            <div className="flex items-center bg-zinc-100 dark:bg-zinc-900 rounded-md p-0.5 border border-zinc-200 dark:border-zinc-800">
              {ranges.map(r => (
                <button
                  key={r.key}
                  onClick={() => setRange(r.key)}
                  className={`tab-indicator px-3 h-7 text-xs rounded-[5px] transition-all ${
                    range === r.key
                      ? 'bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 shadow-soft font-medium'
                      : 'text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-50'
                  }`}
                >
                  {r.label}
                </button>
              ))}
            </div>
          </CardHeader>
          <CardContent>
            <div className="h-[280px] w-full">
              <canvas ref={canvasRef} />
            </div>
            <div className="flex items-center gap-6 pt-4 mt-2 border-t border-zinc-100 dark:border-zinc-900">
              <div className="flex items-center gap-2 text-xs">
                <span className="h-2.5 w-2.5 rounded-full bg-zinc-900 dark:bg-zinc-50" />
                <span className="text-zinc-600 dark:text-zinc-400">Desktop</span>
              </div>
              <div className="flex items-center gap-2 text-xs">
                <span className="h-2.5 w-2.5 rounded-full bg-zinc-500 dark:bg-zinc-400" />
                <span className="text-zinc-600 dark:text-zinc-400">Mobile</span>
              </div>
            </div>
          </CardContent>
        </Card>
      );
    }

    // ========================================
    // 📄 Data Table — Recent Transactions
    // ========================================
    function DataTable() {
      const transactions = [
        { invoice: 'INV-1042', customer: 'Olivia Martin', email: 'olivia@example.com', status: 'Paid',    method: 'Credit Card',  amount: '$1,999.00', date: 'Apr 24, 2026' },
        { invoice: 'INV-1041', customer: 'Jackson Lee',   email: 'jackson@example.com', status: 'Pending', method: 'PayPal',       amount: '$39.00',    date: 'Apr 23, 2026' },
        { invoice: 'INV-1040', customer: 'Isabella Nguyen', email: 'isabella@example.com', status: 'Paid', method: 'Bank Transfer', amount: '$299.00', date: 'Apr 22, 2026' },
        { invoice: 'INV-1039', customer: 'William Kim',  email: 'william@example.com', status: 'Failed',  method: 'Credit Card',  amount: '$99.00',    date: 'Apr 22, 2026' },
        { invoice: 'INV-1038', customer: 'Sofia Davis',  email: 'sofia@example.com',  status: 'Paid',    method: 'Apple Pay',    amount: '$549.00',   date: 'Apr 21, 2026' },
        { invoice: 'INV-1037', customer: 'Liam Johnson', email: 'liam@example.com',   status: 'Paid',    method: 'Credit Card',  amount: '$2,400.00', date: 'Apr 20, 2026' },
        { invoice: 'INV-1036', customer: 'Emma Brown',   email: 'emma@example.com',   status: 'Pending', method: 'Bank Transfer', amount: '$760.00',  date: 'Apr 19, 2026' },
        { invoice: 'INV-1035', customer: 'Noah Wilson',  email: 'noah@example.com',   status: 'Paid',    method: 'Stripe',        amount: '$120.00',  date: 'Apr 18, 2026' }
      ];

      const statusVariant = {
        'Paid':    'success',
        'Pending': 'warning',
        'Failed':  'danger'
      };

      const statusIcon = {
        'Paid':    'circle-check',
        'Pending': 'clock',
        'Failed':  'circle-x'
      };

      const [filter, setFilter] = useState('All');
      const filtered = filter === 'All' ? transactions : transactions.filter(t => t.status === filter);

      return (
        <Card className="card-grad overflow-hidden">
          <CardHeader className="flex flex-row items-start justify-between pb-4">
            <div className="space-y-1">
              <h3 className="text-base font-semibold tracking-tight">Recent Transactions</h3>
              <p className="text-sm text-zinc-500 dark:text-zinc-400">
                A list of the most recent invoices.
              </p>
            </div>
            <div className="flex items-center gap-2">
              <div className="flex items-center bg-zinc-100 dark:bg-zinc-900 rounded-md p-0.5 border border-zinc-200 dark:border-zinc-800">
                {['All', 'Paid', 'Pending', 'Failed'].map(f => (
                  <button
                    key={f}
                    onClick={() => setFilter(f)}
                    className={`px-3 h-7 text-xs rounded-[5px] transition-all ${
                      filter === f
                        ? 'bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 shadow-soft font-medium'
                        : 'text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-50'
                    }`}
                  >
                    {f}
                  </button>
                ))}
              </div>
              <Button variant="outline" size="sm" className="gap-2">
                <Icon name="sliders-horizontal" size={14} />
                <span>Customize</span>
              </Button>
              <Button variant="default" size="sm" className="gap-2">
                <Icon name="plus" size={14} />
                <span>Add Section</span>
              </Button>
            </div>
          </CardHeader>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-y border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/50">
                  <th className="text-left font-medium text-zinc-500 dark:text-zinc-400 px-6 py-2.5 w-[80px]">
                    <input type="checkbox" className="h-4 w-4 rounded border-zinc-300 dark:border-zinc-700 dark:bg-zinc-900" />
                  </th>
                  <th className="text-left font-medium text-zinc-500 dark:text-zinc-400 px-4 py-2.5">Invoice</th>
                  <th className="text-left font-medium text-zinc-500 dark:text-zinc-400 px-4 py-2.5">Customer</th>
                  <th className="text-left font-medium text-zinc-500 dark:text-zinc-400 px-4 py-2.5">Status</th>
                  <th className="text-left font-medium text-zinc-500 dark:text-zinc-400 px-4 py-2.5">Method</th>
                  <th className="text-left font-medium text-zinc-500 dark:text-zinc-400 px-4 py-2.5">Date</th>
                  <th className="text-right font-medium text-zinc-500 dark:text-zinc-400 px-4 py-2.5">Amount</th>
                  <th className="px-4 py-2.5 w-[60px]"></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((t, idx) => (
                  <tr
                    key={t.invoice}
                    className="border-b border-zinc-100 dark:border-zinc-900 hover:bg-zinc-50 dark:hover:bg-zinc-900/50 transition-colors"
                  >
                    <td className="px-6 py-3">
                      <input type="checkbox" className="h-4 w-4 rounded border-zinc-300 dark:border-zinc-700 dark:bg-zinc-900" />
                    </td>
                    <td className="px-4 py-3 font-medium text-zinc-900 dark:text-zinc-50">{t.invoice}</td>
                    <td className="px-4 py-3">
                      <div className="flex flex-col">
                        <span className="font-medium">{t.customer}</span>
                        <span className="text-xs text-zinc-500 dark:text-zinc-400">{t.email}</span>
                      </div>
                    </td>
                    <td className="px-4 py-3">
                      <Badge variant={statusVariant[t.status]} className="gap-1">
                        <Icon name={statusIcon[t.status]} size={12} />
                        {t.status}
                      </Badge>
                    </td>
                    <td className="px-4 py-3 text-zinc-600 dark:text-zinc-400">{t.method}</td>
                    <td className="px-4 py-3 text-zinc-600 dark:text-zinc-400">{t.date}</td>
                    <td className="px-4 py-3 text-right font-medium tabular-nums">{t.amount}</td>
                    <td className="px-4 py-3">
                      <Button variant="ghost" size="icon" className="h-8 w-8">
                        <Icon name="more-horizontal" size={16} />
                      </Button>
                    </td>
                  </tr>
                ))}
                {filtered.length === 0 && (
                  <tr>
                    <td colSpan="8" className="px-6 py-10 text-center text-sm text-zinc-500 dark:text-zinc-400">
                      No transactions found.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          <CardFooter className="justify-between border-t border-zinc-100 dark:border-zinc-900 mt-0 px-6 py-3 text-xs text-zinc-500 dark:text-zinc-400">
            <span>Showing {filtered.length} of {transactions.length} entries</span>
            <div className="flex items-center gap-1">
              <Button variant="outline" size="sm" className="h-7 px-2">
                <Icon name="chevron-left" size={14} />
              </Button>
              <Button variant="outline" size="sm" className="h-7 px-2">
                <Icon name="chevron-right" size={14} />
              </Button>
            </div>
          </CardFooter>
        </Card>
      );
    }

    // ========================================
    // 📄 Section Tabs — above content
    // ========================================
    function SectionTabs() {
      const [active, setActive] = useState('Outline');
      const tabs = [
        { name: 'Outline',           icon: 'list-tree' },
        { name: 'Past Performance',  icon: 'history' },
        { name: 'Key Personnel',     icon: 'users-round' },
        { name: 'Focus Documents',   icon: 'file-search' }
      ];
      return (
        <div className="flex items-center justify-between border-b border-zinc-200 dark:border-zinc-800">
          <div className="flex items-center gap-1 -mb-px">
            {tabs.map(t => (
              <button
                key={t.name}
                onClick={() => setActive(t.name)}
                className={`px-4 h-10 text-sm font-medium border-b-2 transition-colors flex items-center gap-2 ${
                  active === t.name
                    ? 'border-zinc-900 dark:border-zinc-50 text-zinc-900 dark:text-zinc-50'
                    : 'border-transparent text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-50'
                }`}
              >
                <Icon name={t.icon} size={14} />
                {t.name}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2 pb-2">
            <Button variant="outline" size="sm" className="gap-2">
              <Icon name="filter" size={14} />
              <span>Filter</span>
            </Button>
            <Button variant="outline" size="sm" className="gap-2">
              <Icon name="columns-3" size={14} />
              <span>Customize Columns</span>
            </Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      // Re-render lucide icons when content changes
      useEffect(() => {
        if (window.lucide && window.lucide.createIcons) {
          window.lucide.createIcons();
        }
      });

      return (
        <ThemeProvider>
          <div className="min-h-screen flex bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50">
            <Sidebar />
            <div className="flex-1 flex flex-col min-w-0">
              <Header />
              <main className="flex-1 p-6 space-y-6 max-w-[1400px] mx-auto w-full">
                <SectionTabs />
                <KpiGrid />
                <ChartCard />
                <DataTable />
              </main>
            </div>
          </div>
        </ThemeProvider>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
