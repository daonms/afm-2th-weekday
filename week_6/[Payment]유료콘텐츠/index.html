<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유료 콘텐츠 잠금 해제 — 토스페이먼츠 · AFM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Noto Serif KR"', 'Georgia', 'serif'],
            sans: ['"Pretendard Variable"', 'Pretendard', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            paper: '#f7f3ec',
            ink: '#1c1917',
            mist: '#57534e',
            accent: '#4f46e5',
            accent2: '#0d9488',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    body { min-height: 100vh; font-family: Pretendard, system-ui, sans-serif; }
    .fade-in { animation: fi 0.35s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .blur-lock { filter: blur(5px); user-select: none; pointer-events: none; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .prose-article { line-height: 1.75; }
  </style>
</head>
<body class="bg-paper text-ink antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const TOSS_CK = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';
const LS = 'afm_paid_content_jwt_v2';

function getToken() { return localStorage.getItem(LS); }
function setToken(t) { if (t) localStorage.setItem(LS, t); else localStorage.removeItem(LS); }
/* 구 예전 키에 토큰이 있으면 이관 */
function migrateLegacyToken() {
  const old = localStorage.getItem('afm_note_token');
  if (old && !getToken()) { setToken(old); localStorage.removeItem('afm_note_token'); }
}
migrateLegacyToken();

function parsePath() {
  const p = window.location.pathname;
  if (p === '/payment/success') return { name: 'success' };
  if (p === '/payment/fail') return { name: 'fail' };
  if (p === '/purchases') return { name: 'purchases' };
  const m = p.match(/^\/content\/(\d+)$/);
  if (m) return { name: 'content', id: m[1] };
  const pay = p.match(/^\/pay\/(\d+)$/);
  if (pay) return { name: 'pay', id: pay[1] };
  return { name: 'home' };
}

function navigate(to) {
  window.history.pushState({}, '', to);
  window.dispatchEvent(new PopStateEvent('popstate'));
}

function Toast({ message, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3200);
    return () => clearTimeout(t);
  }, [onClose]);
  return (
    <div className={`fixed bottom-6 right-6 z-[100] fade-in px-4 py-3 rounded-lg shadow-lg text-sm font-medium ${
      type === 'error' ? 'bg-rose-700 text-white' : 'bg-teal-700 text-white'
    }`}>{message}</div>
  );
}

function AuthModal({ mode: initial, onClose, onAuth }) {
  const [mode, setMode] = useState(initial);
  const [form, setForm] = useState({ email: '', password: '', name: '' });
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = async e => {
    e.preventDefault();
    setErr('');
    setLoading(true);
    try {
      const ep = mode === 'login' ? '/api/auth/login' : '/api/auth/signup';
      const body = mode === 'login'
        ? { email: form.email, password: form.password }
        : { email: form.email, password: form.password, name: form.name };
      const res = await fetch(ep, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setToken(data.token);
      onAuth(data.user);
    } catch (e2) { setErr(e2.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="fixed inset-0 bg-stone-900/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white border border-stone-200 rounded-2xl p-8 w-full max-w-sm fade-in shadow-2xl" onClick={e => e.stopPropagation()}>
        <h2 className="text-xl font-bold font-display text-center text-ink mb-1">{mode === 'login' ? '로그인' : '회원가입'}</h2>
        <p className="text-mist text-sm text-center mb-6">유료 콘텐츠 잠금 해제 — 본인 확인 후 열람권을 구매할 수 있어요</p>
        {err && <div className="bg-rose-50 border border-rose-200 text-rose-800 text-sm px-3 py-2 rounded-lg mb-4">{err}</div>}
        <form onSubmit={submit} className="space-y-3">
          {mode === 'signup' && (
            <input required placeholder="이름" value={form.name} onChange={e => set('name', e.target.value)}
              className="w-full bg-paper border border-stone-300 rounded-xl px-4 py-2.5 text-sm text-ink" />
          )}
          <input required type="email" placeholder="이메일" value={form.email} onChange={e => set('email', e.target.value)}
            className="w-full bg-paper border border-stone-300 rounded-xl px-4 py-2.5 text-sm" />
          <input required type="password" placeholder="비밀번호" value={form.password} onChange={e => set('password', e.target.value)}
            className="w-full bg-paper border border-stone-300 rounded-xl px-4 py-2.5 text-sm" />
          <button type="submit" disabled={loading}
            className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl disabled:opacity-50">
            {loading ? '…' : (mode === 'login' ? '로그인' : '가입하고 시작')}
          </button>
        </form>
        <p className="text-center text-mist text-sm mt-4">
          {mode === 'login' ? (
            <button type="button" onClick={() => { setMode('signup'); setErr(''); }} className="text-indigo-600 font-medium">회원가입</button>
          ) : (
            <button type="button" onClick={() => { setMode('login'); setErr(''); }} className="text-indigo-600 font-medium">로그인</button>
          )}
        </p>
      </div>
    </div>
  );
}

function HomePage({ onOpen }) {
  const [list, setList] = useState([]);
  const [load, setLoad] = useState(true);
  useEffect(() => {
    fetch('/api/contents')
      .then(r => r.json())
      .then(d => { setList(d.data || []); setLoad(false); })
      .catch(() => setLoad(false));
  }, []);

  if (load) return <div className="flex justify-center py-24 text-mist">불러오는 중…</div>;

  return (
    <div className="max-w-2xl mx-auto px-4 py-12 md:py-16 fade-in">
      <header className="text-center mb-12 md:mb-14">
        <p className="text-indigo-600 text-xs font-semibold tracking-[0.2em] uppercase mb-3">Toss Payments · 콘텐츠 잠금</p>
        <h1 className="text-3xl md:text-4xl font-bold font-display text-ink leading-tight mb-4">
          물건이 아니라 <span className="text-indigo-600">열람 권한</span>을 삽니다
        </h1>
        <p className="text-mist text-sm max-w-md mx-auto leading-relaxed">
          목록에는 <strong>제목·앞 3줄 미리보기·가격</strong>만 보여요. 전체 본문은 토스로 결제한 뒤에만 서버가 내려줍니다.
        </p>
      </header>

      <div className="space-y-4">
        {list.map(c => (
          <button
            key={c.id}
            onClick={() => onOpen(c.id)}
            className="w-full text-left bg-white border border-stone-200 hover:border-indigo-300 hover:shadow-md rounded-2xl p-5 md:p-6 transition flex flex-col sm:flex-row gap-5"
          >
            <div className="sm:w-32 h-28 sm:h-32 shrink-0 rounded-xl overflow-hidden bg-stone-200">
              {c.image_url && (
                <img src={c.image_url} alt="" className="w-full h-full object-cover" />
              )}
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center flex-wrap gap-2 mb-2">
                <span className="text-xs font-medium text-teal-700 bg-teal-50 px-2 py-0.5 rounded-md">{c.category}</span>
                {c.is_best && (
                  <span className="text-xs font-semibold text-amber-800 bg-amber-100 px-2 py-0.5 rounded-md">추천</span>
                )}
              </div>
              <h2 className="text-lg font-bold text-ink mb-2 leading-snug">{c.title}</h2>
              <p className="text-mist text-sm line-clamp-3 mb-4 leading-relaxed">{c.preview}</p>
              <div className="flex items-center justify-between gap-2">
                <span className="text-indigo-600 font-bold text-lg">₩{Number(c.price).toLocaleString()}</span>
                <span className="text-stone-400 text-xs">누적 열람권 {Number(c.sales_count).toLocaleString()}</span>
              </div>
            </div>
          </button>
        ))}
      </div>

      {list.length === 0 && (
        <p className="text-center text-mist py-16">콘텐츠가 없습니다. 서버 <code className="text-sm bg-stone-100 px-1 rounded">DATABASE_URL</code>을 확인하세요.</p>
      )}

      <p className="text-center text-xs text-stone-400 mt-14 max-w-lg mx-auto leading-relaxed">
        쇼핑몰(상품)과 달리 이 앱은 <strong>user_id + content_id</strong>로 구매(열람권)를 기록하고, 권한이 있을 때만 본문을 반환합니다. 권한 판단은 <strong>서버</strong>에서 합니다.
      </p>
    </div>
  );
}

function ContentPage({ id, token, onNeedAuth }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState('');
  const [load, setLoad] = useState(true);

  const loadOne = useCallback(() => {
    const h = token ? { Authorization: `Bearer ${token}` } : {};
    setLoad(true);
    fetch(`/api/contents/${id}`, { headers: h })
      .then(r => r.json())
      .then(d => {
        if (d.error) setErr(d.error);
        else setData(d);
        setLoad(false);
      })
      .catch(() => { setErr('불러오기 실패'); setLoad(false); });
  }, [id, token]);

  useEffect(() => { loadOne(); }, [loadOne]);

  if (load || !data) return <div className="flex justify-center py-24 text-mist">…</div>;
  if (err) return <div className="text-center text-rose-600 py-16">{err}</div>;

  const unlocked = data.purchased && data.body;

  return (
    <div className="max-w-2xl mx-auto px-4 py-8 fade-in">
      <button type="button" onClick={() => navigate('/')} className="text-mist text-sm mb-6 hover:text-indigo-600">← 목록</button>
      <div className="text-xs text-teal-700 font-medium mb-2">{data.category}</div>
      <h1 className="text-2xl md:text-3xl font-bold font-display text-ink mb-3">{data.title}</h1>
      <div className="flex items-center gap-3 text-sm text-mist mb-8">
        <span className="font-semibold text-indigo-600">₩{Number(data.price).toLocaleString()}</span>
        <span>·</span>
        <span>누적 열람권 {Number(data.sales_count).toLocaleString()}</span>
      </div>

      <div className="space-y-5">
        {unlocked ? (
          <div className="rounded-2xl border border-stone-200 bg-white p-6 md:p-8 prose-article text-ink whitespace-pre-wrap shadow-sm">
            {data.body}
          </div>
        ) : (
          <>
            <div className="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
              <p className="text-xs text-teal-700 font-medium mb-2">미리보기 (무료)</p>
              <p className="text-ink text-sm leading-relaxed line-clamp-3 whitespace-pre-line">{data.preview}</p>
            </div>
            <div className="relative rounded-2xl border border-stone-300 bg-stone-100 overflow-hidden min-h-[220px]">
              <div className="blur-lock px-6 py-5 whitespace-pre-wrap text-stone-500 text-sm min-h-[180px]">
{`[잠긴 본문 영역]
서버는 결제·열람권이 없으면 body 필드를 보내지 않습니다.
아래는 UI 플레이스홀더이며, 실제 본문은 결제 성공 후에만 내려옵니다.

□ 핵심 섹션 A — 템플릿 / 체크리스트
□ 핵심 섹션 B — 실무 예시
□ 부록 — 팀 룰 샘플`}
              </div>
              <div className="absolute inset-0 flex items-center justify-center bg-white/80 backdrop-blur-sm">
                <div className="text-center p-6 max-w-sm">
                  <p className="text-ink font-display font-bold text-lg mb-1">🔒 잠긴 콘텐츠</p>
                  <p className="text-mist text-sm mb-5">열람권(접근 권한)을 구매하면 전체 본문이 열려요. 프론트만으로는 우회할 수 없습니다.</p>
                  {!token ? (
                    <button type="button" onClick={onNeedAuth} className="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-3 rounded-xl w-full">로그인하고 결제하기</button>
                  ) : (
                    <button type="button" onClick={() => navigate(`/pay/${id}`)} className="bg-teal-600 hover:bg-teal-500 text-white font-semibold px-8 py-3 rounded-xl w-full shadow-md">
                      토스로 결제하고 열람 · ₩{Number(data.price).toLocaleString()}
                    </button>
                  )}
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function PayPage({ id, user, token }) {
  const [content, setContent] = useState(null);
  const [ready, setReady] = useState(false);
  const [paying, setPaying] = useState(false);
  const widgetRef = useRef(null);

  useEffect(() => {
    fetch(`/api/contents/${id}`, { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(d => {
        if (d.purchased) {
          navigate(`/content/${id}`);
          return;
        }
        setContent(d);
      });
  }, [id, token]);

  useEffect(() => {
    if (!content || typeof TossPayments === 'undefined') return;
    (async () => {
      const amt = Number(content.price);
      const toss = TossPayments(TOSS_CK);
      const widgets = toss.widgets({ customerKey: 'USER_' + user.id });
      await widgets.setAmount({ currency: 'KRW', value: amt });
      await widgets.renderPaymentMethods({ selector: '#toss-pay', variantKey: 'DEFAULT' });
      await widgets.renderAgreement({ selector: '#toss-agree', variantKey: 'AGREEMENT' });
      widgetRef.current = widgets;
      setReady(true);
    })();
  }, [content, user.id]);

  const pay = async () => {
    if (!widgetRef.current || !ready || !content) return;
    const origin = window.location.origin;
    const q = new URLSearchParams({ content_id: String(id) });
    sessionStorage.setItem('payContentId', String(id));
    sessionStorage.setItem('payAmount', String(content.price));
    setPaying(true);
    try {
      await widgetRef.current.requestPayment({
        orderId: 'C_' + id + '_' + user.id + '_' + Date.now(),
        orderName: (content.title || '').slice(0, 80),
        successUrl: `${origin}/payment/success?${q.toString()}`,
        failUrl: `${origin}/payment/fail?${q.toString()}`,
        customerName: user.name,
      });
    } catch (e) {
      if (e?.code !== 'USER_CANCEL') alert(e?.message || e);
      setPaying(false);
    }
  };

  if (!content) return <div className="text-center py-20 text-mist">불러오는 중…</div>;

  return (
    <div className="max-w-lg mx-auto px-4 py-8">
      <button type="button" onClick={() => navigate(`/content/${id}`)} className="text-mist text-sm mb-4 hover:text-indigo-600">← 콘텐츠로</button>
      <h1 className="text-xl font-bold font-display mb-1">열람권 결제</h1>
      <p className="text-mist text-sm mb-2">콘텐츠 제목: {content.title}</p>
      <p className="text-xs text-stone-400 mb-6">상품 배송이 아니라 <strong>본문 열람 권한</strong>에 대한 결제입니다.</p>
      <div className="bg-white border border-stone-200 rounded-xl p-4 mb-4 flex justify-between items-center">
        <span className="text-mist">결제 금액</span>
        <span className="text-indigo-600 font-bold text-lg">₩{Number(content.price).toLocaleString()}</span>
      </div>
      <div className="bg-paper border border-stone-200 rounded-xl overflow-hidden mb-4 p-2">
        {!ready && <p className="text-center text-mist py-8">토스 결제 UI 로딩…</p>}
        <div id="toss-pay" />
        <div id="toss-agree" />
      </div>
      <button type="button" disabled={!ready || paying} onClick={pay}
        className="w-full py-4 rounded-xl font-bold bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white">
        {paying ? '결제창으로…' : '토스페이로 결제하기'}
      </button>
      <p className="text-center text-xs text-mist mt-3">샌드박스 테스트 키 · 실제 과금 아님</p>
    </div>
  );
}

function SuccessPage({ token, onDone }) {
  const [st, setSt] = useState('loading');
  const [info, setInfo] = useState(null);
  const [errDetail, setErrDetail] = useState('');

  useEffect(() => {
    const q = new URLSearchParams(window.location.search);
    const paymentKey = q.get('paymentKey');
    const orderId = q.get('orderId');
    let amount = Number(q.get('amount'));
    const fromStore = sessionStorage.getItem('payAmount');
    if (!Number.isFinite(amount) || amount <= 0) {
      const a = fromStore != null ? Number(fromStore) : NaN;
      if (Number.isFinite(a) && a > 0) amount = a;
    }
    const cid = q.get('content_id') || sessionStorage.getItem('payContentId');
    if (!paymentKey || !orderId || !cid) {
      setErrDetail('토스에서 돌아온 주소에 paymentKey·orderId가 없거나, 콘텐츠 정보가 없습니다. 결제 페이지에서 다시 시도해 주세요.');
      setSt('err');
      return;
    }
    if (!Number.isFinite(amount) || amount <= 0) {
      setErrDetail('결제 금액을 확인할 수 없습니다. URL에 amount가 없으면 결제를 처음부터 다시 시도해 주세요.');
      setSt('err');
      return;
    }
    fetch('/api/payment/confirm-content', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ paymentKey, orderId, amount, content_id: Number(cid) }),
    })
      .then(async r => {
        const d = await r.json();
        if (!r.ok) {
          setErrDetail(d.error || `서버 응답 ${r.status}`);
          setSt('err');
          return;
        }
        if (d.success) {
          setInfo(d);
          setSt('ok');
          sessionStorage.removeItem('payContentId');
          sessionStorage.removeItem('payAmount');
        } else {
          setErrDetail(d.error || '승인 응답이 올바르지 않습니다');
          setSt('err');
        }
      })
      .catch((e) => { setErrDetail(e?.message || '네트워크 오류'); setSt('err'); });
  }, [token]);

  if (st === 'loading') return <div className="text-center py-20 text-mist">토스 승인 후 DB에 열람권을 기록하는 중…</div>;
  if (st === 'err') return (
    <div className="text-center py-20 px-4 max-w-md mx-auto">
      <p className="text-rose-600 mb-2 font-medium">열람권 기록에 실패했습니다</p>
      {errDetail && <p className="text-mist text-sm mb-4 whitespace-pre-wrap">{errDetail}</p>}
      {!errDetail && <p className="text-mist text-sm mb-4">금액·로그인·Vercel의 DATABASE_URL·토스 키를 확인하세요.</p>}
      <button type="button" onClick={onDone} className="text-indigo-600 font-medium underline">홈으로</button>
    </div>
  );
  return (
    <div className="max-w-md mx-auto text-center py-16 px-4 fade-in">
      <div className="text-5xl mb-4" aria-hidden>✓</div>
      <h1 className="text-2xl font-bold font-display text-teal-700 mb-2">열람권이 활성화됐어요</h1>
      <p className="text-mist text-sm mb-1">orderId: {info?.orderId}</p>
      <p className="text-xs text-stone-400 mb-8">purchases 테이블에 기록된 뒤에만 본문을 요청하세요 (순서 누락 방지)</p>
      <button type="button" onClick={() => navigate(`/content/${info?.content_id}`)}
        className="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-500">콘텐츠 열기</button>
      <button type="button" onClick={onDone} className="block w-full mt-3 text-mist text-sm">목록으로</button>
    </div>
  );
}

function FailPage({ onDone }) {
  return (
    <div className="text-center py-20 px-4">
      <p className="text-amber-800 mb-4">결제가 취소되었거나 실패했습니다</p>
      <button type="button" onClick={onDone} className="text-indigo-600 font-medium">홈으로</button>
    </div>
  );
}

function PurchasesPage({ token }) {
  const [rows, setRows] = useState([]);
  const [load, setLoad] = useState(true);
  useEffect(() => {
    fetch('/api/purchases', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(d => { setRows(d.data || []); setLoad(false); });
  }, [token]);
  if (load) return <div className="text-center py-20 text-mist">…</div>;
  return (
    <div className="max-w-2xl mx-auto px-4 py-10">
      <h1 className="text-2xl font-bold font-display text-ink mb-2">구매 이력</h1>
      <p className="text-mist text-sm mb-6">이미 열람권이 있는 콘텐츠는 <strong>재결제 없이</strong> 다시 열 수 있어요.</p>
      {rows.length === 0 ? (
        <p className="text-mist">아직 구매한 콘텐츠가 없어요</p>
      ) : (
        <ul className="space-y-3">
          {rows.map(p => (
            <li key={p.id} className="bg-white border border-stone-200 rounded-xl p-4 flex gap-4 shadow-sm">
              {p.image_url && (
                <img src={p.image_url} className="w-20 h-20 rounded-lg object-cover shrink-0 bg-stone-200" alt="" />
              )}
              <div className="flex-1 min-w-0">
                <button type="button" onClick={() => navigate(`/content/${p.content_id}`)} className="font-semibold text-left text-indigo-700 hover:underline line-clamp-2">{p.title}</button>
                <p className="text-xs text-mist mt-1">{new Date(p.paid_at).toLocaleString('ko-KR')} · ₩{Number(p.amount).toLocaleString()}</p>
              </div>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function App() {
  const [route, setRoute] = useState(() => parsePath());
  const [token, setTok] = useState(getToken);
  const [user, setUser] = useState(null);
  const [authOpen, setAuthOpen] = useState(false);
  const [authMode, setAuthMode] = useState('login');
  const [toast, setToast] = useState(null);

  const sync = useCallback(() => setRoute(parsePath()), []);
  useEffect(() => {
    window.addEventListener('popstate', sync);
    return () => window.removeEventListener('popstate', sync);
  }, [sync]);

  useEffect(() => {
    if (!token) { setUser(null); return; }
    fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(d => setUser(d.user))
      .catch(() => { setToken(''); setTok(''); setUser(null); });
  }, [token]);

  const logout = () => { setToken(''); setTok(''); setUser(null); setToast({ m: '로그아웃했어요', t: 'ok' }); };
  const onAuth = (u) => { setUser(u); setTok(getToken()); setAuthOpen(false); setToast({ m: '환영합니다', t: 'ok' }); };

  const r = route;
  let body = null;
  if (r.name === 'home') body = <HomePage onOpen={id => navigate(`/content/${id}`)} />;
  else if (r.name === 'content') body = (
    <ContentPage
      id={r.id} token={token}
      onNeedAuth={() => { setAuthMode('login'); setAuthOpen(true); }}
    />
  );
  else if (r.name === 'pay') {
    if (!token || !user) { body = <div className="text-center py-20"><button onClick={() => { setAuthMode('login'); setAuthOpen(true); }} className="text-indigo-600 font-medium">로그인이 필요해요</button></div>; }
    else body = <PayPage id={r.id} user={user} token={token} />;
  } else if (r.name === 'success') {
    if (!token) body = <div className="text-center py-20 text-mist">로그인 후 이 페이지로 다시 오거나, 홈에서 결제를 다시 시도해 주세요</div>;
    else body = <SuccessPage token={token} onDone={() => navigate('/')} />;
  } else if (r.name === 'fail') body = <FailPage onDone={() => navigate('/')} />;
  else if (r.name === 'purchases') {
    if (!token) body = <div className="text-center py-20"><button onClick={() => { setAuthMode('login'); setAuthOpen(true); }} className="text-indigo-600 font-medium">로그인</button></div>;
    else body = <PurchasesPage token={token} />;
  }

  return (
    <>
      <header className="border-b border-stone-200 bg-white/90 backdrop-blur sticky top-0 z-40">
        <div className="max-w-2xl mx-auto flex items-center justify-between px-4 h-14">
          <button type="button" onClick={() => navigate('/')} className="font-bold font-display text-ink text-lg">유료 콘텐츠 <span className="text-indigo-600">UNLOCK</span></button>
          <nav className="flex items-center gap-3 text-sm">
            {user ? (
              <>
                <span className="text-mist hidden sm:inline">{user.name}</span>
                <button type="button" onClick={() => navigate('/purchases')} className="text-ink hover:text-indigo-600">구매 이력</button>
                <button type="button" onClick={logout} className="text-mist">로그아웃</button>
              </>
            ) : (
              <button type="button" onClick={() => { setAuthMode('login'); setAuthOpen(true); }} className="text-indigo-600 font-medium">로그인</button>
            )}
          </nav>
        </div>
      </header>
      <main className="min-h-[70vh]">{body}</main>
      <footer className="border-t border-stone-200 bg-white mt-auto py-6 text-center text-xs text-mist">
        AFM Week 6 · 토스페이먼츠 · PostgreSQL <code className="bg-paper px-1 rounded">purchases</code>로 열람 제어
      </footer>
      {authOpen && <AuthModal mode={authMode} onClose={() => setAuthOpen(false)} onAuth={onAuth} />}
      {toast && <Toast message={toast.m} type={toast.t} onClose={() => setToast(null)} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
