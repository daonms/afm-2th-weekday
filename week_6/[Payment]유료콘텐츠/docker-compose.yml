services:
  app:
    build: .
    container_name: shop-daon-app
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"
    networks:
      - shop-net

  caddy:
    image: caddy:2-alpine
    container_name: shop-daon-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - shop-net

networks:
  shop-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
