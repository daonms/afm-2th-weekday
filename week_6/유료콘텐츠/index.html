<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 노트 랩 — 유료 강의 노트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    body { background: linear-gradient(165deg, #0f172a 0%, #1e293b 45%, #0f172a 100%); min-height: 100vh; font-family: ui-sans-serif, system-ui, sans-serif; }
    .fade-in { animation: fi 0.35s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .blur-lock { filter: blur(6px); user-select: none; pointer-events: none; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="text-slate-100">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const TOSS_CK = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';
const LS = 'afm_note_token';

function getToken() { return localStorage.getItem(LS); }
function setToken(t) { if (t) localStorage.setItem(LS, t); else localStorage.removeItem(LS); }

function parsePath() {
  const p = window.location.pathname;
  if (p === '/payment/success') return { name: 'success' };
  if (p === '/payment/fail') return { name: 'fail' };
  if (p === '/purchases') return { name: 'purchases' };
  const m = p.match(/^\/content\/(\d+)$/);
  if (m) return { name: 'content', id: m[1] };
  const pay = p.match(/^\/pay\/(\d+)$/);
  if (pay) return { name: 'pay', id: pay[1] };
  return { name: 'home' };
}

function navigate(to) {
  window.history.pushState({}, '', to);
  window.dispatchEvent(new PopStateEvent('popstate'));
}

// ── Toast ─────────────────────────────────────────
function Toast({ message, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3200);
    return () => clearTimeout(t);
  }, [onClose]);
  return (
    <div className={`fixed bottom-6 right-6 z-[100] fade-in px-4 py-3 rounded-xl shadow-xl text-sm font-medium ${
      type === 'error' ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'
    }`}>{message}</div>
  );
}

// ── Auth Modal ───────────────────────────────────
function AuthModal({ mode: initial, onClose, onAuth }) {
  const [mode, setMode] = useState(initial);
  const [form, setForm] = useState({ email: '', password: '', name: '' });
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = async e => {
    e.preventDefault();
    setErr('');
    setLoading(true);
    try {
      const ep = mode === 'login' ? '/api/auth/login' : '/api/auth/signup';
      const body = mode === 'login'
        ? { email: form.email, password: form.password }
        : { email: form.email, password: form.password, name: form.name };
      const res = await fetch(ep, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setToken(data.token);
      onAuth(data.user);
    } catch (e2) { setErr(e2.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-slate-800 border border-slate-600 rounded-2xl p-8 w-full max-w-sm fade-in shadow-2xl" onClick={e => e.stopPropagation()}>
        <h2 className="text-xl font-bold text-center mb-1">{mode === 'login' ? '로그인' : '회원가입'}</h2>
        <p className="text-slate-400 text-sm text-center mb-6">AI 노트 랩 — 강의 노트 잠금 해제</p>
        {err && <div className="bg-red-900/50 border border-red-700 text-red-200 text-sm px-3 py-2 rounded-lg mb-4">{err}</div>}
        <form onSubmit={submit} className="space-y-3">
          {mode === 'signup' && (
            <input required placeholder="이름" value={form.name} onChange={e => set('name', e.target.value)}
              className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm" />
          )}
          <input required type="email" placeholder="이메일" value={form.email} onChange={e => set('email', e.target.value)}
            className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm" />
          <input required type="password" placeholder="비밀번호" value={form.password} onChange={e => set('password', e.target.value)}
            className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm" />
          <button type="submit" disabled={loading}
            className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 rounded-xl disabled:opacity-50">
            {loading ? '…' : (mode === 'login' ? '로그인' : '가입')}
          </button>
        </form>
        <p className="text-center text-slate-500 text-sm mt-4">
          {mode === 'login' ? (
            <button type="button" onClick={() => { setMode('signup'); setErr(''); }} className="text-cyan-400">회원가입</button>
          ) : (
            <button type="button" onClick={() => { setMode('login'); setErr(''); }} className="text-cyan-400">로그인</button>
          )}
        </p>
      </div>
    </div>
  );
}

// ── Home: 목록 ────────────────────────────────────
function HomePage({ token, user, onOpen }) {
  const [list, setList] = useState([]);
  const [load, setLoad] = useState(true);
  useEffect(() => {
    fetch('/api/contents')
      .then(r => r.json())
      .then(d => { setList(d.data || []); setLoad(false); })
      .catch(() => setLoad(false));
  }, []);

  if (load) return <div className="flex justify-center py-24 text-4xl animate-pulse">📚</div>;

  return (
    <div className="max-w-3xl mx-auto px-4 py-10 fade-in">
      <div className="text-center mb-10">
        <p className="text-cyan-400 text-sm font-medium tracking-widest uppercase mb-2">AI Developer Notes</p>
        <h1 className="text-3xl md:text-4xl font-bold bg-gradient-to-r from-cyan-200 to-indigo-300 bg-clip-text text-transparent">
          잠긴 노트를 열면, 업무가 줄어듭니다
        </h1>
        <p className="text-slate-400 mt-3 text-sm">미리보기만 보고 결정하세요 · 판매량은 베스트 콘텐츠 참고</p>
      </div>
      <div className="grid gap-5">
        {list.map(c => (
          <button
            key={c.id}
            onClick={() => onOpen(c.id)}
            className="text-left bg-slate-800/80 border border-slate-700 hover:border-cyan-600/50 rounded-2xl overflow-hidden flex flex-col sm:flex-row transition group"
          >
            <div className="sm:w-44 h-40 sm:h-auto shrink-0 bg-slate-900">
              <img src={c.image_url || ''} alt="" className="w-full h-full object-cover group-hover:scale-105 transition duration-300" />
            </div>
            <div className="p-5 flex-1 flex flex-col">
              <div className="flex items-start justify-between gap-2 mb-2">
                <span className="text-xs px-2 py-0.5 rounded-md bg-slate-700 text-cyan-300">{c.category}</span>
                {c.is_best && (
                  <span className="text-xs font-bold text-amber-400">🔥 BEST</span>
                )}
              </div>
              <h2 className="text-lg font-bold text-white mb-2 leading-snug">{c.title}</h2>
              <p className="text-slate-400 text-sm line-clamp-2 mb-4 flex-1">{c.preview}</p>
              <div className="flex items-center justify-between mt-auto">
                <span className="text-cyan-400 font-bold">₩{Number(c.price).toLocaleString()}</span>
                <span className="text-slate-500 text-xs">판매 {Number(c.sales_count).toLocaleString()} · 열람권 구매</span>
              </div>
            </div>
          </button>
        ))}
      </div>
      {list.length === 0 && (
        <p className="text-center text-slate-500 py-16">콘텐츠가 없습니다. DATABASE_URL을 확인하세요.</p>
      )}
    </div>
  );
}

// ── Detail: 잠금 / 열람 ─────────────────────────────
function ContentPage({ id, token, onNeedAuth }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState('');
  const [load, setLoad] = useState(true);

  const loadOne = useCallback(() => {
    const h = token ? { Authorization: `Bearer ${token}` } : {};
    setLoad(true);
    fetch(`/api/contents/${id}`, { headers: h })
      .then(r => r.json())
      .then(d => {
        if (d.error) setErr(d.error);
        else setData(d);
        setLoad(false);
      })
      .catch(() => { setErr('불러오기 실패'); setLoad(false); });
  }, [id, token]);

  useEffect(() => { loadOne(); }, [loadOne]);

  if (load || !data) return <div className="flex justify-center py-24">…</div>;
  if (err) return <div className="text-center text-red-400 py-16">{err}</div>;

  const unlocked = data.purchased && data.body;

  return (
    <div className="max-w-2xl mx-auto px-4 py-8 fade-in">
      <button type="button" onClick={() => navigate('/')} className="text-slate-500 text-sm mb-6 hover:text-cyan-400">← 목록</button>
      <div className="text-xs text-cyan-400 mb-2">{data.category}</div>
      <h1 className="text-2xl font-bold mb-4">{data.title}</h1>
      <div className="flex items-center gap-3 text-sm text-slate-500 mb-6">
        <span>₩{Number(data.price).toLocaleString()}</span>
        <span>·</span>
        <span>판매 {Number(data.sales_count).toLocaleString()}</span>
      </div>

      <div className="space-y-4">
        {unlocked ? (
          <div className="rounded-2xl border border-slate-700 bg-slate-800/50 p-6 prose prose-invert prose-sm max-w-none whitespace-pre-wrap text-slate-200">
            {data.body}
          </div>
        ) : (
          <>
            <div className="rounded-2xl border border-slate-600 bg-slate-800/30 p-6">
              <p className="text-xs text-cyan-500/80 mb-2">미리보기 (무료)</p>
              <p className="text-slate-200 text-sm leading-relaxed line-clamp-3 whitespace-pre-line">{data.preview}</p>
            </div>
            <div className="relative rounded-2xl border border-slate-700 bg-slate-900/80 overflow-hidden min-h-[220px]">
              <div className="blur-lock px-6 py-5 whitespace-pre-wrap text-slate-400 text-sm min-h-[180px]">
                {`섹션 A — 핵심 요약\n본문은 서버에서만 내려보냅니다. 프론트는 잠금일 때 본문 필드를 받지 않습니다.\n\n섹션 B — 체크리스트\n□ 항목 1  □ 항목 2  □ 항목 3\n\n섹션 C — 부록\n(결제 완료 시 실제 노트 텍스트로 교체됩니다)`}
              </div>
              <div className="absolute inset-0 flex items-center justify-center bg-slate-950/70 backdrop-blur-[2px]">
                <div className="text-center p-6 max-w-sm">
                  <p className="text-slate-200 mb-1 font-medium">🔒 유료 본문</p>
                  <p className="text-slate-400 text-sm mb-5">열람권을 구매하면 전체가 공개돼요</p>
                  {!token ? (
                    <button type="button" onClick={onNeedAuth} className="bg-cyan-600 hover:bg-cyan-500 text-white font-semibold px-6 py-3 rounded-xl w-full">로그인하고 결제하기</button>
                  ) : (
                    <button type="button" onClick={() => navigate(`/pay/${id}`)} className="bg-gradient-to-r from-cyan-600 to-indigo-600 text-white font-semibold px-8 py-3 rounded-xl shadow-lg w-full">
                      결제하고 열람 · ₩{Number(data.price).toLocaleString()}
                    </button>
                  )}
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Checkout (토스 위젯) ───────────────────────────
function PayPage({ id, user, token }) {
  const [content, setContent] = useState(null);
  const [ready, setReady] = useState(false);
  const [paying, setPaying] = useState(false);
  const widgetRef = useRef(null);

  useEffect(() => {
    fetch(`/api/contents/${id}`, { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(d => {
        if (d.purchased) {
          navigate(`/content/${id}`);
          return;
        }
        setContent(d);
      });
  }, [id, token]);

  useEffect(() => {
    if (!content || typeof TossPayments === 'undefined') return;
    (async () => {
      const amt = Number(content.price);
      const toss = TossPayments(TOSS_CK);
      const widgets = toss.widgets({ customerKey: 'USER_' + user.id });
      await widgets.setAmount({ currency: 'KRW', value: amt });
      await widgets.renderPaymentMethods({ selector: '#toss-pay', variantKey: 'DEFAULT' });
      await widgets.renderAgreement({ selector: '#toss-agree', variantKey: 'AGREEMENT' });
      widgetRef.current = widgets;
      setReady(true);
    })();
  }, [content, user.id]);

  const pay = async () => {
    if (!widgetRef.current || !ready || !content) return;
    sessionStorage.setItem('payContentId', String(id));
    setPaying(true);
    try {
      await widgetRef.current.requestPayment({
        orderId: 'NOTE_' + id + '_' + user.id + '_' + Date.now(),
        orderName: content.title.slice(0, 80),
        successUrl: window.location.origin + '/payment/success',
        failUrl: window.location.origin + '/payment/fail',
        customerName: user.name,
      });
    } catch (e) {
      if (e?.code !== 'USER_CANCEL') alert(e?.message || e);
      setPaying(false);
    }
  };

  if (!content) return <div className="text-center py-20">불러오는 중…</div>;

  return (
    <div className="max-w-lg mx-auto px-4 py-8">
      <button type="button" onClick={() => navigate(`/content/${id}`)} className="text-slate-500 text-sm mb-4">← 콘텐츠로</button>
      <h1 className="text-xl font-bold mb-2">💳 결제</h1>
      <p className="text-slate-400 text-sm mb-6">{content.title}</p>
      <div className="bg-slate-800/80 border border-slate-600 rounded-xl p-4 mb-4 flex justify-between">
        <span>결제 금액</span>
        <span className="text-cyan-400 font-bold">₩{Number(content.price).toLocaleString()}</span>
      </div>
      <div className="bg-slate-800/50 rounded-xl overflow-hidden mb-4 p-2">
        {!ready && <p className="text-center text-slate-500 py-8">결제 UI 로딩…</p>}
        <div id="toss-pay" />
        <div id="toss-agree" />
      </div>
      <button type="button" disabled={!ready || paying} onClick={pay}
        className="w-full py-4 rounded-xl font-bold bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 text-white">
        {paying ? '이동 중…' : '토스로 결제하기'}
      </button>
      <p className="text-center text-xs text-slate-500 mt-2">토스페이먼츠 테스트 결제</p>
    </div>
  );
}

// ── Success: 서버 승인 + INSERT ────────────────────
function SuccessPage({ token, onDone }) {
  const [st, setSt] = useState('loading');
  const [info, setInfo] = useState(null);

  useEffect(() => {
    const q = new URLSearchParams(window.location.search);
    const paymentKey = q.get('paymentKey');
    const orderId = q.get('orderId');
    const amount = Number(q.get('amount'));
    const cid = sessionStorage.getItem('payContentId');
    if (!paymentKey || !cid) { setSt('err'); return; }
    fetch('/api/payment/confirm-content', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ paymentKey, orderId, amount, content_id: Number(cid) }),
    })
      .then(r => r.json())
      .then(d => {
        if (d.success) { setInfo(d); setSt('ok'); sessionStorage.removeItem('payContentId'); }
        else setSt('err');
      })
      .catch(() => setSt('err'));
  }, [token]);

  if (st === 'loading') return <div className="text-center py-20">결제 확인 중…</div>;
  if (st === 'err') return (
    <div className="text-center py-20 px-4">
      <p className="text-red-400 mb-4">승인 처리에 실패했습니다</p>
      <button type="button" onClick={onDone} className="text-cyan-400 underline">홈으로</button>
    </div>
  );
  return (
    <div className="max-w-md mx-auto text-center py-16 px-4 fade-in">
      <div className="text-6xl mb-4">🎉</div>
      <h1 className="text-2xl font-bold text-emerald-400 mb-2">열람권이 활성화됐어요</h1>
      <p className="text-slate-400 text-sm mb-6">orderId: {info?.orderId}</p>
      <button type="button" onClick={() => navigate(`/content/${info?.content_id}`)}
        className="w-full py-3 rounded-xl bg-cyan-600 font-semibold">노트 열기</button>
      <button type="button" onClick={onDone} className="block w-full mt-3 text-slate-500 text-sm">목록으로</button>
    </div>
  );
}

function FailPage({ onDone }) {
  return (
    <div className="text-center py-20 px-4">
      <p className="text-amber-400 mb-4">결제가 취소되었거나 실패했습니다</p>
      <button type="button" onClick={onDone} className="text-cyan-400">홈으로</button>
    </div>
  );
}

// ── 구매 이력 ─────────────────────────────────────
function PurchasesPage({ token }) {
  const [rows, setRows] = useState([]);
  const [load, setLoad] = useState(true);
  useEffect(() => {
    fetch('/api/purchases', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(d => { setRows(d.data || []); setLoad(false); });
  }, [token]);
  if (load) return <div className="text-center py-20">…</div>;
  return (
    <div className="max-w-2xl mx-auto px-4 py-10">
      <h1 className="text-2xl font-bold mb-6">📚 구매한 노트</h1>
      {rows.length === 0 ? (
        <p className="text-slate-500">아직 구매한 노트가 없어요</p>
      ) : (
        <ul className="space-y-3">
          {rows.map(p => (
            <li key={p.id} className="bg-slate-800/60 border border-slate-700 rounded-xl p-4 flex gap-4">
              <img src={p.image_url} className="w-20 h-20 rounded-lg object-cover shrink-0" alt="" />
              <div className="flex-1 min-w-0">
                <button type="button" onClick={() => navigate(`/content/${p.content_id}`)} className="font-semibold text-left text-cyan-300 hover:underline line-clamp-2">{p.title}</button>
                <p className="text-xs text-slate-500 mt-1">{new Date(p.paid_at).toLocaleString('ko-KR')} · ₩{Number(p.amount).toLocaleString()}</p>
              </div>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────
function App() {
  const [route, setRoute] = useState(() => parsePath());
  const [token, setTok] = useState(getToken);
  const [user, setUser] = useState(null);
  const [authOpen, setAuthOpen] = useState(false);
  const [authMode, setAuthMode] = useState('login');
  const [toast, setToast] = useState(null);

  const sync = useCallback(() => setRoute(parsePath()), []);
  useEffect(() => {
    window.addEventListener('popstate', sync);
    return () => window.removeEventListener('popstate', sync);
  }, [sync]);

  useEffect(() => {
    if (!token) { setUser(null); return; }
    fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(d => setUser(d.user))
      .catch(() => { setToken(''); setTok(''); setUser(null); });
  }, [token]);

  const logout = () => { setToken(''); setTok(''); setUser(null); setToast({ m: '로그아웃', t: 'ok' }); };
  const onAuth = (u) => { setUser(u); setTok(getToken()); setAuthOpen(false); setToast({ m: '환영합니다', t: 'ok' }); };

  const r = route;
  let body = null;
  if (r.name === 'home') body = <HomePage token={token} user={user} onOpen={id => navigate(`/content/${id}`)} />;
  else if (r.name === 'content') body = (
    <ContentPage
      id={r.id} token={token}
      onNeedAuth={() => { setAuthMode('login'); setAuthOpen(true); }}
    />
  );
  else if (r.name === 'pay') {
    if (!token || !user) { body = <div className="text-center py-20"><button onClick={() => { setAuthMode('login'); setAuthOpen(true); }} className="text-cyan-400">로그인 필요</button></div>; }
    else body = <PayPage id={r.id} user={user} token={token} />;
  } else if (r.name === 'success') {
    if (!token) body = <div className="text-center py-20 text-slate-500">로그인 후 다시 시도해 주세요</div>;
    else body = <SuccessPage token={token} onDone={() => navigate('/')} />;
  } else if (r.name === 'fail') body = <FailPage onDone={() => navigate('/')} />;
  else if (r.name === 'purchases') {
    if (!token) body = <div className="text-center py-20"><button onClick={() => { setAuthMode('login'); setAuthOpen(true); }} className="text-cyan-400">로그인</button></div>;
    else body = <PurchasesPage token={token} />;
  }

  return (
    <>
      <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
        <div className="max-w-3xl mx-auto flex items-center justify-between px-4 h-14">
          <button type="button" onClick={() => navigate('/')} className="font-bold text-cyan-400">AI 노트 랩</button>
          <nav className="flex items-center gap-3 text-sm">
            {user ? (
              <>
                <span className="text-slate-500 hidden sm:inline">{user.name}</span>
                <button type="button" onClick={() => navigate('/purchases')} className="text-slate-300 hover:text-white">구매 이력</button>
                <button type="button" onClick={logout} className="text-slate-500">나가기</button>
              </>
            ) : (
              <button type="button" onClick={() => { setAuthMode('login'); setAuthOpen(true); }} className="text-cyan-400">로그인</button>
            )}
          </nav>
        </div>
      </header>
      <main>{body}</main>
      {authOpen && <AuthModal mode={authMode} onClose={() => setAuthOpen(false)} onAuth={onAuth} />}
      {toast && <Toast message={toast.m} type={toast.t} onClose={() => setToast(null)} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
