<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 업로드 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }

    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #f3f4f6; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // ========================================
    // 상수 정의
    // ========================================
    const ACCEPTED_TYPES = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp'];
    const ACCEPTED_EXT = '.jpg, .jpeg, .png, .gif, .webp';
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
    const UPLOAD_API = 'http://localhost:3000/upload';

    // ========================================
    // 유틸 함수
    // ========================================
    const formatBytes = (bytes) => {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    };

    const getFileExt = (fileName) => {
      const parts = fileName.split('.');
      return parts.length > 1 ? parts.pop().toUpperCase() : '';
    };

    const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

    // ========================================
    // 디자인 시스템 컴포넌트
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, children, className = '', type = 'button', ...props }) {
      const variants = {
        primary: 'bg-blue-600 hover:bg-blue-700 text-white shadow-sm',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border border-gray-300',
        danger: 'bg-red-600 hover:bg-red-700 text-white shadow-sm',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-700',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`inline-flex items-center justify-center gap-2 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Badge({ children, color = 'gray', className = '' }) {
      const colors = {
        gray: 'bg-gray-100 text-gray-700',
        blue: 'bg-blue-100 text-blue-700',
        green: 'bg-green-100 text-green-700',
        red: 'bg-red-100 text-red-700',
        amber: 'bg-amber-100 text-amber-700',
      };
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium ${colors[color]} ${className}`}>
          {children}
        </span>
      );
    }

    function Modal({ isOpen, onClose, children }) {
      useEffect(() => {
        if (!isOpen) return;
        const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', handleKey);
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', handleKey);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
        >
          <div
            className="relative max-w-[95vw] max-h-[95vh] flex flex-col"
            onClick={(e) => e.stopPropagation()}
          >
            {children}
          </div>
        </div>
      );
    }

    function Toast({ message, type = 'error', onClose }) {
      useEffect(() => {
        const timer = setTimeout(onClose, 4000);
        return () => clearTimeout(timer);
      }, [onClose]);

      const colors = {
        error: 'bg-red-50 border-red-200 text-red-800',
        success: 'bg-green-50 border-green-200 text-green-800',
        warning: 'bg-amber-50 border-amber-200 text-amber-800',
      };
      const icons = {
        error: '⚠️',
        success: '✅',
        warning: '⚠️',
      };

      return (
        <div className={`flex items-start gap-3 px-4 py-3 rounded-lg border shadow-lg animate-slide-up ${colors[type]}`} role="alert">
          <span className="text-lg leading-none">{icons[type]}</span>
          <p className="flex-1 text-sm font-medium whitespace-pre-line">{message}</p>
          <button
            onClick={onClose}
            className="text-gray-400 hover:text-gray-600 text-lg leading-none"
            aria-label="알림 닫기"
          >×</button>
        </div>
      );
    }

    // ========================================
    // 드래그 앤 드롭 업로드 영역
    // ========================================
    function DropZone({ onFilesSelected, isUploading }) {
      const [isDragging, setIsDragging] = useState(false);
      const fileInputRef = useRef(null);
      const dragCounter = useRef(0);

      const handleDragEnter = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        dragCounter.current++;
        if (e.dataTransfer.items && e.dataTransfer.items.length > 0) {
          setIsDragging(true);
        }
      }, []);

      const handleDragLeave = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        dragCounter.current--;
        if (dragCounter.current === 0) {
          setIsDragging(false);
        }
      }, []);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
      }, []);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        dragCounter.current = 0;
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          onFilesSelected(Array.from(e.dataTransfer.files));
          e.dataTransfer.clearData();
        }
      }, [onFilesSelected]);

      const handleFileInputChange = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          onFilesSelected(Array.from(e.target.files));
          e.target.value = ''; // 같은 파일 재선택 가능하도록
        }
      };

      const handleClick = () => {
        fileInputRef.current?.click();
      };

      return (
        <div
          onDragEnter={handleDragEnter}
          onDragLeave={handleDragLeave}
          onDragOver={handleDragOver}
          onDrop={handleDrop}
          onClick={handleClick}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') handleClick(); }}
          className={`relative cursor-pointer rounded-2xl border-2 border-dashed transition-all p-8 sm:p-12 text-center select-none
            ${isDragging
              ? 'border-blue-500 bg-blue-50 scale-[1.01]'
              : 'border-gray-300 bg-white hover:border-blue-400 hover:bg-blue-50/50'
            }`}
          aria-label="파일 업로드 영역 — 클릭 또는 드래그 앤 드롭"
        >
          <input
            ref={fileInputRef}
            type="file"
            multiple
            accept={ACCEPTED_TYPES.join(',')}
            onChange={handleFileInputChange}
            className="hidden"
            aria-hidden="true"
          />

          <div className="flex flex-col items-center gap-4 pointer-events-none">
            <div className={`w-16 h-16 rounded-full flex items-center justify-center text-3xl transition-colors
              ${isDragging ? 'bg-blue-500 text-white' : 'bg-blue-100 text-blue-600'}`}>
              {isDragging ? '📥' : '🖼️'}
            </div>

            <div>
              <p className="text-lg sm:text-xl font-semibold text-gray-800">
                {isDragging ? '여기에 놓아주세요' : '이미지를 드래그하거나 클릭하세요'}
              </p>
              <p className="text-sm text-gray-500 mt-1">
                여러 장을 한 번에 업로드할 수 있습니다
              </p>
            </div>

            <div className="flex flex-wrap items-center justify-center gap-2">
              <Badge color="blue">JPG</Badge>
              <Badge color="blue">PNG</Badge>
              <Badge color="blue">GIF</Badge>
              <Badge color="blue">WEBP</Badge>
              <Badge color="amber">최대 10MB</Badge>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 이미지 카드 (썸네일)
    // ========================================
    function ImageCard({ image, onDelete, onPreview }) {
      return (
        <div className="group relative bg-white rounded-xl shadow-sm hover:shadow-md transition-all border border-gray-200 overflow-hidden animate-slide-up">
          {/* 썸네일 영역 */}
          <button
            onClick={() => onPreview(image)}
            className="block w-full aspect-square bg-gray-100 overflow-hidden relative"
            aria-label={`${image.name} 원본 보기`}
          >
            <img
              src={image.url}
              alt={image.name}
              className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
              loading="lazy"
            />
            {/* 호버 오버레이 */}
            <div className="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors flex items-center justify-center">
              <span className="text-white opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium bg-black/50 px-3 py-1 rounded-full">
                🔍 원본 보기
              </span>
            </div>
          </button>

          {/* 삭제 버튼 */}
          <button
            onClick={(e) => { e.stopPropagation(); onDelete(image.id); }}
            className="absolute top-2 right-2 w-8 h-8 rounded-full bg-white/90 hover:bg-red-500 text-gray-600 hover:text-white shadow-md flex items-center justify-center transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100"
            aria-label={`${image.name} 삭제`}
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>

          {/* 파일 정보 */}
          <div className="p-3 space-y-1">
            <p className="text-sm font-medium text-gray-800 truncate" title={image.name}>
              {image.name}
            </p>
            <div className="flex items-center justify-between text-xs text-gray-500">
              <Badge color="gray">{getFileExt(image.name)}</Badge>
              <span>{formatBytes(image.size)}</span>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 원본 이미지 모달
    // ========================================
    function ImagePreviewModal({ image, onClose }) {
      if (!image) return null;

      return (
        <Modal isOpen={!!image} onClose={onClose}>
          <div className="flex flex-col items-center">
            {/* 헤더 */}
            <div className="w-full flex items-center justify-between bg-white rounded-t-xl px-4 py-3 shadow-sm">
              <div className="min-w-0 flex-1 pr-4">
                <p className="text-sm font-semibold text-gray-800 truncate" title={image.name}>
                  {image.name}
                </p>
                <div className="flex items-center gap-2 mt-0.5">
                  <Badge color="blue">{getFileExt(image.name)}</Badge>
                  <span className="text-xs text-gray-500">{formatBytes(image.size)}</span>
                  <span className="text-xs text-gray-400">·</span>
                  <span className="text-xs text-gray-500">{image.type}</span>
                </div>
              </div>
              <button
                onClick={onClose}
                className="w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition-colors flex-shrink-0"
                aria-label="닫기"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>

            {/* 이미지 */}
            <div className="bg-gray-900 rounded-b-xl overflow-auto max-w-[95vw] max-h-[calc(95vh-80px)]">
              <img
                src={image.url}
                alt={image.name}
                className="block max-w-full max-h-[calc(95vh-80px)] object-contain"
              />
            </div>
          </div>
        </Modal>
      );
    }

    // ========================================
    // 통계 요약 바
    // ========================================
    function SummaryBar({ images, onClearAll }) {
      const totalSize = useMemo(
        () => images.reduce((acc, img) => acc + img.size, 0),
        [images]
      );

      if (images.length === 0) return null;

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div className="flex flex-wrap items-center gap-3 sm:gap-6">
            <div className="flex items-center gap-2">
              <span className="text-2xl">📸</span>
              <div>
                <p className="text-xs text-gray-500">업로드된 이미지</p>
                <p className="text-lg font-bold text-gray-800">{images.length}장</p>
              </div>
            </div>
            <div className="h-10 w-px bg-gray-200 hidden sm:block"></div>
            <div className="flex items-center gap-2">
              <span className="text-2xl">💾</span>
              <div>
                <p className="text-xs text-gray-500">전체 용량</p>
                <p className="text-lg font-bold text-gray-800">{formatBytes(totalSize)}</p>
              </div>
            </div>
          </div>

          <Button variant="danger" size="md" onClick={onClearAll}>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/>
            </svg>
            전체 삭제
          </Button>
        </div>
      );
    }

    // ========================================
    // 앱 컴포넌트
    // ========================================
    function App() {
      const [images, setImages] = useState([]);
      const [previewImage, setPreviewImage] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [uploading, setUploading] = useState(false);

      const addToast = useCallback((message, type = 'error') => {
        const id = genId();
        setToasts(prev => [...prev, { id, message, type }]);
      }, []);

      const removeToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      const validateFile = useCallback((file) => {
        if (!ACCEPTED_TYPES.includes(file.type)) {
          return `지원하지 않는 형식입니다 (JPG, PNG, GIF, WEBP만 가능)`;
        }
        if (file.size > MAX_FILE_SIZE) {
          return `파일이 10MB를 초과합니다 (현재 ${formatBytes(file.size)})`;
        }
        return null;
      }, []);

      const uploadToServer = async (file) => {
        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch(UPLOAD_API, { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || '서버 오류');
        }
        return res.json();
      };

      const handleFilesSelected = useCallback(async (files) => {
        const valid = [];
        const errors = [];

        files.forEach(file => {
          const err = validateFile(file);
          if (err) errors.push(`• ${file.name}: ${err}`);
          else valid.push(file);
        });

        if (errors.length > 0) {
          addToast(`${errors.length}개 파일을 업로드할 수 없습니다:\n${errors.join('\n')}`, 'error');
        }

        if (valid.length === 0) return;

        setUploading(true);
        let success = 0;
        const uploadErrors = [];

        for (const file of valid) {
          try {
            const data = await uploadToServer(file);
            setImages(prev => [...prev, {
              id: data.fileId || genId(),
              name: data.name,
              size: data.size,
              type: data.type,
              url: data.url,
            }]);
            success++;
          } catch (e) {
            uploadErrors.push(`• ${file.name}: ${e.message}`);
          }
        }

        setUploading(false);

        if (success > 0) addToast(`${success}장이 ImageKit에 업로드되었습니다 ☁️`, 'success');
        if (uploadErrors.length > 0) addToast(`업로드 실패:\n${uploadErrors.join('\n')}`, 'error');
      }, [validateFile, addToast]);

      const handleDelete = useCallback((id) => {
        setImages(prev => prev.filter(img => img.id !== id));
      }, []);

      const handleClearAll = useCallback(() => {
        if (!window.confirm(`전체 ${images.length}장을 삭제할까요?`)) return;
        images.forEach(img => URL.revokeObjectURL(img.url));
        setImages([]);
        addToast('전체 이미지가 삭제되었습니다', 'success');
      }, [images, addToast]);

      return (
        <div className="max-w-6xl mx-auto px-4 py-6 sm:py-10">
          {/* 헤더 */}
          <header className="mb-8 text-center">
            <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">
              🖼️ 이미지 업로드 테스트
            </h1>
            <p className="text-sm sm:text-base text-gray-600">
              드래그 앤 드롭으로 간편하게 이미지를 업로드해보세요
            </p>
          </header>

          {/* 드롭존 */}
          <section className="mb-6">
            <DropZone onFilesSelected={handleFilesSelected} />
            {uploading && (
              <div className="mt-3 flex items-center justify-center gap-2 text-sm text-blue-600 font-medium">
                <svg className="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                </svg>
                ImageKit에 업로드 중...
              </div>
            )}
          </section>

          {/* 통계 바 */}
          {images.length > 0 && (
            <section className="mb-6">
              <SummaryBar images={images} onClearAll={handleClearAll} />
            </section>
          )}

          {/* 이미지 그리드 / 빈 상태 */}
          <section>
            {images.length === 0 ? (
              <div className="text-center py-12 text-gray-400">
                <div className="text-5xl mb-3">📭</div>
                <p className="text-sm">아직 업로드된 이미지가 없습니다</p>
              </div>
            ) : (
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                {images.map(image => (
                  <ImageCard
                    key={image.id}
                    image={image}
                    onDelete={handleDelete}
                    onPreview={setPreviewImage}
                  />
                ))}
              </div>
            )}
          </section>

          {/* 원본 이미지 모달 */}
          <ImagePreviewModal
            image={previewImage}
            onClose={() => setPreviewImage(null)}
          />

          {/* 토스트 알림 */}
          <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-[calc(100%-2rem)]">
            {toasts.map(toast => (
              <Toast
                key={toast.id}
                message={toast.message}
                type={toast.type}
                onClose={() => removeToast(toast.id)}
              />
            ))}
          </div>

          {/* 푸터 */}
          <footer className="mt-12 text-center text-xs text-gray-400">
            <p>AFM 2기 평일반 · Week 6 · 이미지 업로드 실습</p>
          </footer>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
