<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 스피너 애니메이션 */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 0.8s linear infinite;
    }
    /* 숫자 입력창의 스핀 버튼 제거 */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    /* bar 애니메이션 */
    .bar-fill {
      transition: width 0.5s ease-out;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // ========================================
    // 🛠️ 유틸리티
    // ========================================

    const API_BASE_URL = '/api';

    // 원화 형식 포맷터
    const formatKRW = (amount) => {
      const num = Number(amount) || 0;
      return num.toLocaleString('ko-KR') + '원';
    };

    // YYYY-MM 문자열 생성
    const formatMonth = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    };

    // YYYY-MM-DD 문자열 생성
    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    // 월 이동
    const shiftMonth = (monthStr, delta) => {
      const [y, m] = monthStr.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      return formatMonth(d);
    };

    // 월 표시 (2026년 4월)
    const displayMonth = (monthStr) => {
      const [y, m] = monthStr.split('-').map(Number);
      return `${y}년 ${m}월`;
    };

    // 카테고리 정의
    const CATEGORIES = {
      income: ['급여', '부업', '투자', '기타수입'],
      expense: ['식비', '교통', '주거', '구독료', '쇼핑', '의료', '경조사', '기타'],
    };

    // 카테고리 색상 (지출 차트용)
    const CATEGORY_COLORS = {
      '식비': 'bg-red-500',
      '교통': 'bg-orange-500',
      '주거': 'bg-amber-500',
      '구독료': 'bg-yellow-500',
      '쇼핑': 'bg-pink-500',
      '의료': 'bg-purple-500',
      '경조사': 'bg-indigo-500',
      '기타': 'bg-gray-500',
    };

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled, onClick, children, type = 'button', className = '' }) {
      const base = 'font-semibold rounded-lg transition focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-blue-600 hover:bg-blue-700 text-white focus:ring-blue-400',
        secondary: 'bg-gray-200 hover:bg-gray-300 text-gray-800 focus:ring-gray-300',
        danger: 'bg-red-500 hover:bg-red-600 text-white focus:ring-red-400',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-700',
        success: 'bg-green-600 hover:bg-green-700 text-white focus:ring-green-400',
      };
      const sizes = {
        sm: 'px-3 py-1 text-sm',
        md: 'px-4 py-2 text-base',
        lg: 'px-6 py-3 text-lg',
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ type = 'text', label, value, onChange, placeholder, disabled, required, min, step, suffix, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <div className="relative">
            <input
              type={type}
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              disabled={disabled}
              required={required}
              min={min}
              step={step}
              className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 disabled:bg-gray-50 ${suffix ? 'pr-10' : ''}`}
            />
            {suffix && (
              <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">{suffix}</span>
            )}
          </div>
        </div>
      );
    }

    function Select({ label, value, onChange, options, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <select
            value={value}
            onChange={onChange}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white"
          >
            {options.map(opt => (
              <option key={opt} value={opt}>{opt}</option>
            ))}
          </select>
        </div>
      );
    }

    function Spinner({ size = 'md', className = '' }) {
      const sizes = { sm: 'w-4 h-4', md: 'w-6 h-6', lg: 'w-10 h-10' };
      return (
        <div className={`spinner inline-block border-2 border-gray-200 border-t-blue-500 rounded-full ${sizes[size]} ${className}`} />
      );
    }

    function Badge({ children, color = 'gray' }) {
      const colors = {
        gray: 'bg-gray-100 text-gray-700',
        green: 'bg-green-100 text-green-700',
        red: 'bg-red-100 text-red-700',
        blue: 'bg-blue-100 text-blue-700',
      };
      return (
        <span className={`inline-block px-2 py-0.5 text-xs font-medium rounded-full ${colors[color]}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 🧩 Layout / Header
    // ========================================

    function Header({ month, onPrev, onNext, onToday }) {
      return (
        <header className="bg-white border-b border-gray-200 shadow-sm">
          <div className="max-w-5xl mx-auto px-4 py-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <h1 className="text-2xl sm:text-3xl font-bold text-gray-800">
              💰 나만의 가계부
            </h1>
            <div className="flex items-center gap-2">
              <button
                onClick={onPrev}
                className="w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold"
                aria-label="이전 달"
              >
                ‹
              </button>
              <div className="text-lg font-semibold text-gray-800 min-w-[110px] text-center">
                {displayMonth(month)}
              </div>
              <button
                onClick={onNext}
                className="w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold"
                aria-label="다음 달"
              >
                ›
              </button>
              <Button variant="ghost" size="sm" onClick={onToday} className="ml-1">
                오늘
              </Button>
            </div>
          </div>
        </header>
      );
    }

    // ========================================
    // 📊 Summary Cards
    // ========================================

    function SummaryCards({ summary, loading }) {
      const income = summary?.totalIncome ?? 0;
      const expense = summary?.totalExpense ?? 0;
      const balance = income - expense;

      const cards = [
        {
          label: '이번 달 수입',
          value: income,
          color: 'text-green-600',
          bg: 'bg-green-50',
          border: 'border-green-100',
          icon: '⬆️',
        },
        {
          label: '이번 달 지출',
          value: expense,
          color: 'text-red-600',
          bg: 'bg-red-50',
          border: 'border-red-100',
          icon: '⬇️',
        },
        {
          label: '잔액',
          value: balance,
          color: balance >= 0 ? 'text-blue-600' : 'text-red-600',
          bg: balance >= 0 ? 'bg-blue-50' : 'bg-red-50',
          border: balance >= 0 ? 'border-blue-100' : 'border-red-100',
          icon: '💵',
        },
      ];

      return (
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          {cards.map((c) => (
            <Card key={c.label} className={`${c.bg} ${c.border} p-5`}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm font-medium text-gray-600">{c.label}</span>
                <span className="text-xl">{c.icon}</span>
              </div>
              <div className={`text-2xl font-bold ${c.color}`}>
                {loading ? <Spinner size="sm" /> : formatKRW(c.value)}
              </div>
            </Card>
          ))}
        </div>
      );
    }

    // ========================================
    // ✏️ Transaction Form
    // ========================================

    function TransactionForm({ onSubmit, submitting }) {
      const today = formatDate(new Date());
      const [type, setType] = useState('expense');
      const [date, setDate] = useState(today);
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState(CATEGORIES.expense[0]);
      const [memo, setMemo] = useState('');
      const [error, setError] = useState('');

      // type 변경 시 카테고리 자동 전환
      useEffect(() => {
        setCategory(CATEGORIES[type][0]);
      }, [type]);

      const reset = () => {
        setDate(formatDate(new Date()));
        setAmount('');
        setMemo('');
        setCategory(CATEGORIES[type][0]);
        setError('');
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        const num = Number(amount);
        if (!amount || isNaN(num) || num <= 0) {
          setError('올바른 금액을 입력해주세요.');
          return;
        }
        if (!date) {
          setError('날짜를 선택해주세요.');
          return;
        }

        const ok = await onSubmit({
          type,
          date,
          amount: num,
          category,
          memo: memo.trim(),
        });

        if (ok) reset();
      };

      return (
        <Card className="p-5">
          <h2 className="text-lg font-semibold text-gray-800 mb-4">내역 등록</h2>
          <form onSubmit={handleSubmit} className="space-y-4">
            {/* 수입/지출 토글 */}
            <div className="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-lg">
              <button
                type="button"
                onClick={() => setType('income')}
                className={`py-2 rounded-md font-semibold text-sm transition ${
                  type === 'income'
                    ? 'bg-white text-green-600 shadow-sm'
                    : 'text-gray-500 hover:text-gray-700'
                }`}
              >
                수입
              </button>
              <button
                type="button"
                onClick={() => setType('expense')}
                className={`py-2 rounded-md font-semibold text-sm transition ${
                  type === 'expense'
                    ? 'bg-white text-red-600 shadow-sm'
                    : 'text-gray-500 hover:text-gray-700'
                }`}
              >
                지출
              </button>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <Input
                type="date"
                label="날짜"
                value={date}
                onChange={(e) => setDate(e.target.value)}
                required
              />
              <Input
                type="number"
                label="금액"
                value={amount}
                onChange={(e) => setAmount(e.target.value)}
                placeholder="0"
                min="0"
                step="1"
                suffix="원"
                required
              />
            </div>

            <Select
              label="카테고리"
              value={category}
              onChange={(e) => setCategory(e.target.value)}
              options={CATEGORIES[type]}
            />

            <Input
              type="text"
              label="메모 (선택)"
              value={memo}
              onChange={(e) => setMemo(e.target.value)}
              placeholder="예) 점심 - 김밥천국"
            />

            {error && (
              <p className="text-sm text-red-600 bg-red-50 border border-red-100 rounded-md px-3 py-2">
                {error}
              </p>
            )}

            <Button
              type="submit"
              variant={type === 'income' ? 'success' : 'danger'}
              size="lg"
              disabled={submitting}
              className="w-full"
            >
              {submitting ? (
                <span className="flex items-center justify-center gap-2">
                  <Spinner size="sm" />
                  등록 중...
                </span>
              ) : (
                `${type === 'income' ? '수입' : '지출'} 등록`
              )}
            </Button>
          </form>
        </Card>
      );
    }

    // ========================================
    // 📈 Category Expense Chart
    // ========================================

    function CategoryChart({ summary, loading }) {
      const byCategory = summary?.byCategory || {};
      const totalExpense = summary?.totalExpense || 0;

      // 지출 카테고리만 필터 (byCategory가 type 구분 포함일 수도, 아닐 수도 있음)
      // 가장 유연하게: 정의된 지출 카테고리 이름으로 매칭
      const expenseCats = useMemo(() => {
        const items = [];
        CATEGORIES.expense.forEach((cat) => {
          // byCategory가 { expense: {식비: 100}, income: {...} } 구조일 경우
          let amount = 0;
          if (byCategory.expense && typeof byCategory.expense === 'object') {
            amount = byCategory.expense[cat] || 0;
          } else if (byCategory[cat] != null) {
            // byCategory가 { 식비: 100, 교통: 200 } 구조일 경우
            amount = byCategory[cat] || 0;
          }
          if (amount > 0) {
            items.push({ category: cat, amount });
          }
        });
        items.sort((a, b) => b.amount - a.amount);
        return items;
      }, [byCategory]);

      return (
        <Card className="p-5">
          <h2 className="text-lg font-semibold text-gray-800 mb-4">
            카테고리별 지출 현황
          </h2>

          {loading ? (
            <div className="py-8 flex justify-center">
              <Spinner />
            </div>
          ) : expenseCats.length === 0 ? (
            <p className="text-center text-gray-400 text-sm py-6">
              이번 달 지출 내역이 없습니다.
            </p>
          ) : (
            <div className="space-y-3">
              {expenseCats.map(({ category, amount }) => {
                const pct = totalExpense > 0 ? (amount / totalExpense) * 100 : 0;
                const barColor = CATEGORY_COLORS[category] || 'bg-gray-400';
                return (
                  <div key={category}>
                    <div className="flex justify-between items-center mb-1 text-sm">
                      <span className="font-medium text-gray-700">{category}</span>
                      <span className="text-gray-600">
                        {formatKRW(amount)}
                        <span className="ml-2 text-gray-400 text-xs">
                          {pct.toFixed(1)}%
                        </span>
                      </span>
                    </div>
                    <div className="w-full h-3 bg-gray-100 rounded-full overflow-hidden">
                      <div
                        className={`${barColor} bar-fill h-full rounded-full`}
                        style={{ width: `${pct}%` }}
                      />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 📋 Transaction List
    // ========================================

    // 수정 모달
    function EditModal({ tx, onClose, onSave }) {
      const CATEGORIES = {
        income: ['급여', '부업', '투자', '기타수입'],
        expense: ['식비', '교통', '주거', '구독료', '쇼핑', '의료', '경조사', '기타'],
      };
      const [form, setForm] = useState({
        type: tx.type,
        amount: String(tx.amount),
        category: tx.category,
        memo: tx.memo || '',
        date: tx.date,
      });
      const [saving, setSaving] = useState(false);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleTypeChange = (t) => {
        const cats = CATEGORIES[t];
        set('type', t);
        if (!cats.includes(form.category)) set('category', cats[0]);
      };

      const handleSave = async () => {
        setSaving(true);
        await onSave({ ...form, amount: Number(form.amount) });
        setSaving(false);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-5">
              <h3 className="text-lg font-semibold text-gray-800">내역 수정</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
            </div>

            {/* 수입/지출 토글 */}
            <div className="flex rounded-lg overflow-hidden border border-gray-200 mb-4">
              {['income','expense'].map(t => (
                <button key={t} onClick={() => handleTypeChange(t)}
                  className={`flex-1 py-2 text-sm font-medium transition ${
                    form.type === t
                      ? t === 'income' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
                      : 'bg-white text-gray-500 hover:bg-gray-50'
                  }`}>
                  {t === 'income' ? '수입' : '지출'}
                </button>
              ))}
            </div>

            <div className="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label className="block text-xs text-gray-500 mb-1">날짜</label>
                <input type="date" value={form.date} onChange={e => set('date', e.target.value)}
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
              </div>
              <div>
                <label className="block text-xs text-gray-500 mb-1">금액</label>
                <div className="relative">
                  <input type="number" value={form.amount} onChange={e => set('amount', e.target.value)} min="1"
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 pr-7 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
                  <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400">원</span>
                </div>
              </div>
            </div>

            <div className="mb-3">
              <label className="block text-xs text-gray-500 mb-1">카테고리</label>
              <select value={form.category} onChange={e => set('category', e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                {CATEGORIES[form.type].map(c => <option key={c}>{c}</option>)}
              </select>
            </div>

            <div className="mb-5">
              <label className="block text-xs text-gray-500 mb-1">메모 (선택)</label>
              <input type="text" value={form.memo} onChange={e => set('memo', e.target.value)} placeholder="메모 입력"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
            </div>

            <div className="flex gap-2">
              <button onClick={onClose}
                className="flex-1 py-2 rounded-lg border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 transition">
                취소
              </button>
              <button onClick={handleSave} disabled={saving}
                className="flex-1 py-2 rounded-lg bg-blue-500 text-white text-sm font-medium hover:bg-blue-600 transition disabled:opacity-50">
                {saving ? '저장 중...' : '저장'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function TransactionList({ transactions, loading, onDelete, onEdit }) {
      // 날짜 내림차순 정렬
      const sorted = useMemo(() => {
        return [...(transactions || [])].sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return (b.id || 0) - (a.id || 0);
        });
      }, [transactions]);

      return (
        <Card className="p-5">
          <h2 className="text-lg font-semibold text-gray-800 mb-4">
            내역 목록
            {transactions && (
              <span className="ml-2 text-sm font-normal text-gray-400">
                ({transactions.length}건)
              </span>
            )}
          </h2>

          {loading ? (
            <div className="py-12 flex justify-center">
              <Spinner size="lg" />
            </div>
          ) : sorted.length === 0 ? (
            <div className="py-12 text-center text-gray-400">
              <div className="text-4xl mb-2">📝</div>
              <p>내역이 없습니다. 첫 거래를 등록해보세요!</p>
            </div>
          ) : (
            <ul className="divide-y divide-gray-100">
              {sorted.map((t) => {
                const isIncome = t.type === 'income';
                return (
                  <li
                    key={t.id}
                    className="py-3 flex items-center gap-3 hover:bg-gray-50 px-2 -mx-2 rounded-md transition"
                  >
                    <div className="flex-shrink-0 text-xs text-gray-500 w-20">
                      {t.date}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <Badge color={isIncome ? 'green' : 'red'}>
                          {t.category}
                        </Badge>
                        {t.memo && (
                          <span className="text-sm text-gray-600 truncate">
                            {t.memo}
                          </span>
                        )}
                      </div>
                    </div>
                    <div
                      className={`font-semibold whitespace-nowrap ${
                        isIncome ? 'text-green-600' : 'text-red-600'
                      }`}
                    >
                      {isIncome ? '+' : '-'}{formatKRW(t.amount)}
                    </div>
                    <button
                      onClick={() => onEdit(t)}
                      className="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:bg-blue-50 hover:text-blue-500 transition"
                      aria-label="수정"
                      title="수정"
                    >
                      ✏️
                    </button>
                    <button
                      onClick={() => onDelete(t.id)}
                      className="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:bg-red-50 hover:text-red-500 transition"
                      aria-label="삭제"
                      title="삭제"
                    >
                      🗑️
                    </button>
                  </li>
                );
              })}
            </ul>
          )}
        </Card>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [month, setMonth] = useState(formatMonth(new Date()));
      const [transactions, setTransactions] = useState([]);
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [editingTx, setEditingTx] = useState(null);

      // 데이터 로드
      const loadData = useCallback(async (targetMonth) => {
        setLoading(true);
        setErrorMsg('');
        try {
          const [txRes, sumRes] = await Promise.all([
            fetch(`${API_BASE_URL}/transactions?month=${targetMonth}`),
            fetch(`${API_BASE_URL}/summary?month=${targetMonth}`),
          ]);

          if (!txRes.ok) throw new Error('내역을 불러올 수 없습니다.');
          if (!sumRes.ok) throw new Error('요약을 불러올 수 없습니다.');

          const txData = await txRes.json();
          const sumData = await sumRes.json();

          // 응답 형태 유연 처리
          const txList = Array.isArray(txData)
            ? txData
            : txData.transactions || txData.data || [];

          setTransactions(txList);
          setSummary(sumData);
        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || '데이터 로드에 실패했습니다.');
          setTransactions([]);
          setSummary(null);
        } finally {
          setLoading(false);
        }
      }, []);

      // 월 변경 시 자동 로드
      useEffect(() => {
        loadData(month);
      }, [month, loadData]);

      // 내역 등록
      const handleSubmit = async (payload) => {
        setSubmitting(true);
        setErrorMsg('');
        try {
          const res = await fetch(`${API_BASE_URL}/transactions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error('등록에 실패했습니다.');
          await loadData(month);
          return true;
        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || '등록 오류');
          return false;
        } finally {
          setSubmitting(false);
        }
      };

      // 내역 삭제 (confirm 없이 즉시)
      const handleDelete = async (id) => {
        setErrorMsg('');
        // 낙관적 업데이트
        const prev = transactions;
        setTransactions((ts) => ts.filter((t) => t.id !== id));

        try {
          const res = await fetch(`${API_BASE_URL}/transactions/${id}`, {
            method: 'DELETE',
          });
          if (!res.ok) throw new Error('삭제에 실패했습니다.');
          // 요약 새로 갱신
          await loadData(month);
        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || '삭제 오류');
          setTransactions(prev); // 롤백
        }
      };

      // 내역 수정
      const handleUpdate = async (payload) => {
        setErrorMsg('');
        try {
          const res = await fetch(`${API_BASE_URL}/transactions/${editingTx.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error('수정에 실패했습니다.');
          setEditingTx(null);
          await loadData(month);
        } catch (err) {
          setErrorMsg(err.message || '수정 오류');
        }
      };

      const handlePrev = () => setMonth((m) => shiftMonth(m, -1));
      const handleNext = () => setMonth((m) => shiftMonth(m, 1));
      const handleToday = () => setMonth(formatMonth(new Date()));

      return (
        <div className="min-h-screen">
          {editingTx && (
            <EditModal
              tx={editingTx}
              onClose={() => setEditingTx(null)}
              onSave={handleUpdate}
            />
          )}
          <Header
            month={month}
            onPrev={handlePrev}
            onNext={handleNext}
            onToday={handleToday}
          />

          <main className="max-w-5xl mx-auto px-4 py-6 space-y-6">
            {errorMsg && (
              <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm flex justify-between items-center">
                <span>⚠️ {errorMsg}</span>
                <button
                  onClick={() => setErrorMsg('')}
                  className="text-red-400 hover:text-red-600 ml-3"
                >
                  ✕
                </button>
              </div>
            )}

            {/* 요약 카드 */}
            <SummaryCards summary={summary} loading={loading} />

            {/* 등록 폼 + 카테고리 차트 (2단 레이아웃) */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <TransactionForm onSubmit={handleSubmit} submitting={submitting} />
              <CategoryChart summary={summary} loading={loading} />
            </div>

            {/* 내역 목록 */}
            <TransactionList
              transactions={transactions}
              loading={loading}
              onDelete={handleDelete}
              onEdit={setEditingTx}
            />

            <footer className="py-6 text-center text-xs text-gray-400">
              💰 나만의 가계부 · {displayMonth(month)}
            </footer>
          </main>
        </div>
      );
    }

    // ========================================
    // 🎬 Render
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
