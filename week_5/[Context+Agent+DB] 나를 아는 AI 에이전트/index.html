<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🤖 나를 아는 AI 멘토</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .typing span { display:inline-block; width:6px; height:6px; border-radius:50%; margin:0 2px; animation:bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay:.2s; }
    .typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .prose { white-space: pre-wrap; line-height: 1.7; }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:#f1f5f9; } ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUGGESTED = [
  "이번 달 지출 어때? 문제 있어?",
  "카페 지출 줄이는 방법 알려줘",
  "지금 학습 상황에서 다음 목표는?",
  "이번 달 예산 초과했어?",
  "요즘 지출 패턴 분석해줘",
];

// ── 마크다운 간단 렌더 ────────────────────────────────
function MdText({ text }) {
  const lines = text.split('\n');
  return (
    <div className="prose text-sm">
      {lines.map((line, i) => {
        if (line.startsWith('## ')) return <h3 key={i} className="font-bold text-base mt-3 mb-1">{line.slice(3)}</h3>;
        if (line.startsWith('# ')) return <h2 key={i} className="font-bold text-lg mt-2 mb-1">{line.slice(2)}</h2>;
        if (line.startsWith('- ')) return <p key={i} className="pl-3 before:content-['•'] before:mr-2 before:text-current">{line.slice(2)}</p>;
        if (line.startsWith('**') && line.endsWith('**')) return <p key={i} className="font-semibold">{line.slice(2,-2)}</p>;
        if (line === '') return <div key={i} className="h-1" />;
        return <p key={i}>{line.replace(/\*\*(.*?)\*\*/g, (_, m) => m)}</p>;
      })}
    </div>
  );
}

// ── Context 패널 ─────────────────────────────────────
function ContextPanel({ contextMd, dbSummary, withContext }) {
  const [tab, setTab] = useState('context');

  const catEntries = dbSummary ? Object.entries(dbSummary.byCategory).sort((a,b)=>b[1]-a[1]) : [];
  const maxCat = catEntries.length > 0 ? catEntries[0][1] : 1;

  return (
    <div className={`h-full flex flex-col border-r transition-all ${withContext ? 'border-gray-200 bg-gray-50/30' : 'border-slate-200 bg-white'}`}>
      <div className="flex border-b border-slate-100">
        {['context','db'].map(t => (
          <button key={t} onClick={() => setTab(t)}
            className={`flex-1 py-2.5 text-xs font-semibold transition ${tab === t
              ? (withContext ? 'border-b-2 border-gray-500 text-gray-700' : 'border-b-2 border-slate-400 text-slate-700')
              : 'text-slate-400 hover:text-slate-600'}`}>
            {t === 'context' ? '📋 AI Context' : '📊 DB 데이터'}
          </button>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto p-4">
        {tab === 'context' && (
          <div>
            {withContext
              ? <div className="mb-3 bg-gray-100 text-gray-700 text-xs px-3 py-2 rounded-lg font-medium">✅ AI가 이 Context를 읽고 있습니다</div>
              : <div className="mb-3 bg-slate-100 text-slate-500 text-xs px-3 py-2 rounded-lg">❌ Context 미사용 — AI가 이 내용을 모릅니다</div>
            }
            {contextMd
              ? <div className={`text-xs rounded-xl p-3 ${withContext ? 'bg-gray-50 text-gray-900' : 'bg-slate-50 text-slate-400 opacity-60'}`}>
                  <MdText text={contextMd} />
                </div>
              : <p className="text-slate-400 text-xs">Context 파일을 불러오는 중...</p>
            }
          </div>
        )}

        {tab === 'db' && (
          <div>
            {withContext
              ? <div className="mb-3 bg-gray-100 text-gray-700 text-xs px-3 py-2 rounded-lg font-medium">✅ AI가 이 DB 데이터를 읽고 있습니다</div>
              : <div className="mb-3 bg-slate-100 text-slate-500 text-xs px-3 py-2 rounded-lg">❌ DB 미사용 — AI가 실제 데이터를 모릅니다</div>
            }
            {dbSummary ? (
              <div className={`space-y-3 transition-opacity ${withContext ? 'opacity-100' : 'opacity-40'}`}>
                <div className="grid grid-cols-3 gap-2">
                  {[
                    { label: '수입', val: dbSummary.incomeTotal, color: 'text-emerald-600' },
                    { label: '지출', val: dbSummary.expenseTotal, color: 'text-rose-600' },
                    { label: '잔액', val: dbSummary.balance, color: dbSummary.balance >= 0 ? 'text-blue-600' : 'text-red-600' },
                  ].map(({ label, val, color }) => (
                    <div key={label} className="bg-white rounded-xl p-2.5 text-center shadow-sm">
                      <p className="text-xs text-slate-400">{label}</p>
                      <p className={`text-xs font-bold mt-0.5 ${color}`}>
                        ₩{Math.abs(val).toLocaleString()}
                      </p>
                    </div>
                  ))}
                </div>

                {catEntries.length > 0 && (
                  <div className="bg-white rounded-xl p-3 shadow-sm">
                    <p className="text-xs font-semibold text-slate-600 mb-2">카테고리별 지출</p>
                    <div className="space-y-1.5">
                      {catEntries.slice(0, 6).map(([cat, amt]) => (
                        <div key={cat}>
                          <div className="flex justify-between text-xs text-slate-500 mb-0.5">
                            <span>{cat}</span>
                            <span className="font-medium">₩{amt.toLocaleString()}</span>
                          </div>
                          <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div
                              className={`h-full rounded-full ${withContext ? 'bg-gray-400' : 'bg-slate-300'}`}
                              style={{ width: `${(amt / maxCat) * 100}%` }}
                            />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {dbSummary.recentTransactions?.length > 0 && (
                  <div className="bg-white rounded-xl p-3 shadow-sm">
                    <p className="text-xs font-semibold text-slate-600 mb-2">최근 내역</p>
                    <div className="space-y-1">
                      {dbSummary.recentTransactions.slice(0, 8).map((t, i) => (
                        <div key={i} className="flex justify-between text-xs text-slate-500">
                          <span className="truncate mr-2">{t.date} {t.category}</span>
                          <span className={`font-medium flex-shrink-0 ${t.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}`}>
                            {t.type === 'income' ? '+' : '-'}₩{Number(t.amount).toLocaleString()}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <p className="text-slate-400 text-xs">DB 데이터를 불러오는 중...</p>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Chat ─────────────────────────────────────────────
function ChatPanel({ withContext }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const prevContext = useRef(withContext);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  // Context 모드 변경 시 알림 메시지 추가
  useEffect(() => {
    if (prevContext.current === withContext) return;
    prevContext.current = withContext;
    setMessages(prev => [...prev, {
      role: 'system-notice',
      content: withContext
        ? '✅ Context 모드 ON — AI가 이제 내 프로필과 DB 데이터를 알고 있습니다'
        : '❌ Context 모드 OFF — AI가 내 정보 없이 일반 답변을 합니다',
    }]);
  }, [withContext]);

  const send = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput('');

    const userMsg = { role: 'user', content: msg };
    const newMessages = [...messages.filter(m => m.role !== 'system-notice'), userMsg];
    setMessages(prev => [...prev, userMsg]);
    setLoading(true);

    try {
      const history = newMessages.slice(-8).slice(0, -1).map(m => ({
        role: m.role,
        content: m.content,
      }));
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history, withContext }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setMessages(prev => [...prev, { role: 'assistant', content: data.reply, withContext }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', content: `오류: ${err.message}`, isError: true }]);
    } finally {
      setLoading(false);
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  return (
    <div className="flex flex-col h-full">
      {/* Welcome */}
      {messages.length === 0 && (
        <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
          <div className="text-5xl mb-3">{withContext ? '🧠' : '🤖'}</div>
          <h3 className="font-bold text-slate-700 text-lg mb-1">
            {withContext ? 'Context 있는 AI 멘토' : '일반 AI 어시스턴트'}
          </h3>
          <p className="text-slate-400 text-sm mb-6">
            {withContext
              ? '내 프로필 + 실제 지출 데이터를 알고 맞춤 답변합니다'
              : 'Context 없이 일반적인 답변을 합니다'}
          </p>
          <div className="grid grid-cols-1 gap-2 w-full max-w-sm">
            {SUGGESTED.map((s, i) => (
              <button key={i} onClick={() => send(s)}
                className={`text-left text-sm px-4 py-2.5 rounded-xl border transition ${
                  withContext
                    ? 'border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100'
                    : 'border-slate-200 bg-white text-slate-600 hover:bg-slate-50'
                }`}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Messages */}
      {messages.length > 0 && (
        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {messages.map((msg, i) => {
            if (msg.role === 'system-notice') return (
              <div key={i} className={`text-center text-xs py-2 px-4 rounded-full mx-auto w-fit ${
                msg.content.startsWith('✅') ? 'bg-gray-100 text-gray-600' : 'bg-slate-100 text-slate-500'
              }`}>
                {msg.content}
              </div>
            );

            if (msg.role === 'user') return (
              <div key={i} className="flex justify-end fade-in">
                <div className="bg-slate-700 text-white text-sm px-4 py-2.5 rounded-2xl rounded-br-sm max-w-xs">
                  {msg.content}
                </div>
              </div>
            );

            return (
              <div key={i} className="flex gap-2 fade-in">
                <div className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-sm ${
                  msg.withContext ? 'bg-gray-100' : 'bg-slate-100'
                }`}>
                  {msg.withContext ? '🧠' : '🤖'}
                </div>
                <div className={`text-sm px-4 py-3 rounded-2xl rounded-tl-sm max-w-sm ${
                  msg.isError ? 'bg-red-50 text-red-600' :
                  msg.withContext ? 'bg-gray-50 text-gray-900 border border-gray-100' :
                  'bg-white text-slate-700 border border-slate-100'
                }`}>
                  {msg.withContext && (
                    <div className="text-xs text-gray-400 mb-1.5 font-medium">🧠 Context + DB 기반 답변</div>
                  )}
                  <div className="prose">{msg.content}</div>
                </div>
              </div>
            );
          })}

          {loading && (
            <div className="flex gap-2 fade-in">
              <div className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-sm ${withContext ? 'bg-gray-100' : 'bg-slate-100'}`}>
                {withContext ? '🧠' : '🤖'}
              </div>
              <div className={`px-4 py-3 rounded-2xl rounded-tl-sm ${withContext ? 'bg-gray-50 border border-gray-100' : 'bg-white border border-slate-100'}`}>
                <div className="typing">
                  <span className={withContext ? 'bg-gray-400' : 'bg-slate-400'} />
                  <span className={withContext ? 'bg-gray-400' : 'bg-slate-400'} />
                  <span className={withContext ? 'bg-gray-400' : 'bg-slate-400'} />
                </div>
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
      )}

      {/* Input */}
      <div className={`p-4 border-t ${withContext ? 'border-gray-100 bg-gray-50/20' : 'border-slate-100 bg-white'}`}>
        {messages.length > 0 && (
          <div className="flex gap-2 mb-2 overflow-x-auto pb-1">
            {SUGGESTED.slice(0, 3).map((s, i) => (
              <button key={i} onClick={() => send(s)}
                className={`flex-shrink-0 text-xs px-3 py-1.5 rounded-full border transition ${
                  withContext
                    ? 'border-gray-200 text-gray-600 hover:bg-gray-50'
                    : 'border-slate-200 text-slate-500 hover:bg-slate-50'
                }`}>
                {s}
              </button>
            ))}
          </div>
        )}
        <div className="flex gap-2">
          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder={withContext ? '이희석 님에게 맞춤 답변을 드립니다...' : '무엇이든 물어보세요...'}
            rows={1}
            className={`flex-1 resize-none border rounded-xl px-4 py-2.5 text-sm focus:outline-none transition ${
              withContext
                ? 'border-gray-200 focus:ring-2 focus:ring-gray-300 bg-white'
                : 'border-slate-200 focus:ring-2 focus:ring-slate-300 bg-white'
            }`}
          />
          <button
            onClick={() => send()}
            disabled={!input.trim() || loading}
            className={`px-4 py-2.5 rounded-xl text-white font-medium transition disabled:opacity-40 ${
              withContext ? 'bg-gray-500 hover:bg-gray-600' : 'bg-slate-600 hover:bg-slate-700'
            }`}
          >
            전송
          </button>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  const [withContext, setWithContext] = useState(false);
  const [contextMd, setContextMd] = useState('');
  const [dbSummary, setDbSummary] = useState(null);
  const [sideOpen, setSideOpen] = useState(true);

  useEffect(() => {
    fetch('/api/context').then(r => r.json()).then(d => setContextMd(d.content || ''));
    fetch('/api/db-summary').then(r => r.json()).then(d => setDbSummary(d));
  }, []);

  return (
    <div className="flex flex-col h-screen">
      {/* Header */}
      <header className={`flex-shrink-0 border-b px-4 h-14 flex items-center justify-between transition-colors ${
        withContext ? 'bg-gray-800 border-gray-900' : 'bg-gray-900 border-gray-800'
      }`}>
        <div className="flex items-center gap-3">
          <button onClick={() => setSideOpen(v => !v)} className="text-white/70 hover:text-white text-lg transition">
            ☰
          </button>
          <div className="flex items-center gap-2 text-white">
            <span className="text-xl">{withContext ? '🧠' : '🤖'}</span>
            <div>
              <div className="font-bold text-sm leading-tight">나를 아는 AI 멘토</div>
              <div className="text-xs text-white/60 leading-tight">
                {withContext ? 'Context + DB 연결됨' : '일반 모드'}
              </div>
            </div>
          </div>
        </div>

        {/* Before/After 토글 */}
        <div className="flex items-center gap-3">
          <span className={`text-xs font-medium transition ${!withContext ? 'text-white' : 'text-white/40'}`}>
            Before
          </span>
          <button
            onClick={() => setWithContext(v => !v)}
            className={`relative w-14 h-7 rounded-full transition-colors focus:outline-none ${
              withContext ? 'bg-emerald-400' : 'bg-white/20'
            }`}
          >
            <span className={`absolute top-0.5 left-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform ${
              withContext ? 'translate-x-7' : 'translate-x-0'
            }`} />
          </button>
          <span className={`text-xs font-medium transition ${withContext ? 'text-white' : 'text-white/40'}`}>
            After
          </span>
          <div className={`ml-2 text-xs px-3 py-1 rounded-full font-semibold transition ${
            withContext ? 'bg-emerald-400 text-white' : 'bg-white/10 text-white/60'
          }`}>
            {withContext ? '✅ Context ON' : '❌ Context OFF'}
          </div>
        </div>
      </header>

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        {/* Sidebar */}
        {sideOpen && (
          <div className="w-72 flex-shrink-0 overflow-hidden">
            <ContextPanel contextMd={contextMd} dbSummary={dbSummary} withContext={withContext} />
          </div>
        )}

        {/* Chat */}
        <div className="flex-1 overflow-hidden">
          <ChatPanel withContext={withContext} key={withContext ? 'with' : 'without'} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
