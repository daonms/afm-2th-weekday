<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .todo-done { text-decoration: line-through; opacity: 0.45; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // API & Auth 유틸
    // ========================================
    const API = '/api';

    function getToken() { return localStorage.getItem('token'); }
    function getUser()  { return JSON.parse(localStorage.getItem('user') || 'null'); }

    async function apiFetch(url, options = {}) {
      const token = getToken();
      const res = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        ...options,
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      return json.data;
    }

    // OAuth 콜백 파라미터 처리 (페이지 로드 시 1회)
    function handleOAuthCallback() {
      const params = new URLSearchParams(window.location.search);
      const token    = params.get('token');
      const username = params.get('username');
      const role     = params.get('role');
      const picture  = params.get('picture');
      const authError = params.get('auth_error');

      if (authError) {
        window.history.replaceState({}, '', '/');
        return { error: authError };
      }
      if (token) {
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify({ username, role, picture }));
        window.history.replaceState({}, '', '/');
        return { user: { username, role, picture } };
      }
      return null;
    }

    // ========================================
    // 디자인 시스템
    // ========================================
    function Avatar({ picture, username, size = 'sm' }) {
      const s = size === 'sm' ? 'w-6 h-6 text-xs' : 'w-8 h-8 text-sm';
      if (picture) return <img src={picture} alt={username} className={`${s} rounded-full object-cover`} />;
      return (
        <div className={`${s} rounded-full bg-blue-500 text-white flex items-center justify-center font-bold`}>
          {(username || '?')[0].toUpperCase()}
        </div>
      );
    }

    function Badge({ label, color = 'gray' }) {
      const colors = {
        gray: 'bg-gray-100 text-gray-500', blue: 'bg-blue-100 text-blue-600',
        green: 'bg-green-100 text-green-600', purple: 'bg-purple-100 text-purple-600',
        amber: 'bg-amber-100 text-amber-600',
      };
      return <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${colors[color]}`}>{label}</span>;
    }

    function FilterTab({ label, value, current, count, onClick }) {
      const active = current === value;
      return (
        <button onClick={() => onClick(value)}
          className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all flex items-center gap-1.5
            ${active ? 'bg-white shadow text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}>
          {label}
          <span className={`text-xs px-1.5 py-0.5 rounded-full font-semibold
            ${active ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-400'}`}>{count}</span>
        </button>
      );
    }

    function CalendarIcon({ synced }) {
      return (
        <span title={synced ? '캘린더 동기화됨' : '캘린더 미연동'}>
          <svg className={`w-3.5 h-3.5 ${synced ? 'text-blue-400' : 'text-gray-200'}`}
            fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </span>
      );
    }

    function TodoItem({ todo, isAdmin, onToggle, onDelete }) {
      const userColors = { daon: 'purple', alice: 'blue', bob: 'amber', admin: 'green' };
      const color = userColors[todo.username] || 'blue';
      const dueStr = todo.due_date ? new Date(todo.due_date).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) : null;
      const isOverdue = todo.due_date && !todo.done && new Date(todo.due_date) < new Date();

      return (
        <div className="fade-in flex items-center gap-3 p-3 bg-white rounded-xl shadow-sm hover:shadow transition-shadow group">
          {/* 체크 */}
          <button onClick={() => onToggle(todo.id)}
            className={`w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-colors
              ${todo.done ? 'bg-green-500 border-green-500' : 'border-gray-300 hover:border-green-400'}`}>
            {todo.done && (
              <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            )}
          </button>

          {/* 내용 */}
          <div className="flex-1 min-w-0">
            <span className={`text-sm text-gray-800 block truncate ${todo.done ? 'todo-done' : ''}`}>
              {todo.title}
            </span>
            {dueStr && (
              <span className={`text-xs mt-0.5 block ${isOverdue ? 'text-red-400' : 'text-gray-400'}`}>
                {isOverdue ? '⚠ ' : ''}{dueStr}
              </span>
            )}
          </div>

          {/* 캘린더 동기화 아이콘 */}
          <CalendarIcon synced={!!todo.calendar_event_id} />

          {/* admin: 작성자 뱃지 */}
          {isAdmin && (
            <div className="flex items-center gap-1">
              <Avatar picture={todo.picture} username={todo.username} size="sm" />
              <Badge label={todo.username || '?'} color={color} />
            </div>
          )}

          {/* 삭제 */}
          <button onClick={() => onDelete(todo.id)}
            className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition-all">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      );
    }

    // ========================================
    // 로그인 화면
    // ========================================
    function LoginPage({ onLogin, initError }) {
      const [mode, setMode]         = useState('login');
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError]       = useState(initError || '');
      const [loading, setLoading]   = useState(false);

      const demoAccounts = [
        { username: 'admin', label: '관리자', color: 'bg-green-50 border-green-200 text-green-700' },
        { username: 'daon',  label: '일반',   color: 'bg-purple-50 border-purple-200 text-purple-700' },
        { username: 'alice', label: '일반',   color: 'bg-blue-50 border-blue-200 text-blue-700' },
        { username: 'bob',   label: '일반',   color: 'bg-amber-50 border-amber-200 text-amber-700' },
      ];

      async function handleSubmit(e) {
        e.preventDefault();
        setError(''); setLoading(true);
        try {
          const data = await apiFetch(mode === 'login' ? `${API}/login` : `${API}/register`, {
            method: 'POST', body: JSON.stringify({ username, password }),
          });
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify({ username: data.username, role: data.role, picture: data.picture }));
          onLogin({ username: data.username, role: data.role, picture: data.picture });
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-50 px-4">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <h1 className="text-2xl font-bold text-gray-900">Todo App</h1>
              <p className="text-sm text-gray-400 mt-1">할 일을 관리하세요</p>
            </div>

            {/* 구글 로그인 버튼 */}
            <a href="/api/auth/google"
              className="flex items-center justify-center gap-3 w-full py-2.5 border border-gray-200 rounded-xl bg-white hover:bg-gray-50 transition-colors shadow-sm mb-5">
              <svg className="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span className="text-sm font-medium text-gray-700">Google로 로그인</span>
            </a>

            <div className="flex items-center gap-3 mb-5">
              <div className="flex-1 h-px bg-gray-200" />
              <span className="text-xs text-gray-400">또는</span>
              <div className="flex-1 h-px bg-gray-200" />
            </div>

            {/* 일반 로그인 탭 */}
            <div className="flex bg-gray-100 rounded-xl p-1 mb-4">
              {['login', 'register'].map(m => (
                <button key={m} onClick={() => { setMode(m); setError(''); }}
                  className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all
                    ${mode === m ? 'bg-white shadow text-gray-800' : 'text-gray-500'}`}>
                  {m === 'login' ? '로그인' : '회원가입'}
                </button>
              ))}
            </div>

            <form onSubmit={handleSubmit} className="space-y-3">
              <input type="text" placeholder="아이디" value={username} onChange={e => setUsername(e.target.value)} required
                className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white" />
              <input type="password" placeholder="비밀번호" value={password} onChange={e => setPassword(e.target.value)} required
                className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white" />
              {error && <p className="text-sm text-red-500 bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
              <button type="submit" disabled={loading}
                className="w-full py-2.5 bg-blue-500 hover:bg-blue-600 disabled:opacity-60 text-white text-sm font-medium rounded-xl transition-colors">
                {loading ? '처리 중...' : mode === 'login' ? '로그인' : '회원가입'}
              </button>
            </form>

            {mode === 'login' && (
              <div className="mt-5">
                <p className="text-xs text-gray-400 text-center mb-3">데모 계정 (비밀번호: 1234)</p>
                <div className="grid grid-cols-2 gap-2">
                  {demoAccounts.map(acc => (
                    <button key={acc.username}
                      onClick={() => { setUsername(acc.username); setPassword('1234'); }}
                      className={`border rounded-lg px-3 py-2 text-xs font-medium text-left hover:shadow-sm transition-all ${acc.color}`}>
                      <span className="font-bold">{acc.username}</span>
                      <span className="ml-1 opacity-70">({acc.label})</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Todo 화면
    // ========================================
    function TodoPage({ user, onLogout }) {
      const [todos, setTodos]     = useState([]);
      const [input, setInput]     = useState('');
      const [dueDate, setDueDate] = useState('');
      const [filter, setFilter]   = useState('all');
      const [loading, setLoading] = useState(true);
      const [error, setError]     = useState('');
      const isAdmin = user.role === 'admin';

      const fetchTodos = useCallback(async () => {
        try {
          const data = await apiFetch(`${API}/todos`);
          setTodos(data);
        } catch (e) {
          if (e.message.includes('로그인')) onLogout();
          else setError('데이터를 불러오지 못했습니다.');
        } finally { setLoading(false); }
      }, []);

      useEffect(() => { fetchTodos(); }, [fetchTodos]);

      async function handleAdd(e) {
        e.preventDefault();
        if (!input.trim()) return;
        try {
          const newTodo = await apiFetch(`${API}/todos`, {
            method: 'POST', body: JSON.stringify({ title: input, due_date: dueDate || undefined }),
          });
          setTodos(prev => [newTodo, ...prev]);
          setInput(''); setDueDate('');
        } catch (e) { setError(e.message); }
      }

      async function handleToggle(id) {
        try {
          const updated = await apiFetch(`${API}/todos/${id}`, { method: 'PATCH' });
          setTodos(prev => prev.map(t => t.id === id ? { ...t, done: updated.done, calendar_event_id: updated.calendar_event_id } : t));
        } catch (e) { setError(e.message); }
      }

      async function handleDelete(id) {
        try {
          await apiFetch(`${API}/todos/${id}`, { method: 'DELETE' });
          setTodos(prev => prev.filter(t => t.id !== id));
        } catch (e) { setError(e.message); }
      }

      const filtered = todos.filter(t =>
        filter === 'active' ? !t.done : filter === 'done' ? t.done : true
      );
      const total  = todos.length;
      const done   = todos.filter(t => t.done).length;
      const active = total - done;
      const synced = todos.filter(t => t.calendar_event_id).length;

      return (
        <div className="max-w-md mx-auto pt-12 px-4 pb-16">
          {/* 헤더 */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <h1 className="text-2xl font-bold text-gray-900">할 일 목록</h1>
              <div className="flex items-center gap-2 mt-1">
                <p className="text-sm text-gray-400">
                  {total > 0 ? `총 ${total}개 · 완료 ${done}개` : '아직 할 일이 없어요'}
                </p>
                {isAdmin && <Badge label="관리자" color="green" />}
                {synced > 0 && (
                  <span className="flex items-center gap-0.5 text-xs text-blue-400">
                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    {synced}개 캘린더 연동
                  </span>
                )}
              </div>
            </div>
            <button onClick={onLogout}
              className="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">
              <Avatar picture={user.picture} username={user.username} size="md" />
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
            </button>
          </div>

          {/* 입력 폼 */}
          <form onSubmit={handleAdd} className="bg-white rounded-2xl shadow-sm p-4 mb-5 space-y-3">
            <div className="flex gap-2">
              <input type="text" value={input} onChange={e => setInput(e.target.value)}
                placeholder="할 일을 입력하세요..."
                className="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
              <button type="submit"
                className="px-4 py-2.5 bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium rounded-xl transition-colors">
                추가
              </button>
            </div>
            <div className="flex items-center gap-2">
              <svg className="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                className="flex-1 px-3 py-2 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 text-gray-600" />
              <span className="text-xs text-gray-400">마감일 (선택)</span>
            </div>
          </form>

          {/* 필터 탭 */}
          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl mb-4">
            <FilterTab label="전체"   value="all"    current={filter} count={total}  onClick={setFilter} />
            <FilterTab label="진행중" value="active" current={filter} count={active} onClick={setFilter} />
            <FilterTab label="완료"   value="done"   current={filter} count={done}   onClick={setFilter} />
          </div>

          {/* 오류 */}
          {error && (
            <div className="mb-4 p-3 bg-red-50 text-red-500 text-sm rounded-xl flex justify-between">
              {error}
              <button onClick={() => setError('')} className="text-red-300 hover:text-red-500 ml-2">✕</button>
            </div>
          )}

          {/* 목록 */}
          {loading ? (
            <div className="text-center py-12 text-gray-400 text-sm">불러오는 중...</div>
          ) : filtered.length === 0 ? (
            <div className="text-center py-12 text-gray-300 text-sm">
              {filter === 'all' ? '할 일을 추가해보세요!' : '해당 항목이 없어요.'}
            </div>
          ) : (
            <div className="flex flex-col gap-2">
              {filtered.map(todo => (
                <TodoItem key={todo.id} todo={todo} isAdmin={isAdmin}
                  onToggle={handleToggle} onDelete={handleDelete} />
              ))}
            </div>
          )}

          {/* 완료 일괄 삭제 */}
          {done > 0 && (
            <button onClick={async () => {
              const doneTodos = todos.filter(t => t.done);
              await Promise.all(doneTodos.map(t => apiFetch(`${API}/todos/${t.id}`, { method: 'DELETE' })));
              setTodos(prev => prev.filter(t => !t.done));
            }} className="mt-6 w-full py-2 text-sm text-gray-400 hover:text-red-400 transition-colors">
              완료된 항목 모두 삭제 ({done}개)
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // App — 로그인 상태 관리
    // ========================================
    function App() {
      const [user, setUser]       = useState(null);
      const [initError, setInitError] = useState('');

      useEffect(() => {
        // OAuth 콜백 처리
        const result = handleOAuthCallback();
        if (result?.user)  { setUser(result.user); return; }
        if (result?.error) { setInitError(result.error); }
        // 기존 로그인 복원
        const saved = getUser();
        if (saved && getToken()) setUser(saved);
      }, []);

      function handleLogout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        setUser(null);
      }

      if (!user) return <LoginPage onLogin={setUser} initError={initError} />;
      return <TodoPage user={user} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
