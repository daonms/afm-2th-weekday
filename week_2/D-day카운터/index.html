<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day 카운터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 400px; }
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
    .card-gradient-past { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .card-gradient-future { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
    .card-gradient-today { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 50%, #f0932b 100%); }
    .input-dark {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: all 0.2s ease;
    }
    .input-dark:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ========================================
    // 2. Utility Functions
    // ========================================
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function calculateDday(targetDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(targetDate);
      target.setHours(0, 0, 0, 0);
      const diffTime = target.getTime() - today.getTime();
      const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
      return diffDays;
    }

    function formatDday(days) {
      if (days === 0) return 'D-Day!';
      if (days > 0) return `D-${days}`;
      return `D+${Math.abs(days)}`;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      const weekday = weekdays[date.getDay()];
      return `${year}년 ${month}월 ${day}일 (${weekday})`;
    }

    function loadFromStorage() {
      try {
        const data = localStorage.getItem('dday-items');
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveToStorage(items) {
      localStorage.setItem('dday-items', JSON.stringify(items));
    }

    // ========================================
    // 3. Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', onClick, disabled, className = '' }) {
      const baseClass = 'font-semibold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-500 hover:bg-indigo-400 text-white shadow-lg shadow-indigo-500/25',
        secondary: 'bg-white/10 hover:bg-white/15 text-white/80 backdrop-blur-sm',
        danger: 'bg-red-500/20 hover:bg-red-500/30 text-red-400',
        ghost: 'bg-transparent hover:bg-white/5 text-white/50 hover:text-white/70',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-7 py-3.5 text-lg',
      };
      return (
        <button
          className={`${baseClass} ${variants[variant]} ${sizes[size]} ${className}`}
          onClick={onClick}
          disabled={disabled}
        >
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, className = '' }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && (
            <label className="text-sm font-medium text-white/50 pl-1">{label}</label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className="input-dark rounded-xl px-4 py-3 text-white placeholder-white/30 outline-none text-base"
          />
        </div>
      );
    }

    function Card({ children, className = '', onClick }) {
      return (
        <div
          className={`rounded-2xl p-5 backdrop-blur-sm ${className}`}
          onClick={onClick}
        >
          {children}
        </div>
      );
    }

    function EmptyState({ onAdd }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
          <button
            onClick={onAdd}
            className="w-28 h-28 rounded-full bg-indigo-500 hover:bg-indigo-400 active:scale-95 shadow-2xl shadow-indigo-500/40 flex items-center justify-center transition-all duration-300 mb-8"
            aria-label="추가"
          >
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" className="text-white">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <p className="text-white/30 text-lg font-medium mb-2">등록된 D-Day가 없습니다</p>
          <p className="text-white/20 text-sm">버튼을 눌러 새로운 D-Day를 추가해보세요</p>
        </div>
      );
    }

    // ========================================
    // 4. DdayCard Component
    // ========================================
    function DdayCard({ item, onDelete, index }) {
      const days = calculateDday(item.date);
      const isToday = days === 0;
      const isPast = days < 0;
      const isFuture = days > 0;

      const gradientClass = isToday
        ? 'card-gradient-today'
        : isPast
        ? 'card-gradient-past'
        : 'card-gradient-future';

      const ddayText = formatDday(days);

      const ddayColor = isToday
        ? 'text-white'
        : isPast
        ? 'text-blue-300'
        : 'text-emerald-300';

      return (
        <div
          className="animate-fade-in"
          style={{ animationDelay: `${index * 0.06}s`, opacity: 0 }}
        >
          <Card className={`${gradientClass} border border-white/5 hover:border-white/10 transition-all duration-300 group relative overflow-hidden`}>
            {isToday && (
              <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent animate-pulse" />
            )}
            <div className="relative flex items-center justify-between gap-4">
              <div className="flex-1 min-w-0">
                <h3 className="text-white font-semibold text-lg truncate mb-1">
                  {item.title}
                </h3>
                <p className="text-white/40 text-sm">
                  {formatDate(item.date)}
                </p>
              </div>
              <div className="flex items-center gap-3 shrink-0">
                <div className={`text-right`}>
                  <p className={`text-3xl font-bold tracking-tight ${ddayColor}`}>
                    {ddayText}
                  </p>
                  {isFuture && (
                    <p className="text-white/30 text-xs mt-0.5">{days}일 남음</p>
                  )}
                  {isPast && (
                    <p className="text-white/30 text-xs mt-0.5">{Math.abs(days)}일 지남</p>
                  )}
                </div>
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onDelete(item.id);
                  }}
                  className="opacity-0 group-hover:opacity-100 transition-opacity duration-200 p-2 rounded-full hover:bg-white/10 text-white/30 hover:text-red-400"
                  aria-label="삭제"
                >
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 5. AddDdayForm Component
    // ========================================
    function AddDdayForm({ onAdd, onCancel }) {
      const [title, setTitle] = useState('');
      const [date, setDate] = useState('');
      const titleRef = useRef(null);

      useEffect(() => {
        if (titleRef.current) titleRef.current.focus();
      }, []);

      const handleSubmit = useCallback((e) => {
        e.preventDefault();
        if (!title.trim() || !date) return;
        onAdd({ title: title.trim(), date });
        setTitle('');
        setDate('');
      }, [title, date, onAdd]);

      const todayStr = new Date().toISOString().split('T')[0];

      return (
        <div className="animate-slide-down">
          <Card className="bg-white/[0.04] border border-white/10">
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="flex flex-col gap-1.5">
                <label className="text-sm font-medium text-white/50 pl-1">이벤트 이름</label>
                <input
                  ref={titleRef}
                  type="text"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  placeholder="예: 생일, 시험, 여행..."
                  className="input-dark rounded-xl px-4 py-3 text-white placeholder-white/30 outline-none text-base"
                  maxLength={50}
                />
              </div>
              <div className="flex flex-col gap-1.5">
                <label className="text-sm font-medium text-white/50 pl-1">날짜</label>
                <input
                  type="date"
                  value={date}
                  onChange={(e) => setDate(e.target.value)}
                  className="input-dark rounded-xl px-4 py-3 text-white outline-none text-base [color-scheme:dark]"
                />
              </div>
              <div className="flex gap-3 pt-1">
                <Button
                  type="submit"
                  variant="primary"
                  className="flex-1"
                  disabled={!title.trim() || !date}
                >
                  추가하기
                </Button>
                <Button
                  variant="ghost"
                  onClick={onCancel}
                  className="px-6"
                >
                  취소
                </Button>
              </div>
            </form>
          </Card>
        </div>
      );
    }

    // ========================================
    // 6. App Component
    // ========================================
    function App() {
      const [items, setItems] = useState(() => loadFromStorage());
      const [showForm, setShowForm] = useState(false);
      const [sortBy, setSortBy] = useState('date-asc');

      useEffect(() => {
        saveToStorage(items);
      }, [items]);

      const handleAdd = useCallback((newItem) => {
        setItems((prev) => [...prev, { ...newItem, id: generateId(), createdAt: Date.now() }]);
        setShowForm(false);
      }, []);

      const handleDelete = useCallback((id) => {
        setItems((prev) => prev.filter((item) => item.id !== id));
      }, []);

      const sortedItems = useMemo(() => {
        const sorted = [...items];
        switch (sortBy) {
          case 'date-asc':
            sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
            break;
          case 'date-desc':
            sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
            break;
          case 'dday':
            sorted.sort((a, b) => Math.abs(calculateDday(a.date)) - Math.abs(calculateDday(b.date)));
            break;
          default:
            break;
        }
        return sorted;
      }, [items, sortBy]);

      const stats = useMemo(() => {
        const today = items.filter((i) => calculateDday(i.date) === 0).length;
        const upcoming = items.filter((i) => calculateDday(i.date) > 0).length;
        const past = items.filter((i) => calculateDday(i.date) < 0).length;
        return { today, upcoming, past, total: items.length };
      }, [items]);

      return (
        <div className="min-h-screen bg-black text-white">
          {/* Header */}
          <header className="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5">
            <div className="max-w-lg mx-auto px-5 py-4 flex items-center justify-between">
              <div>
                <h1 className="text-xl font-bold tracking-tight">D-Day</h1>
                <p className="text-white/30 text-xs mt-0.5">
                  {stats.total > 0 ? `${stats.total}개의 이벤트` : '카운터'}
                </p>
              </div>
              <button
                onClick={() => setShowForm(!showForm)}
                className={`w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 ${
                  showForm
                    ? 'bg-white/10 rotate-45'
                    : 'bg-indigo-500 hover:bg-indigo-400 shadow-lg shadow-indigo-500/30'
                }`}
                aria-label={showForm ? '닫기' : '추가'}
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-lg mx-auto px-5 py-6 space-y-4">
            {/* Add Form */}
            {showForm && (
              <AddDdayForm
                onAdd={handleAdd}
                onCancel={() => setShowForm(false)}
              />
            )}

            {/* Stats Bar */}
            {stats.total > 0 && (
              <div className="flex items-center justify-between">
                <div className="flex gap-3 text-xs">
                  {stats.today > 0 && (
                    <span className="bg-orange-500/20 text-orange-300 px-2.5 py-1 rounded-full">
                      D-Day {stats.today}
                    </span>
                  )}
                  {stats.upcoming > 0 && (
                    <span className="bg-emerald-500/15 text-emerald-400/70 px-2.5 py-1 rounded-full">
                      예정 {stats.upcoming}
                    </span>
                  )}
                  {stats.past > 0 && (
                    <span className="bg-blue-500/15 text-blue-400/70 px-2.5 py-1 rounded-full">
                      지남 {stats.past}
                    </span>
                  )}
                </div>
                <select
                  value={sortBy}
                  onChange={(e) => setSortBy(e.target.value)}
                  className="bg-white/5 border border-white/10 rounded-lg px-2.5 py-1 text-xs text-white/50 outline-none cursor-pointer [color-scheme:dark]"
                >
                  <option value="date-asc">날짜순</option>
                  <option value="date-desc">최신순</option>
                  <option value="dday">임박순</option>
                </select>
              </div>
            )}

            {/* D-Day List */}
            {sortedItems.length === 0 ? (
              <EmptyState onAdd={() => setShowForm(true)} />
            ) : (
              <div className="space-y-3">
                {sortedItems.map((item, index) => (
                  <DdayCard
                    key={item.id}
                    item={item}
                    onDelete={handleDelete}
                    index={index}
                  />
                ))}
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="max-w-lg mx-auto px-5 py-8 text-center">
            <p className="text-white/15 text-xs">D-Day Counter</p>
          </footer>
        </div>
      );
    }

    // ========================================
    // 7. Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
