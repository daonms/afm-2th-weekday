<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 제목 태그 가이드 - Apple Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }

    .gradient-text-blue {
      background: linear-gradient(135deg, #6e8efb, #a777e3, #6e8efb);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
    }

    .gradient-text-warm {
      background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
    }

    .gradient-text-cool {
      background: linear-gradient(135deg, #00c6ff, #0072ff, #00c6ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4.5s ease infinite;
    }

    .gradient-text-pink {
      background: linear-gradient(135deg, #f953c6, #b91d73, #f953c6);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3.5s ease infinite;
    }

    .gradient-text-green {
      background: linear-gradient(135deg, #11998e, #38ef7d, #11998e);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5.5s ease infinite;
    }

    .gradient-text-silver {
      background: linear-gradient(135deg, #bdc3c7, #ecf0f1, #bdc3c7);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in-up {
      animation: fadeInUp 0.8s ease forwards;
      opacity: 0;
    }

    .heading-card {
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .heading-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .tag-pill {
      transition: all 0.3s ease;
    }

    .tag-pill:hover {
      transform: scale(1.05);
    }

    .divider-glow {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef } = React;

    // ========================================
    // Design System - Heading Data
    // ========================================
    const headingsData = [
      {
        level: 1,
        tag: "h1",
        title: "페이지의 대표 제목",
        description: "웹 페이지에서 가장 중요한 제목입니다. 페이지당 하나만 사용하며, 검색 엔진이 가장 먼저 읽는 핵심 콘텐츠입니다.",
        usage: "페이지 최상단 메인 타이틀",
        example: "iPhone 16 Pro",
        gradientClass: "gradient-text-blue",
        fontSize: "text-6xl md:text-8xl lg:text-9xl",
        fontWeight: "font-black",
        letterSpacing: "tracking-tighter",
        borderColor: "border-purple-500/30",
        bgHover: "hover:bg-purple-500/5",
      },
      {
        level: 2,
        tag: "h2",
        title: "주요 섹션 제목",
        description: "페이지의 큰 섹션을 구분하는 제목입니다. h1 아래에서 콘텐츠를 논리적으로 나눌 때 사용합니다.",
        usage: "주요 콘텐츠 영역 구분",
        example: "혁신적인 카메라 시스템",
        gradientClass: "gradient-text-warm",
        fontSize: "text-5xl md:text-7xl lg:text-8xl",
        fontWeight: "font-extrabold",
        letterSpacing: "tracking-tight",
        borderColor: "border-amber-500/30",
        bgHover: "hover:bg-amber-500/5",
      },
      {
        level: 3,
        tag: "h3",
        title: "하위 섹션 제목",
        description: "h2 섹션 내부의 세부 주제를 나눌 때 사용합니다. 블로그 글의 소제목이나 기능 설명에 적합합니다.",
        usage: "세부 기능 또는 소제목",
        example: "48MP 메인 카메라의 진화",
        gradientClass: "gradient-text-cool",
        fontSize: "text-4xl md:text-5xl lg:text-6xl",
        fontWeight: "font-bold",
        letterSpacing: "tracking-tight",
        borderColor: "border-blue-500/30",
        bgHover: "hover:bg-blue-500/5",
      },
      {
        level: 4,
        tag: "h4",
        title: "소주제 제목",
        description: "더 세분화된 내용의 제목입니다. 카드 컴포넌트의 타이틀이나 FAQ 항목 등에 활용됩니다.",
        usage: "카드 제목, FAQ 항목",
        example: "ProRes 비디오 촬영 지원",
        gradientClass: "gradient-text-pink",
        fontSize: "text-3xl md:text-4xl lg:text-5xl",
        fontWeight: "font-bold",
        letterSpacing: "tracking-normal",
        borderColor: "border-pink-500/30",
        bgHover: "hover:bg-pink-500/5",
      },
      {
        level: 5,
        tag: "h5",
        title: "보조 제목",
        description: "부가 정보나 사이드바의 제목으로 사용됩니다. 메인 콘텐츠보다 보조적인 역할을 합니다.",
        usage: "사이드바, 보조 정보 영역",
        example: "기술 사양 비교",
        gradientClass: "gradient-text-green",
        fontSize: "text-2xl md:text-3xl lg:text-4xl",
        fontWeight: "font-semibold",
        letterSpacing: "tracking-normal",
        borderColor: "border-emerald-500/30",
        bgHover: "hover:bg-emerald-500/5",
      },
      {
        level: 6,
        tag: "h6",
        title: "가장 작은 제목",
        description: "제목 태그 중 가장 낮은 수준입니다. 푸터 영역이나 캡션, 메타 정보 등에 드물게 사용됩니다.",
        usage: "푸터, 캡션, 메타 정보",
        example: "법적 고지 및 각주",
        gradientClass: "gradient-text-silver",
        fontSize: "text-xl md:text-2xl lg:text-3xl",
        fontWeight: "font-medium",
        letterSpacing: "tracking-wide",
        borderColor: "border-gray-500/30",
        bgHover: "hover:bg-gray-500/5",
      },
    ];

    // ========================================
    // Design System Components
    // ========================================
    function TagPill({ tag, borderColor }) {
      return (
        <span className={`tag-pill inline-block px-4 py-1.5 rounded-full border ${borderColor} text-xs font-mono text-gray-400 bg-white/5 backdrop-blur-sm`}>
          &lt;{tag}&gt;
        </span>
      );
    }

    function UsageBadge({ text }) {
      return (
        <span className="inline-block px-3 py-1 rounded-md bg-white/5 text-xs text-gray-500 font-medium">
          {text}
        </span>
      );
    }

    function Divider() {
      return <div className="divider-glow my-4" />;
    }

    // ========================================
    // Intersection Observer Hook
    // ========================================
    function useInView(threshold = 0.15) {
      const ref = useRef(null);
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          },
          { threshold }
        );

        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [threshold]);

      return [ref, isVisible];
    }

    // ========================================
    // Page Components
    // ========================================
    function HeroSection() {
      const [ref, isVisible] = useInView(0.1);

      return (
        <section
          ref={ref}
          className={`min-h-screen flex flex-col items-center justify-center px-6 text-center ${isVisible ? 'fade-in-up' : 'opacity-0'}`}
          style={{ animationDelay: '0.2s' }}
        >
          <p className="text-gray-500 text-sm tracking-widest uppercase mb-6">
            HTML Heading Elements
          </p>
          <h1 className="text-5xl md:text-7xl lg:text-9xl font-black tracking-tighter text-white leading-none mb-6">
            제목 태그
            <br />
            <span className="gradient-text-blue">완벽 가이드</span>
          </h1>
          <p className="text-gray-400 text-lg md:text-xl max-w-2xl leading-relaxed mt-4">
            h1부터 h6까지, 웹 페이지의 구조를 만드는<br className="hidden md:block" />
            HTML 제목 태그의 모든 것을 살펴봅니다.
          </p>
          <div className="mt-12 animate-bounce">
            <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
          </div>
        </section>
      );
    }

    function HeadingCard({ data, index }) {
      const [ref, isVisible] = useInView(0.15);
      const delay = `${index * 0.1}s`;

      return (
        <div
          ref={ref}
          className={`heading-card rounded-3xl border ${data.borderColor} bg-white/[0.02] backdrop-blur-sm p-8 md:p-12 lg:p-16 ${data.bgHover} ${isVisible ? 'fade-in-up' : 'opacity-0'}`}
          style={{ animationDelay: delay }}
        >
          {/* Top meta */}
          <div className="flex items-center gap-3 mb-8">
            <TagPill tag={data.tag} borderColor={data.borderColor} />
            <UsageBadge text={data.usage} />
            <span className="text-gray-600 text-xs font-mono ml-auto">
              Level {data.level}/6
            </span>
          </div>

          {/* Example heading */}
          <div className={`${data.fontSize} ${data.fontWeight} ${data.letterSpacing} ${data.gradientClass} leading-tight mb-8`}>
            {data.example}
          </div>

          <Divider />

          {/* Info */}
          <div className="mt-8 grid md:grid-cols-2 gap-6">
            <div>
              <h3 className="text-white font-semibold text-lg mb-2">{data.title}</h3>
              <p className="text-gray-400 text-sm leading-relaxed">{data.description}</p>
            </div>
            <div className="flex flex-col justify-end">
              <div className="bg-white/5 rounded-xl p-4 font-mono text-sm text-gray-500">
                <span className="text-gray-600">&lt;</span>
                <span className="text-blue-400">{data.tag}</span>
                <span className="text-gray-600">&gt;</span>
                <span className="text-gray-300">{data.example}</span>
                <span className="text-gray-600">&lt;/</span>
                <span className="text-blue-400">{data.tag}</span>
                <span className="text-gray-600">&gt;</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SizeComparisonSection() {
      const [ref, isVisible] = useInView(0.1);

      return (
        <section
          ref={ref}
          className={`py-24 px-6 ${isVisible ? 'fade-in-up' : 'opacity-0'}`}
          style={{ animationDelay: '0.1s' }}
        >
          <div className="max-w-5xl mx-auto text-center mb-16">
            <p className="text-gray-500 text-sm tracking-widest uppercase mb-4">Size Comparison</p>
            <h2 className="text-4xl md:text-6xl font-bold tracking-tight text-white">
              한눈에 보는 <span className="gradient-text-warm">크기 비교</span>
            </h2>
          </div>
          <div className="max-w-5xl mx-auto space-y-6">
            {headingsData.map((h) => (
              <div key={h.level} className="flex items-baseline gap-4 group">
                <span className="text-gray-600 font-mono text-xs w-8 shrink-0">{h.tag}</span>
                <div
                  className={`${h.gradientClass} ${h.fontWeight} ${h.letterSpacing} transition-all duration-300 group-hover:tracking-normal`}
                  style={{ fontSize: `${3.5 - (h.level - 1) * 0.45}rem` }}
                >
                  {h.example}
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="py-16 px-6 text-center border-t border-white/5">
          <p className="text-gray-600 text-sm">
            HTML Heading Tags Guide &middot; React 18 &middot; Apple-Inspired Design
          </p>
          <p className="text-gray-700 text-xs mt-2">
            2026 &middot; AFM 부트캠프 2기 평일반
          </p>
        </footer>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      return (
        <div className="min-h-screen bg-black text-white selection:bg-purple-500/30">
          <HeroSection />

          {/* Heading Cards */}
          <section className="max-w-5xl mx-auto px-6 space-y-8 pb-24">
            {headingsData.map((data, i) => (
              <HeadingCard key={data.level} data={data} index={i} />
            ))}
          </section>

          <SizeComparisonSection />
          <Footer />
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
