<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이폰 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calc-btn {
      transition: filter 0.1s ease, transform 0.05s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .calc-btn:active {
      filter: brightness(1.4);
      transform: scale(0.95);
    }

    .calc-btn-orange:active {
      filter: brightness(1.3);
      transform: scale(0.95);
    }

    .calc-btn-light:active {
      filter: brightness(0.85);
      transform: scale(0.95);
    }

    /* Display text shrink animation */
    .display-text {
      transition: font-size 0.15s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const { useState, useCallback, useMemo } = React;

    // ========================================
    // 2. 🎨 Design System Components
    // ========================================

    // Calculator Button — pure presentational
    function CalcButton({ label, onClick, variant = "dark", wide = false, className = "" }) {
      const baseClasses = "calc-btn flex items-center justify-center rounded-full text-3xl font-light cursor-pointer";

      const variantClasses = {
        dark: "bg-[#333333] text-white calc-btn",
        light: "bg-[#a5a5a5] text-black calc-btn-light",
        orange: "bg-[#ff9f0a] text-white calc-btn-orange",
        orangeActive: "bg-white text-[#ff9f0a] calc-btn-orange",
      };

      const sizeClasses = wide
        ? "h-20 col-span-2 rounded-full px-8 justify-start"
        : "h-20 w-20";

      return (
        <button
          className={`${baseClasses} ${variantClasses[variant] || variantClasses.dark} ${sizeClasses} ${className}`}
          onClick={() => onClick(label)}
          aria-label={label}
        >
          {label}
        </button>
      );
    }

    // Display component
    function Display({ value }) {
      const fontSize = useMemo(() => {
        const len = value.length;
        if (len <= 6) return "text-[5.5rem]";
        if (len <= 7) return "text-[4.8rem]";
        if (len <= 8) return "text-[4.2rem]";
        if (len <= 9) return "text-[3.6rem]";
        return "text-[3rem]";
      }, [value]);

      return (
        <div className="w-full text-right pr-2 pb-3 overflow-hidden" aria-live="polite">
          <span className={`display-text text-white font-light leading-none ${fontSize}`}>
            {value}
          </span>
        </div>
      );
    }

    // ========================================
    // 3. 📄 Calculator Logic & Page Component
    // ========================================

    function Calculator() {
      const [display, setDisplay] = useState("0");
      const [previousValue, setPreviousValue] = useState(null);
      const [operator, setOperator] = useState(null);
      const [waitingForOperand, setWaitingForOperand] = useState(false);
      const [activeOp, setActiveOp] = useState(null);
      const [justEvaluated, setJustEvaluated] = useState(false);

      // Format number for display
      const formatDisplay = useCallback((numStr) => {
        if (numStr === "오류") return "오류";

        // Handle decimal point case
        const hasDecimal = numStr.includes(".");
        let [intPart, decPart] = numStr.split(".");

        // Remove leading negative for formatting
        const isNeg = intPart.startsWith("-");
        if (isNeg) intPart = intPart.substring(1);

        // Add thousand separators
        intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        if (isNeg) intPart = "-" + intPart;

        return hasDecimal ? `${intPart}.${decPart}` : intPart;
      }, []);

      // Get raw number from display
      const getRawValue = useCallback((formatted) => {
        return formatted.replace(/,/g, "");
      }, []);

      // Perform calculation
      const calculate = useCallback((left, op, right) => {
        const l = parseFloat(left);
        const r = parseFloat(right);
        let result;

        switch (op) {
          case "+": result = l + r; break;
          case "-": result = l - r; break;
          case "×": result = l * r; break;
          case "÷":
            if (r === 0) return "오류";
            result = l / r;
            break;
          default: return right;
        }

        // Handle floating point precision
        const resultStr = parseFloat(result.toPrecision(12)).toString();

        // Limit display length
        if (resultStr.replace("-", "").replace(".", "").length > 9) {
          const formatted = parseFloat(result).toExponential(5);
          return formatted;
        }

        return resultStr;
      }, []);

      // Handle number input
      const inputDigit = useCallback((digit) => {
        const raw = getRawValue(display);

        if (waitingForOperand || justEvaluated) {
          setDisplay(digit);
          setWaitingForOperand(false);
          if (justEvaluated) {
            setPreviousValue(null);
            setOperator(null);
            setActiveOp(null);
          }
          setJustEvaluated(false);
          return;
        }

        if (raw === "0") {
          setDisplay(digit);
        } else {
          // Limit to 9 digits
          const rawDigits = raw.replace("-", "").replace(".", "");
          if (rawDigits.length >= 9) return;
          setDisplay(formatDisplay(raw + digit));
        }
      }, [display, waitingForOperand, justEvaluated, formatDisplay, getRawValue]);

      // Handle decimal point
      const inputDecimal = useCallback(() => {
        const raw = getRawValue(display);

        if (waitingForOperand || justEvaluated) {
          setDisplay("0.");
          setWaitingForOperand(false);
          setJustEvaluated(false);
          if (justEvaluated) {
            setPreviousValue(null);
            setOperator(null);
            setActiveOp(null);
          }
          return;
        }

        if (!raw.includes(".")) {
          setDisplay(formatDisplay(raw) + ".");
        }
      }, [display, waitingForOperand, justEvaluated, formatDisplay, getRawValue]);

      // Handle operator
      const handleOperator = useCallback((nextOp) => {
        const raw = getRawValue(display);

        if (previousValue !== null && operator && !waitingForOperand && !justEvaluated) {
          const result = calculate(previousValue, operator, raw);
          if (result === "오류") {
            setDisplay("오류");
            setPreviousValue(null);
            setOperator(null);
            setActiveOp(null);
            setWaitingForOperand(true);
            setJustEvaluated(false);
            return;
          }
          setDisplay(formatDisplay(result));
          setPreviousValue(result);
        } else {
          setPreviousValue(raw);
        }

        setOperator(nextOp);
        setActiveOp(nextOp);
        setWaitingForOperand(true);
        setJustEvaluated(false);
      }, [display, previousValue, operator, waitingForOperand, justEvaluated, calculate, formatDisplay, getRawValue]);

      // Handle equals
      const handleEquals = useCallback(() => {
        const raw = getRawValue(display);

        if (previousValue === null || operator === null) return;

        const operand = waitingForOperand ? previousValue : raw;
        const result = calculate(previousValue, operator, operand);

        if (result === "오류") {
          setDisplay("오류");
          setPreviousValue(null);
          setOperator(null);
          setActiveOp(null);
          setWaitingForOperand(false);
          setJustEvaluated(false);
          return;
        }

        setDisplay(formatDisplay(result));
        setPreviousValue(result);
        setActiveOp(null);
        setWaitingForOperand(false);
        setJustEvaluated(true);
      }, [display, previousValue, operator, waitingForOperand, calculate, formatDisplay, getRawValue]);

      // Handle clear
      const handleClear = useCallback(() => {
        setDisplay("0");
        setPreviousValue(null);
        setOperator(null);
        setWaitingForOperand(false);
        setActiveOp(null);
        setJustEvaluated(false);
      }, []);

      // Handle +/-
      const handleNegate = useCallback(() => {
        const raw = getRawValue(display);
        if (raw === "0") return;

        if (raw.startsWith("-")) {
          setDisplay(formatDisplay(raw.substring(1)));
        } else {
          setDisplay(formatDisplay("-" + raw));
        }
      }, [display, formatDisplay, getRawValue]);

      // Handle percent
      const handlePercent = useCallback(() => {
        const raw = getRawValue(display);
        const value = parseFloat(raw);
        const result = (value / 100).toString();
        setDisplay(formatDisplay(result));
      }, [display, formatDisplay, getRawValue]);

      // Determine if AC or C should show
      const clearLabel = display === "0" && !previousValue ? "AC" : "C";

      // Handle button press
      const handleButton = useCallback((label) => {
        if (display === "오류" && label !== "AC" && label !== "C") {
          handleClear();
        }

        switch (label) {
          case "0": case "1": case "2": case "3": case "4":
          case "5": case "6": case "7": case "8": case "9":
            inputDigit(label);
            break;
          case ".":
            inputDecimal();
            break;
          case "+": case "-": case "×": case "÷":
            handleOperator(label);
            break;
          case "=":
            handleEquals();
            break;
          case "AC": case "C":
            handleClear();
            break;
          case "+/-":
            handleNegate();
            break;
          case "%":
            handlePercent();
            break;
        }
      }, [display, inputDigit, inputDecimal, handleOperator, handleEquals, handleClear, handleNegate, handlePercent]);

      // Format display value
      const displayValue = useMemo(() => {
        const raw = getRawValue(display);
        if (raw === "오류") return "오류";
        if (display.endsWith(".")) return formatDisplay(raw) + ".";
        return formatDisplay(raw);
      }, [display, formatDisplay, getRawValue]);

      // Button layout
      const buttons = [
        { label: clearLabel, variant: "light" },
        { label: "+/-", variant: "light" },
        { label: "%", variant: "light" },
        { label: "÷", variant: activeOp === "÷" ? "orangeActive" : "orange" },
        { label: "7", variant: "dark" },
        { label: "8", variant: "dark" },
        { label: "9", variant: "dark" },
        { label: "×", variant: activeOp === "×" ? "orangeActive" : "orange" },
        { label: "4", variant: "dark" },
        { label: "5", variant: "dark" },
        { label: "6", variant: "dark" },
        { label: "-", variant: activeOp === "-" ? "orangeActive" : "orange" },
        { label: "1", variant: "dark" },
        { label: "2", variant: "dark" },
        { label: "3", variant: "dark" },
        { label: "+", variant: activeOp === "+" ? "orangeActive" : "orange" },
        { label: "0", variant: "dark", wide: true },
        { label: ".", variant: "dark" },
        { label: "=", variant: "orange" },
      ];

      return (
        <div className="w-[340px] bg-black rounded-[40px] p-5 pt-12 pb-8 shadow-2xl" role="application" aria-label="계산기">
          {/* Display */}
          <Display value={displayValue} />

          {/* Button Grid */}
          <div className="grid grid-cols-4 gap-3">
            {buttons.map((btn, i) => (
              <CalcButton
                key={`${btn.label}-${i}`}
                label={btn.label}
                variant={btn.variant}
                wide={btn.wide}
                onClick={handleButton}
              />
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 4. 🚀 App Component
    // ========================================

    function App() {
      return (
        <div className="min-h-screen bg-black flex items-center justify-center p-4">
          <Calculator />
        </div>
      );
    }

    // ========================================
    // 5. Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
