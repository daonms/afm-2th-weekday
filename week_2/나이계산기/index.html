<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만 나이 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans KR', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-black text-gray-100 min-h-screen font-sans antialiased">

    <!-- 네비게이션 바 -->
    <nav class="fixed top-0 w-full px-10 py-3 bg-black/80 backdrop-blur-xl backdrop-saturate-150 z-50 flex justify-center border-b border-white/10">
        <span class="text-sm text-gray-500 tracking-tight">만 나이 계산기</span>
    </nav>

    <!-- 히어로 섹션 -->
    <section class="pt-44 pb-24 px-10 text-center max-w-5xl mx-auto">
        <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight bg-gradient-to-br from-white to-gray-500 bg-clip-text text-transparent mb-5">
            만 나이 계산기
        </h1>
        <p class="text-lg md:text-2xl font-light text-gray-500 tracking-tight leading-relaxed">
            생년월일을 입력하면 만 나이를 알려드립니다
        </p>
    </section>

    <!-- 계산기 섹션 -->
    <section class="max-w-3xl mx-auto px-10 pb-28">

        <!-- 입력 카드 -->
        <div class="p-12 bg-neutral-900 rounded-3xl">
            <h2 class="text-3xl font-semibold mb-8 bg-gradient-to-br from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                생년월일 입력
            </h2>

            <!-- 생년월일 input -->
            <label for="birthday" class="block text-sm text-gray-400 mb-2">생년월일</label>
            <input
                type="date"
                id="birthday"
                class="w-full px-5 py-4 bg-neutral-800 border border-white/10 rounded-2xl text-white text-lg focus:outline-none focus:border-blue-500 transition-colors duration-300"
            >

            <!-- 계산 button -->
            <button
                id="calcBtn"
                class="w-full mt-6 px-7 py-4 text-lg font-semibold text-white bg-blue-500 rounded-2xl hover:bg-blue-600 active:scale-[0.98] transition-all duration-300 cursor-pointer"
            >
                나이 계산하기
            </button>

            <!-- 결과 표시 영역 -->
            <div id="result" class="mt-8 hidden">
                <div class="p-8 bg-neutral-800 rounded-2xl text-center">
                    <p class="text-gray-400 text-sm mb-2">당신의 만 나이는</p>
                    <p id="age" class="text-6xl font-bold bg-gradient-to-br from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                    </p>
                    <p class="text-gray-400 text-sm mt-2">세 입니다</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="text-center py-10 border-t border-white/10">
        <p class="text-xs text-gray-600">&copy; 2026 만 나이 계산기. All rights reserved.</p>
    </footer>

    <script src="../&#45208;&#51060;&#44228;&#49328;&#44592;/client.js"></script>
</body>
</html>
