<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 코드 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>var qrCodeGenerator = qrcode;</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .qr-fade-in {
      animation: qrFadeIn 0.3s ease-out;
    }
    @keyframes qrFadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .pulse-placeholder {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 6px;
    }
    .toast-enter {
      animation: toastIn 0.3s ease-out;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', ...props }) {
      const baseClasses = 'inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-500 shadow-sm hover:shadow-md',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 focus:ring-indigo-500 shadow-sm',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-600 focus:ring-gray-400',
        danger: 'bg-red-600 hover:bg-red-700 text-white focus:ring-red-500 shadow-sm',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm gap-1.5',
        md: 'px-4 py-2.5 text-sm gap-2',
        lg: 'px-6 py-3 text-base gap-2',
      };
      return (
        <button
          className={`${baseClasses} ${variants[variant]} ${sizes[size]} ${className}`}
          disabled={disabled}
          onClick={onClick}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '', ...props }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`} {...props}>
          {children}
        </div>
      );
    }

    function Toast({ message, isVisible }) {
      if (!isVisible) return null;
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 toast-enter">
          <div className="bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2">
            <svg className="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
            </svg>
            {message}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function InputTypeButton({ icon, label, active, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`flex flex-col items-center gap-1 px-3 py-2.5 rounded-xl text-xs font-medium transition-all duration-200 min-w-[64px]
            ${active
              ? 'bg-indigo-100 text-indigo-700 ring-2 ring-indigo-300 shadow-sm'
              : 'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200 hover:border-gray-300'
            }`}
        >
          <span className="text-lg">{icon}</span>
          <span>{label}</span>
        </button>
      );
    }

    function SizeButton({ label, value, active, onClick }) {
      return (
        <button
          onClick={() => onClick(value)}
          className={`px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200
            ${active
              ? 'bg-indigo-600 text-white shadow-sm'
              : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
            }`}
        >
          {label}
        </button>
      );
    }

    function EmptyState() {
      return (
        <div className="flex flex-col items-center justify-center py-10 text-gray-400">
          <div className="pulse-placeholder mb-4">
            <svg className="w-24 h-24" viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="10" y="10" width="30" height="30" rx="2" className="text-gray-300" fill="currentColor" opacity="0.3" />
              <rect x="60" y="10" width="30" height="30" rx="2" className="text-gray-300" fill="currentColor" opacity="0.3" />
              <rect x="10" y="60" width="30" height="30" rx="2" className="text-gray-300" fill="currentColor" opacity="0.3" />
              <rect x="15" y="15" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="27" y="15" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="15" y="27" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="65" y="15" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="77" y="15" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="65" y="27" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="15" y="65" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="27" y="65" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="15" y="77" width="8" height="8" rx="1" className="text-gray-400" fill="currentColor" />
              <rect x="50" y="50" width="5" height="5" className="text-gray-300" fill="currentColor" />
              <rect x="60" y="60" width="5" height="5" className="text-gray-300" fill="currentColor" />
              <rect x="70" y="70" width="5" height="5" className="text-gray-300" fill="currentColor" />
              <rect x="80" y="60" width="5" height="5" className="text-gray-300" fill="currentColor" />
              <rect x="60" y="80" width="5" height="5" className="text-gray-300" fill="currentColor" />
            </svg>
          </div>
          <p className="text-sm font-medium text-gray-400">텍스트나 URL을 입력하면</p>
          <p className="text-sm font-medium text-gray-400">QR 코드가 생성됩니다</p>
        </div>
      );
    }

    // ========================================
    // 📄 App Component
    // ========================================

    function App() {
      const [inputText, setInputText] = useState('');
      const [inputType, setInputType] = useState('text');
      const [qrSize, setQrSize] = useState(256);
      const [fgColor, setFgColor] = useState('#000000');
      const [bgColor, setBgColor] = useState('#ffffff');
      const [errorLevel, setErrorLevel] = useState('M');
      const [qrDataUrl, setQrDataUrl] = useState(null);
      const [qrKey, setQrKey] = useState(0);
      const [toast, setToast] = useState({ visible: false, message: '' });
      const [logoImg, setLogoImg] = useState(null);
      const [logoPreview, setLogoPreview] = useState(null);
      const [logoSize, setLogoSize] = useState(20); // percent of QR

      const inputRef = useRef(null);
      const logoInputRef = useRef(null);
      const INPUT_TYPES = [
        { id: 'text', icon: 'Aa', label: '텍스트', template: '' },
        { id: 'url', icon: '🔗', label: 'URL', template: 'https://' },
        { id: 'email', icon: '📧', label: '이메일', template: 'mailto:' },
        { id: 'phone', icon: '📞', label: '전화', template: 'tel:' },
        { id: 'wifi', icon: '📶', label: 'WiFi', template: 'WIFI:T:WPA;S:네트워크명;P:비밀번호;;' },
      ];

      const SIZE_OPTIONS = [
        { label: '소', value: 160 },
        { label: '중', value: 256 },
        { label: '대', value: 400 },
      ];

      const ERROR_LEVELS = [
        { value: 'L', label: 'L (7%)' },
        { value: 'M', label: 'M (15%)' },
        { value: 'Q', label: 'Q (25%)' },
        { value: 'H', label: 'H (30%)' },
      ];

      const showToast = useCallback((message) => {
        setToast({ visible: true, message });
        setTimeout(() => setToast({ visible: false, message: '' }), 2000);
      }, []);

      const handleLogoUpload = useCallback((e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            setLogoImg(img);
            setLogoPreview(ev.target.result);
            setErrorLevel('H'); // 로고 사용 시 최고 오류 정정
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }, []);

      const handleLogoRemove = useCallback(() => {
        setLogoImg(null);
        setLogoPreview(null);
        if (logoInputRef.current) logoInputRef.current.value = '';
      }, []);

      const handleGenerate = useCallback(() => {
        const text = inputText.trim();
        if (!text) {
          setQrDataUrl(null);
          return;
        }
        try {
          const level = logoImg ? 'H' : errorLevel;
          const qr = qrCodeGenerator(0, level);
          qr.addData(text);
          qr.make();

          const moduleCount = qr.getModuleCount();
          const margin = 4;
          const cellSize = Math.max(1, Math.floor(qrSize / (moduleCount + margin * 2)));
          const totalSize = cellSize * (moduleCount + margin * 2);

          const canvas = document.createElement('canvas');
          canvas.width = totalSize;
          canvas.height = totalSize;
          const ctx = canvas.getContext('2d');

          ctx.fillStyle = bgColor;
          ctx.fillRect(0, 0, totalSize, totalSize);

          ctx.fillStyle = fgColor;
          for (let row = 0; row < moduleCount; row++) {
            for (let col = 0; col < moduleCount; col++) {
              if (qr.isDark(row, col)) {
                ctx.fillRect(
                  (col + margin) * cellSize,
                  (row + margin) * cellSize,
                  cellSize, cellSize
                );
              }
            }
          }

          // 로고 그리기
          if (logoImg) {
            const logoDim = Math.floor(totalSize * (logoSize / 100));
            const logoX = Math.floor((totalSize - logoDim) / 2);
            const logoY = Math.floor((totalSize - logoDim) / 2);
            const pad = Math.floor(logoDim * 0.1);

            // 흰색 배경 + 둥근 테두리
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            const r = 8;
            ctx.moveTo(logoX - pad + r, logoY - pad);
            ctx.arcTo(logoX + logoDim + pad, logoY - pad, logoX + logoDim + pad, logoY + logoDim + pad, r);
            ctx.arcTo(logoX + logoDim + pad, logoY + logoDim + pad, logoX - pad, logoY + logoDim + pad, r);
            ctx.arcTo(logoX - pad, logoY + logoDim + pad, logoX - pad, logoY - pad, r);
            ctx.arcTo(logoX - pad, logoY - pad, logoX + logoDim + pad, logoY - pad, r);
            ctx.closePath();
            ctx.fill();

            ctx.drawImage(logoImg, logoX, logoY, logoDim, logoDim);
          }

          setQrDataUrl(canvas.toDataURL('image/png'));
          setQrKey(prev => prev + 1);
          showToast('QR 코드가 생성되었습니다');
        } catch (err) {
          console.error('QR generation error:', err);
          setQrDataUrl(null);
          showToast('QR 코드 생성에 실패했습니다');
        }
      }, [inputText, qrSize, fgColor, bgColor, errorLevel, logoImg, logoSize, showToast]);

      const handleInputTypeChange = (type) => {
        const typeConfig = INPUT_TYPES.find(t => t.id === type);
        setInputType(type);
        setInputText(typeConfig.template);
        setTimeout(() => inputRef.current?.focus(), 50);
      };

      const handleDownload = useCallback(() => {
        if (!qrDataUrl) return;
        const link = document.createElement('a');
        link.download = `qr-code-${Date.now()}.png`;
        link.href = qrDataUrl;
        link.click();
        showToast('PNG 파일이 다운로드되었습니다');
      }, [qrDataUrl, showToast]);

      const handleCopy = useCallback(async () => {
        if (!qrDataUrl) return;
        try {
          const response = await fetch(qrDataUrl);
          const blob = await response.blob();
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          showToast('클립보드에 복사되었습니다');
        } catch (err) {
          try {
            await navigator.clipboard.writeText(inputText);
            showToast('텍스트가 클립보드에 복사되었습니다');
          } catch (e) {
            showToast('복사에 실패했습니다');
          }
        }
      }, [qrDataUrl, inputText, showToast]);

      const charCount = inputText.length;
      const maxChars = 2953;

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-gray-50 to-indigo-50">
          {/* Header */}
          <header className="pt-8 pb-4 text-center">
            <div className="flex items-center justify-center gap-3 mb-1">
              <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md">
                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                    d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
              </div>
              <h1 className="text-2xl sm:text-3xl font-bold text-gray-900">QR 코드 생성기</h1>
            </div>
            <p className="text-sm text-gray-500">텍스트, URL, 연락처 등을 QR 코드로 변환하세요</p>
          </header>

          <main className="max-w-lg mx-auto px-4 pb-12 space-y-5">
            {/* Input Type Quick Buttons */}
            <Card className="p-4">
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">입력 유형</label>
              <div className="flex gap-2 overflow-x-auto pb-1">
                {INPUT_TYPES.map(type => (
                  <InputTypeButton
                    key={type.id}
                    icon={type.icon}
                    label={type.label}
                    active={inputType === type.id}
                    onClick={() => handleInputTypeChange(type.id)}
                  />
                ))}
              </div>
            </Card>

            {/* Text Input */}
            <Card className="p-4">
              <div className="flex items-center justify-between mb-2">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider" htmlFor="qr-input">
                  내용 입력
                </label>
                <span className={`text-xs font-medium ${charCount > maxChars ? 'text-red-500' : 'text-gray-400'}`}>
                  {charCount.toLocaleString()} / {maxChars.toLocaleString()}
                </span>
              </div>
              <textarea
                id="qr-input"
                ref={inputRef}
                value={inputText}
                onChange={(e) => setInputText(e.target.value)}
                placeholder={inputType === 'wifi' ? 'WiFi 정보를 입력하세요' : '텍스트 또는 URL을 입력하세요...'}
                rows={inputType === 'wifi' ? 3 : 2}
                className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none transition-all duration-200"
                maxLength={maxChars}
                aria-label="QR 코드로 변환할 내용"
              />
              {charCount > maxChars * 0.9 && (
                <p className="text-xs text-amber-600 mt-1.5">
                  입력 길이가 길면 QR 코드가 복잡해져 인식이 어려울 수 있습니다.
                </p>
              )}
              <Button
                variant="primary"
                size="lg"
                className="w-full mt-4"
                disabled={!inputText.trim() || charCount > maxChars}
                onClick={handleGenerate}
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                    d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                QR 코드 생성
              </Button>
            </Card>

            {/* QR Code Display */}
            <Card className="p-6">
              <div className="flex justify-center">
                <div
                  className="bg-white rounded-2xl shadow-inner border-2 border-gray-100 flex items-center justify-center"
                  style={{
                    width: Math.min(qrSize + 48, 448),
                    height: Math.min(qrSize + 48, 448),
                    minWidth: 200,
                    minHeight: 200,
                  }}
                >
                  {qrDataUrl ? (
                    <img
                      key={qrKey}
                      src={qrDataUrl}
                      alt="생성된 QR 코드"
                      className="qr-fade-in rounded-lg"
                      style={{
                        width: Math.min(qrSize, 400),
                        height: Math.min(qrSize, 400),
                        imageRendering: 'pixelated',
                      }}
                    />
                  ) : (
                    <EmptyState />
                  )}
                </div>
              </div>
            </Card>

            {/* Options */}
            <Card className="p-4 space-y-5">
              {/* Size Control */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">크기</label>
                <div className="flex gap-2">
                  {SIZE_OPTIONS.map(opt => (
                    <SizeButton
                      key={opt.value}
                      label={opt.label}
                      value={opt.value}
                      active={qrSize === opt.value}
                      onClick={setQrSize}
                    />
                  ))}
                </div>
              </div>

              {/* Error Correction */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3" htmlFor="error-level">
                  오류 정정 수준
                </label>
                <select
                  id="error-level"
                  value={errorLevel}
                  onChange={(e) => setErrorLevel(e.target.value)}
                  className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent cursor-pointer"
                  aria-label="오류 정정 수준 선택"
                >
                  {ERROR_LEVELS.map(level => (
                    <option key={level.value} value={level.value}>{level.label}</option>
                  ))}
                </select>
                <p className="text-xs text-gray-400 mt-1.5">높을수록 손상된 QR 코드도 인식 가능하지만, 코드가 복잡해집니다.</p>
              </div>

              {/* Logo Upload */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">로고 삽입</label>
                {logoPreview ? (
                  <div className="flex items-center gap-4">
                    <div className="w-16 h-16 rounded-xl border-2 border-gray-200 overflow-hidden bg-white flex items-center justify-center">
                      <img src={logoPreview} alt="로고 미리보기" className="w-full h-full object-contain" />
                    </div>
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-sm font-medium text-gray-700">로고 크기</span>
                        <span className="text-xs text-gray-400">{logoSize}%</span>
                      </div>
                      <input
                        type="range" min="10" max="30" value={logoSize}
                        onChange={(e) => setLogoSize(Number(e.target.value))}
                        className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                      />
                      <div className="flex justify-between text-xs text-gray-400 mt-1">
                        <span>작게</span><span>크게</span>
                      </div>
                    </div>
                    <button onClick={handleLogoRemove}
                      className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="로고 제거">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                      </svg>
                    </button>
                  </div>
                ) : (
                  <button
                    onClick={() => logoInputRef.current?.click()}
                    className="w-full flex items-center justify-center gap-2 px-4 py-4 border-2 border-dashed border-gray-300 rounded-xl
                               text-sm text-gray-500 hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50/50 transition-all cursor-pointer"
                  >
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    로고 이미지 업로드 (PNG, JPG)
                  </button>
                )}
                <input ref={logoInputRef} type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                {logoPreview && (
                  <p className="text-xs text-amber-600 mt-2">
                    * 로고 사용 시 오류 정정이 자동으로 H(30%)로 설정됩니다.
                  </p>
                )}
              </div>

              {/* Color Pickers */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">색상</label>
                <div className="flex gap-4">
                  <div className="flex items-center gap-3 flex-1">
                    <input
                      type="color"
                      value={fgColor}
                      onChange={(e) => setFgColor(e.target.value)}
                      className="w-10 h-10 rounded-lg cursor-pointer border-2 border-gray-200"
                      aria-label="전경 색상 선택"
                    />
                    <div>
                      <span className="text-sm font-medium text-gray-700 block">전경색</span>
                      <span className="text-xs text-gray-400 uppercase">{fgColor}</span>
                    </div>
                  </div>
                  <div className="flex items-center gap-3 flex-1">
                    <input
                      type="color"
                      value={bgColor}
                      onChange={(e) => setBgColor(e.target.value)}
                      className="w-10 h-10 rounded-lg cursor-pointer border-2 border-gray-200"
                      aria-label="배경 색상 선택"
                    />
                    <div>
                      <span className="text-sm font-medium text-gray-700 block">배경색</span>
                      <span className="text-xs text-gray-400 uppercase">{bgColor}</span>
                    </div>
                  </div>
                </div>
              </div>
            </Card>

            {/* Action Buttons */}
            <div className="flex gap-3">
              <Button
                variant="primary"
                size="lg"
                className="flex-1"
                disabled={!qrDataUrl}
                onClick={handleDownload}
                aria-label="PNG로 다운로드"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                PNG 다운로드
              </Button>
              <Button
                variant="secondary"
                size="lg"
                className="flex-1"
                disabled={!qrDataUrl}
                onClick={handleCopy}
                aria-label="클립보드에 복사"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                클립보드 복사
              </Button>
            </div>

            {/* Footer */}
            <p className="text-center text-xs text-gray-400 pt-4">
              QR 코드는 브라우저에서 생성되며, 데이터가 외부로 전송되지 않습니다.
            </p>
          </main>

          <Toast message={toast.message} isVisible={toast.visible} />
        </div>
      );
    }

    // ========================================
    // 🚀 Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
